<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonikSkin - Ses Tasarımı</title>
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/record.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: #000; color: #00ffcc; font-family: sans-serif; text-align: center; padding: 20px; }
        #wave-outer { background: white; padding: 20px; border-radius: 10px; margin: 20px auto; width: 90%; max-width: 400px; }
        #wave-container { width: 100%; height: 100px; }
        .controls { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        button { padding: 15px; width: 250px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; }
        #recordBtn { background: #ff4444; color: white; }
        #playBtn { background: #00ffcc; display: none; }
        #downloadBtn { background: #fff; display: none; }
        #timer { font-size: 2rem; margin: 10px; }
    </style>
</head>
<body>
    <h1>SONIKSKIN</h1>
    <div id="wave-outer"><div id="wave-container"></div></div>
    <div id="timer">0.0</div>
    <div class="controls">
        <button id="recordBtn">MİKROFONU AÇ VE KAYDET</button>
        <button id="playBtn">DİNLE</button>
        <button id="downloadBtn">TASARIMI İNDİR</button>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const playBtn = document.getElementById('playBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const timer = document.getElementById('timer');

        const wavesurfer = WaveSurfer.create({
            container: '#wave-container',
            waveColor: '#000',
            progressColor: '#555',
            height: 100,
            barWidth: 3
        });

        const record = wavesurfer.registerPlugin(WaveSurfer.Record.create());

        recordBtn.onclick = async () => {
            if (record.isRecording()) {
                record.stopRecording();
                recordBtn.textContent = 'YENİ KAYIT';
                return;
            }

            try {
                // S20 FE için mikrofonu manuel uyandıralım
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                await record.startRecording();
                recordBtn.textContent = 'DURDUR';
                playBtn.style.display = 'none';
                downloadBtn.style.display = 'none';
            } catch (err) {
                alert("Mikrofon hatası: Lütfen tarayıcı ayarlarından izin verin.");
            }
        };

        record.on('record-end', (blob) => {
            const url = URL.createObjectURL(blob);
            wavesurfer.load(url);
            playBtn.style.display = 'block';
            downloadBtn.style.display = 'block';
        });

        record.on('record-progress', (time) => {
            timer.textContent = (time / 1000).toFixed(1);
            if (time >= 8000) record.stopRecording();
        });

        playBtn.onclick = () => wavesurfer.playPause();

        downloadBtn.onclick = () => {
            html2canvas(document.querySelector("#wave-outer")).then(canvas => {
                const link = document.createElement('a');
                link.download = 'ses-tasarimi.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        };
    </script>
</body>
</html>
