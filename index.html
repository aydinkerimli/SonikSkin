<!DOCTYPE html>
<html lang="tr" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SonikSkin | Pro</title>
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/record.min.js"></script>
    <style>
        :root { --neon: #00ffcc; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .l-btn { background: #111; border: 1px solid var(--neon); color: var(--neon); padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        
        /* Ses Dalgaları Alanı */
        #waveform { width: 100%; height: 150px; margin: 30px 0; background: #050505; border-radius: 10px; border: 1px solid #111; }
        
        .main-btn { 
            background: #ff4757; color: white; border: none; padding: 20px; 
            width: 100%; max-width: 300px; font-size: 18px; font-weight: bold; 
            border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px rgba(255, 71, 87, 0.4);
        }
        .recording { background: #222 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        #status { color: var(--neon); margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body class="notranslate">

    <div class="nav">
        <span style="color:var(--neon); font-weight:bold;">SONIKSKIN</span>
        <div>
            <button class="l-btn" onclick="setLang('TR')">TR</button>
            <button class="l-btn" onclick="setLang('EN')">EN</button>
            <button class="l-btn" onclick="setLang('RU')">RU</button>
        </div>
    </div>

    <h1 id="t-h">Sesini Sanata Dönüştür</h1>
    <p id="t-p" style="color:#666;">Ses dalganı oluşturmak için kayda başla.</p>

    <div id="waveform"></div>

    <button id="rec-btn" class="main-btn">KAYDA BAŞLA</button>
    
    <div id="status">Hazır</div>

    <script>
        const texts = {
            'TR': { h: "Sesini Sanata Dönüştür", p: "Dövmen için ses kaydı yapmaya hazır mısın?", b1: "KAYDA BAŞLA", b2: "DURDUR", s: "Sesin analiz ediliyor..." },
            'EN': { h: "Turn Voice into Art", p: "Ready to record your sound?", b1: "START RECORDING", b2: "STOP", s: "Analyzing voice..." },
            'RU': { h: "Голос в Искусство", p: "Готовы записать звук?", b1: "НАЧАТЬ ЗАПИСЬ", b2: "СТОП", s: "Анализ голоса..." }
        };

        let currentLang = 'TR';
        
        // Ses Dalga Motorunu Kur (WaveSurfer)
        const wavesurfer = WaveSurfer.create({
            container: '#waveform',
            waveColor: '#00ffcc',
            progressColor: '#00ccaa',
            cursorWidth: 0,
            barWidth: 2,
            barGap: 3,
            height: 150
        });

        // Kayıt Eklentisini Başlat
        const record = wavesurfer.registerPlugin(WaveSurfer.Record.create());

        function setLang(lang) {
            currentLang = lang;
            document.getElementById('t-h').innerText = texts[lang].h;
            document.getElementById('t-p').innerText = texts[lang].p;
            if(!record.isRecording()) {
                document.getElementById('rec-btn').innerText = texts[lang].b1;
            }
        }

        const btn = document.getElementById('rec-btn');
        const st = document.getElementById('status');

        btn.onclick = async () => {
            if (record.isRecording()) {
                record.stopRecording();
                btn.innerText = texts[currentLang].b1;
                btn.classList.remove('recording');
                st.innerText = "Kayıt Tamamlandı.";
                return;
            }

            try {
                await record.startRecording();
                btn.innerText = texts[currentLang].b2;
                btn.classList.add('recording');
                st.innerText = texts[currentLang].s;
            } catch (err) {
                alert("Mikrofon izni gerekli!");
            }
        };

        // Kayıt sırasında dalgayı çiz
        record.on('record-progress', () => {
            st.innerText = texts[currentLang].s;
        });
    </script>
</body>
</html>
