<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonik Skin - Universal Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --neon: #d4ff00; --bg: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            /* SƏNİN İSTƏDİYİN CANLI VƏ RƏNGARƏNG ARXA FON */
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f2027, #203a43, #2c5364);
            background-size: 400% 400%;
            animation: moveGradient 15s ease infinite;
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column;
        }

        /* Fonun hərəkət etməsi üçün animasiya */
        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo { 
            font-weight: 900; color: var(--neon); font-size: 1.3rem; letter-spacing: 1px; 
            cursor: pointer; transition: 0.3s; 
            text-shadow: 0 0 10px rgba(212, 255, 0, 0.4);
        }
        .logo:hover { transform: scale(1.05); }

        .lang-dropdown { position: relative; }
        .lang-btn { background: rgba(0,0,0,0.3); border: 1px solid #444; color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .lang-content {
            display: none; position: absolute; right: 0; background: #1a1a1a;
            min-width: 110px; border: 1px solid #333; border-radius: 8px; z-index: 1000;
        }
        .lang-content span { padding: 12px; display: block; cursor: pointer; border-bottom: 1px solid #222; font-size: 13px; }
        .lang-dropdown:hover .lang-content { display: block; }
        
        .container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 15px; }
        
        .card {
            background: rgba(20, 20, 20, 0.85); /* Kart bir az şəffaf olsun ki, arxa fon görünsün */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 25px;
            border-radius: 25px; width: 100%; max-width: 380px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .wave-box {
            background: #000; height: 140px; border-radius: 20px; margin-bottom: 25px;
            position: relative; border: 1px solid #1a1a1a; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        canvas { width: 100%; height: 100%; background: #000; }
        #timer { position: absolute; top: 12px; right: 15px; color: var(--neon); font-family: monospace; font-size: 14px; }
        
        .btn {
            width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 15px; border: none;
            font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-gray { background: #222; color: #fff; border: 1px solid #333; }
        .btn-listen { background: #2a2a2a; color: var(--neon); display: none; }
        .btn-main { background: var(--neon); color: #000; margin-top: 10px; }
        
        #success-btn { 
            display: none; background: #00c3ff; color: #fff; 
            animation: pulse 1.5s infinite; border: 2px solid #fff;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="resetPage()">SONIK SKIN</div>
    <div class="lang-dropdown">
        <button class="lang-btn" id="curLang">TR ▾</button>
        <div class="lang-content">
            <span onclick="updateLang('tr')">Türkçe</span>
            <span onclick="updateLang('en')">English</span>
            <span onclick="updateLang('ru')">Русский</span>
            <span onclick="updateLang('fr')">Français</span>
            <span onclick="updateLang('zh')">中文</span>
            <span onclick="updateLang('de')">Deutsch</span>
        </div>
    </div>
</header>

<div class="container">
    <div class="card">
        <h2 id="ui-title">DOSYADAN DÖVME YAP</h2>
        
        <div class="wave-box" id="captureZone">
            <canvas id="waveCanvas"></canvas>
            <div id="timer">00:00 / 00:08</div>
        </div>

        <button class="btn btn-main" id="success-btn" onclick="downloadPNG()">✅ <span id="ui-success">ÖDEME BAŞARILI! TIKLA İNDİR</span></button>
        
        <div id="action-area">
            <button class="btn btn-gray" id="btn-rec" onclick="initMic()">🎤 <span id="ui-rec">SESİ KAYDET</span></button>
            <input type="file" id="fInp" hidden onchange="handleFile(event)">
            <button class="btn btn-gray" id="btn-file" onclick="document.getElementById('fInp').click()">📁 <span id="ui-select">DOSYA SEÇ</span></button>
            <button class="btn btn-listen" id="btn-play" onclick="playAudio()">🔊 <span id="ui-listen">DİNLE</span></button>
            <button class="btn btn-main" onclick="handleCheckoutFlow()" id="ui-down">BUNU HATIRAYA DÖNÜŞTÜR (İNDİR)</button>
        </div>
    </div>
</div>

<script>
    // Köhnə kodundakı bütün JavaScript hissəsi (script) burada eynilə qalır...
    // Heç bir funksiya dəyişdirilməyib.
    const LEMON_LINK = "https://sonikskin.lemonsqueezy.com/checkout/buy/7997dd0f-76bd-4a1c-99f5-b2253aeb1ee6";
    
    const langs = {
        tr: { title: "DOSYADAN DÖVME YAP", select: "DOSYA SEÇ", down: "BUNU HATIRAYA DÖNÜŞTÜR (İNDİR)", listen: "DİNLE", rec: "SESİ KAYDET", success: "ÖDEME BAŞARILI! TIKLA İNDİR" },
        en: { title: "CREATE TATTOO FROM FILE", select: "CHOOSE FILE", down: "CONVERT TO MEMORY (DOWNLOAD)", listen: "LISTEN", rec: "RECORD", success: "PAYMENT SUCCESS! CLICK TO DOWNLOAD" },
        ru: { title: "ТАТУ ИЗ ФАЙЛА", select: "ВЫБРАТЬ ФАЙЛ", down: "ПРЕВРАТИТЬ В ПАМЯТЬ (СКАЧАТЬ)", listen: "СЛУШАТЬ", rec: "ЗАПИСЬ", success: "ОПЛАТА УСПЕШНА! СКАЧАТЬ" },
        fr: { title: "CRÉER TATOUAGE", select: "CHOISIR UN FICHIER", down: "CONVERTIR EN SOUVENIR (TÉLÉCHARGER)", listen: "ÉCOUTER", rec: "ENREGISTRER", success: "PAIEMENT RÉUSSI ! TÉLÉCHARGER" },
        zh: { title: "纹身制作", select: "选择文件", down: "将其转化为记忆 (下载)", listen: "倾听", rec: "录音", success: "支付成功！点击下载" },
        de: { title: "TATTOO DATEI", select: "WÄHLEN", down: "IN ERINNERUNG VERWANDELN (DOWNLOAD)", listen: "ANHÖREN", rec: "AUFNAHME", success: "ZAHLUNG ERFOLGREICH! HERUNTERLADEN" }
    };

    let recorder, chunks = [], audioURL, audio, animFrame, analyser, dataArray;
    let staticDataArray = []; 
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');

    window.onload = function() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        const savedLang = localStorage.getItem('sonikLang') || 'tr';
        updateLang(savedLang);
        const params = new URLSearchParams(window.location.search);
        if (params.get('status') === 'success') {
            document.getElementById('success-btn').style.display = 'flex';
            document.getElementById('action-area').style.display = 'none';
            if(localStorage.getItem('lastStaticWave')) {
                staticDataArray = JSON.parse(localStorage.getItem('lastStaticWave'));
                drawStaticWave();
            }
        }
    };

    function resetPage() {
        localStorage.removeItem('lastStaticWave');
        window.location.href = window.location.origin + window.location.pathname;
    }

    function updateLang(l) {
        localStorage.setItem('sonikLang', l);
        document.getElementById('ui-title').innerText = langs[l].title;
        document.getElementById('ui-select').innerText = langs[l].select;
        document.getElementById('ui-down').innerText = langs[l].down;
        document.getElementById('ui-listen').innerText = langs[l].listen;
        document.getElementById('ui-rec').innerText = langs[l].rec;
        document.getElementById('ui-success').innerText = langs[l].success;
        document.getElementById('curLang').innerText = l.toUpperCase() + " ▾";
    }

    async function generateStaticWave(buffer) {
        const sampleRate = buffer.sampleRate;
        const maxDuration = 8; 
        const lengthToProcess = Math.min(buffer.length, sampleRate * maxDuration);
        const rawData = buffer.getChannelData(0);
        const samples = 60; 
        const blockSize = Math.floor(lengthToProcess / samples);
        staticDataArray = [];
        for (let i = 0; i < samples; i++) {
            let blockStart = blockSize * i;
            let sum = 0;
            for (let j = 0; j < blockSize; j++) { sum = sum + Math.abs(rawData[blockStart + j]); }
            staticDataArray.push(sum / blockSize);
        }
        localStorage.setItem('lastStaticWave', JSON.stringify(staticDataArray));
        drawStaticWave();
    }

    // SƏS DALĞALARI SƏNİN İSTƏDİYİN KİMİ (MAVİ/SARI) QALDI
    function drawStaticWave() {
        if (staticDataArray.length === 0) return;
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        const barWidth = canvas.width / staticDataArray.length;
        staticDataArray.forEach((val, i) => {
            const x = i * barWidth;
            const barHeight = val * canvas.height * 5;
            const ratio = i / staticDataArray.length;
            ctx.strokeStyle = (ratio < 0.2 || ratio > 0.8) ? '#00c3ff' : '#ffff1c';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(x + barWidth/2, (canvas.height/2) - (barHeight/2));
            ctx.lineTo(x + barWidth/2, (canvas.height/2) + (barHeight/2));
            ctx.stroke();
        });
    }

    function downloadPNG() {
        drawStaticWave(); 
        const link = document.createElement('a');
        link.download = 'sonik-skin-tattoo.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
    }

    function handleCheckoutFlow() { window.location.href = LEMON_LINK; }

    async function initMic() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            recorder = new MediaRecorder(stream);
            recorder.start(); chunks = [];
            let s = 0; 
            const t = setInterval(() => {
                s++; 
                document.getElementById('timer').innerText = `00:0${s} / 00:08`;
                if(s >= 8) { 
                    clearInterval(t); 
                    recorder.stop(); 
                    stream.getTracks().forEach(tr => tr.stop()); 
                }
            }, 1000);
            recorder.onstop = async () => { const blob = new Blob(chunks); processAudioData(blob); };
            recorder.ondataavailable = e => chunks.push(e.data);
        } catch(e) { alert("Mikrofon hatası!"); }
    }

    async function handleFile(e) { if(e.target.files[0]) { processAudioData(e.target.files[0]); } }

    async function processAudioData(data) {
        audioURL = URL.createObjectURL(data);
        audio = new Audio(audioURL);
        setupAnalyser();
        const arrayBuffer = await data.arrayBuffer();
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const decodedData = await audioCtx.decodeAudioData(arrayBuffer);
        audio.addEventListener('timeupdate', () => {
            if (audio.currentTime >= 8) {
                audio.pause();
                audio.currentTime = 0;
                cancelAnimationFrame(animFrame);
                drawStaticWave();
            }
        });
        generateStaticWave(decodedData);
        document.getElementById('btn-play').style.display = 'flex';
        document.getElementById('timer').innerText = `00:08 / 00:08`;
    }

    function setupAnalyser() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        const source = audioCtx.createMediaElementSource(audio);
        source.connect(analyser); analyser.connect(audioCtx.destination);
        analyser.fftSize = 128;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
    }

    function playAudio() {
        if(!audio) return;
        audio.play();
        if(animFrame) cancelAnimationFrame(animFrame);
        drawWave();
        audio.onended = () => { cancelAnimationFrame(animFrame); drawStaticWave(); };
    }

    function drawWave() {
        if (!analyser) return;
        animFrame = requestAnimationFrame(drawWave);
        analyser.getByteFrequencyData(dataArray);
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
        gradient.addColorStop(0, '#00c3ff'); gradient.addColorStop(0.5, '#ffff1c'); gradient.addColorStop(1, '#ff1744');
        ctx.strokeStyle = gradient; ctx.lineWidth = 4; ctx.lineCap = 'round';
        ctx.beginPath();
        const barWidth = (canvas.width / dataArray.length) * 2.5;
        let x = 0;
        for (let i = 0; i < dataArray.length; i++) {
            const barHeight = dataArray[i] / 2;
            ctx.moveTo(x, canvas.height/2 - barHeight/2);
            ctx.lineTo(x, canvas.height/2 + barHeight/2);
            x += barWidth + 2;
        }
        ctx.stroke();
    }
</script>
</body>
</html>
