<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Skin | Ultimate Global</title>
    <style>
        :root { --accent: #d4ff00; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: #000; border-bottom: 1px solid #222; position: sticky; top:0; z-index:999; }
        .logo { font-weight: bold; color: var(--accent); letter-spacing: 2px; }
        .nav-right { display: flex; gap: 12px; align-items: center; }

        .btn-top { background: transparent; color: #fff; border: 1px solid #444; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-artist { background: var(--accent); color: #000; border: none; }
        .btn-top:hover { border-color: var(--accent); }

        .main-container { display: flex; justify-content: center; gap: 25px; padding: 50px 15px; flex-wrap: wrap; }
        .panel { background: #111; border: 2px solid #222; border-radius: 24px; width: 420px; padding: 30px; box-sizing: border-box; }
        
        .tattoo-box { width: 100%; aspect-ratio: 1/1; background: #000; border: 1px dashed #333; margin-bottom: 25px; border-radius: 15px; display: flex; align-items: center; overflow: hidden; position: relative; }
        canvas { width: 100%; height: 50%; }

        .btn { width: 100%; padding: 16px; margin: 10px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; }
        #recBtn { background: #ff3e3e; color: white; }
        .play-btn { background: #333; color: white; display: none; }
        .buy-btn { background: var(--accent); color: black; display: none; text-decoration: none; text-align: center; }

        /* Modal / Giriş Penceresi */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: #161616; padding: 40px; border-radius: 30px; border: 1px solid #333; width: 340px; text-align: center; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .social-btn { width: 100%; padding: 15px; margin: 12px 0; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 15px; }
        
        select { background: #1a1a1a; color: white; border: 1px solid #333; padding: 8px 12px; border-radius: 8px; cursor: pointer; outline: none; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">SONIC SKIN</div>
        <div class="nav-right">
            <select id="langSelect">
                <option value="tr">TR</option>
                <option value="en">EN</option>
                <option value="ru">RU</option>
                <option value="zh">ZH (中文)</option>
                <option value="de">DE</option>
                <option value="es">ES</option>
                <option value="fr">FR</option>
            </select>
            <button class="btn-top" id="memberLoginBtn">GİRİŞ YAP</button>
            <button class="btn-top btn-artist" id="artistLoginBtn">SANATÇI PORTALI</button>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2 id="mTitle" style="margin-bottom:30px;">Giriş Yap</h2>
            <button class="social-btn" style="background:white; color:black;" onclick="alert('Gmail servisine yönlendiriliyor...')">Gmail ile Giriş</button>
            <button class="social-btn" style="background:black; color:white; border:1px solid #444;" onclick="alert('Apple servisine yönlendiriliyor...')">Apple ID ile Bağlan</button>
            <button id="closeModal" style="background:none; border:none; color:#ff3e3e; margin-top:25px; cursor:pointer; font-weight:bold; font-size:14px; text-transform:uppercase; letter-spacing:1px;">KAPAT</button>
        </div>
    </div>

    <div class="main-container">
        <div class="panel">
            <h2 id="t1" style="text-align:center; font-size: 1.1rem; letter-spacing: 1px;">CANLI SES DÖVMESİ</h2>
            <div class="tattoo-box"><canvas id="c1"></canvas></div>
            <button id="recBtn" class="btn">🎤 SESİ KAYDET</button>
            <button id="p1" class="btn play-btn">▶️ KAYDI DİNLE</button>
            <a href="#" id="b1" class="btn buy-btn">TASLAĞI SATIN AL</a>
        </div>

        <div class="panel">
            <h2 id="t2" style="text-align:center; font-size: 1.1rem; letter-spacing: 1px;">DOSYADAN DÖVME YAP</h2>
            <div class="tattoo-box"><canvas id="c2"></canvas></div>
            <input type="file" id="fIn" hidden accept="audio/*">
            <button id="fBtn" class="btn" style="background:#222; color:#fff;">📁 SES DOSYASI SEÇ</button>
            <button id="p2" class="btn play-btn">▶️ DOSYAYI DİNLE</button>
            <a href="#" id="b2" class="btn buy-btn">TASLAĞI SATIN AL</a>
        </div>
    </div>
