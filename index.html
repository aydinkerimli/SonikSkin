<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SonikSkin Fix</title>
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: #000; color: #00ffcc; font-family: sans-serif; text-align: center; padding: 20px; }
        #wave-outer { background: white; padding: 20px; border-radius: 10px; margin: 20px auto; width: 90%; max-width: 400px; min-height: 100px; }
        #wave-container { width: 100%; height: 100px; background: #eee; }
        .controls { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        button { padding: 20px; width: 280px; border-radius: 50px; border: none; font-weight: bold; font-size: 1.1rem; }
        #recordBtn { background: #ff4444; color: white; box-shadow: 0 0 15px rgba(255,68,68,0.5); }
        #playBtn { background: #00ffcc; color: #000; display: none; }
        #downloadBtn { background: #fff; color: #000; display: none; }
        #status { color: yellow; margin-top: 10px; font-size: 0.9rem; }
        #log { color: red; font-size: 0.8rem; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>SONIKSKIN</h1>
    <div id="wave-outer"><div id="wave-container"></div></div>
    <div id="status">Hazır</div>
    
    <div class="controls">
        <button id="recordBtn" type="button">KAYDI BAŞLAT/DURDUR</button>
        <button id="playBtn" type="button">DİNLE</button>
        <button id="downloadBtn" type="button">TASARIMI İNDİR</button>
    </div>

    <div id="log"></div>

    <script>
        const logDiv = document.getElementById('log');
        function debug(msg) { logDiv.innerText += msg + "\n"; }

        let mediaRecorder;
        let audioChunks = [];
        let wavesurfer;

        // Sayfa yüklenince WaveSurfer'ı hazırla
        window.onload = () => {
            wavesurfer = WaveSurfer.create({
                container: '#wave-container',
                waveColor: '#000',
                progressColor: '#555',
                height: 100
            });
            debug("Sistem yüklendi.");
        };

        document.getElementById('recordBtn').onclick = async () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                document.getElementById('recordBtn').style.background = "#ff4444";
                document.getElementById('status').innerText = "Kayıt işleniyor...";
                return;
            }

            try {
                debug("Mikrofon isteniyor...");
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => audioChunks.push(event.data);

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    const url = URL.createObjectURL(audioBlob);
                    wavesurfer.load(url);
                    document.getElementById('playBtn').style.display = "block";
                    document.getElementById('downloadBtn').style.display = "block";
                    document.getElementById('status').innerText = "Tasarım Hazır!";
                };

                mediaRecorder.start();
                document.getElementById('recordBtn').style.background = "white";
                document.getElementById('recordBtn').style.color = "black";
                document.getElementById('status').innerText = "KAYDEDİLİYOR... (Durdurmak için bas)";
                debug("Kayıt başladı.");

            } catch (err) {
                debug("HATA: " + err.message);
                alert("Mikrofon izni hatası! Ayarları kontrol edin.");
            }
        };

        document.getElementById('playBtn').onclick = () => wavesurfer.playPause();

        document.getElementById('downloadBtn').onclick = () => {
            html2canvas(document.querySelector("#wave-outer")).then(canvas => {
                const link = document.createElement('a');
                link.download = 'sonikskin-tattoo.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        };
    </script>
</body>
</html>
