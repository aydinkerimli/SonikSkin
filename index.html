<!DOCTYPE html>
<html>
<head>
    <title>Kamera Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="background:#000; color:#fff; text-align:center;">
    <h2>Kamera Testi</h2>
    <video id="v" autoplay playsinline style="width:100%; max-width:400px; border:2px solid lime;"></video>
    <p id="status">Kamera gözlənilir...</p>
    <button onclick="test()" style="padding:20px; font-size:20px;">KAMERANI AÇ</button>

    <script>
        async function test() {
            const v = document.getElementById('v');
            const s = document.getElementById('status');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                v.srcObject = stream;
                s.innerText = "Kamera İŞLƏYİR!";
                s.style.color = "lime";
            } catch (err) {
                s.innerText = "XƏTA: " + err.name;
                s.style.color = "red";
                alert("Xəta: " + err.message);
            }
        }
    </script>
</body>
</html>
