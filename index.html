<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Skin | Profesyonel Dövme Taslağı</title>
    <style>
        :root { --neon: #d4ff00; --dark: #050505; --panel: #111; }
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }

        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: #000; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: bold; color: var(--neon); letter-spacing: 2px; }
        
        .main-container { display: flex; justify-content: center; gap: 20px; padding: 40px 10px; flex-wrap: wrap; }
        .panel { background: var(--panel); border: 2px solid #222; border-radius: 20px; width: 450px; padding: 25px; box-sizing: border-box; text-align: center; }
        
        /* Çizim Alanı */
        .box { width: 100%; aspect-ratio: 16/9; background: #000; border: 1px dashed #333; margin-bottom: 20px; border-radius: 12px; display: flex; align-items: center; overflow: hidden; }
        canvas { width: 100%; height: 100%; }

        .btn { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; display: block; font-size: 14px; }
        #bRec { background: #ff3e3e; color: white; }
        .play-btn { background: #444; color: white; display: none; }
        .retry-btn { background: #222; color: #fff; border: 1px solid #444; display: none; }
        .buy-btn { background: var(--neon); color: black; display: none; text-decoration: none; justify-content: center; align-items: center; }

        select { background: #1a1a1a; color: white; border: 1px solid #333; padding: 5px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">SONIC SKIN</div>
        <select id="langSel" onchange="dilDegistir(this.value)">
            <option value="tr">TR</option>
            <option value="en">EN</option>
        </select>
    </div>

    <div class="main-container">
        <div class="panel">
            <h2 id="h1">CANLI SES DÖVMESİ</h2>
            <div class="box"><canvas id="cv1"></canvas></div>
            <button id="bRec" class="btn" onclick="kaydet()">🎤 SESİ KAYDET</button>
            <button id="bP1" class="btn play-btn" onclick="dinle1()">▶️ DİNLE</button>
            <button id="bR1" class="btn retry-btn" onclick="tekrarYap()">🔄 YENİDEN TEKRAR YAP</button>
            <button id="bS1" class="btn buy-btn" onclick="resimIndir('cv1')">BUNU HATIRAYA DÖNÜŞTÜR</button>
        </div>

        <div class="panel">
            <h2 id="h2">DOSYADAN DÖVME YAP</h2>
            <div class="box"><canvas id="cv2"></canvas></div>
            <input type="file" id="fIn" hidden accept="audio/*" onchange="dosyaSecildi(this)">
            <button class="btn" style="background:#222; color:#fff;" onclick="document.getElementById('fIn').click()" id="bF">📁 DOSYA SEÇ</button>
            <button id="bP2" class="btn play-btn" onclick="dinle2()">▶️ DİNLE</button>
            <button id="bS2" class="btn buy-btn" onclick="resimIndir('cv2')">BUNU HATIRAYA DÖNÜŞTÜR</button>
        </div>
    </div>

    <script>
        const diller = {
            tr: {h1:"CANLI SES DÖVMESİ", h2:"DOSYADAN DÖVME YAP", rec:"🎤 SESİ KAYDET", f:"📁 DOSYA SEÇ", buy:"BUNU HATIRAYA DÖNÜŞTÜR", listen:"▶️ DİNLE", retry:"🔄 YENİDEN TEKRAR YAP"},
            en: {h1:"LIVE VOICE TATTOO", h2:"TATTOO FROM FILE", rec:"🎤 RECORD VOICE", f:"📁 CHOOSE FILE", buy:"TURN THIS INTO A MEMORY", listen:"▶️ LISTEN", retry:"🔄 RETRY"}
        };

        function dilDegistir(v) {
            const d = diller[v];
            document.getElementById('h1').innerText = d.h1;
            document.getElementById('h2').innerText = d.h2;
            document.getElementById('bRec').innerText = d.rec;
            document.getElementById('bF').innerText = d.f;
            document.getElementById('bS1').innerText = d.buy;
            document.getElementById('bS2').innerText = d.buy;
            document.getElementById('bP1').innerText = d.listen;
            document.getElementById('bP2').innerText = d.listen;
            document.getElementById('bR1').innerText = d.retry;
        }

        let ctx, rec, chunks = [], ses1 = new Audio(), ses2 = new Audio();
        let source1, source2;

        // --- YENİ PROFESYONEL ÇİZİM SİSTEMİ ---
        function ciz(an, id) {
            const c = document.getElementById(id), x = c.getContext('2d');
            an.fftSize = 256; 
            const bLen = an.frequencyBinCount;
            const da = new Uint8Array(bLen);

            function render() {
                requestAnimationFrame(render);
                an.getByteFrequencyData(da); // Frekans verisi (Blok görünümü için)

                x.fillStyle = "#000"; 
                x.fillRect(0, 0, c.width, c.height);

                let bWidth = (c.width / bLen) * 2.5;
                let bHeight;
                let curX = 0;

                for(let i = 0; i < bLen; i++) {
                    bHeight = da[i] / 2; // Yükseklik hassasiyeti

                    // Neon efekti ve dövme stili bloklar
                    x.fillStyle = `rgb(212, 255, 0)`; 
                    // Ortadan ikiye yansıyan simetrik bloklar
                    x.fillRect(curX, (c.height - bHeight) / 2, bWidth - 2, bHeight);

                    curX += bWidth;
                }
            }
            render();
        }

        async function kaydet() {
            try {
                if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                const an = ctx.createAnalyser(); 
                ctx.createMediaStreamSource(s).connect(an);
                ciz(an, 'cv1'); 
                rec = new MediaRecorder(s); chunks = [];
                rec.ondataavailable = e => chunks.push(e.data);
                rec.onstop = () => {
                    ses1.src = URL.createObjectURL(new Blob(chunks));
                    document.getElementById('bP1').style.display = 'block';
                    document.getElementById('bR1').style.display = 'block';
                    document.getElementById('bS1').style.display = 'flex';
                };
                rec.start(); document.getElementById('bRec').innerText = "8sn...";
                setTimeout(() => { rec.stop(); s.getTracks().forEach(t=>t.stop()); document.getElementById('bRec').style.display='none'; }, 8000);
            } catch(e) { alert("Mikrofon hatası!"); }
        }

        function tekrarYap() {
            location.reload(); // En temizi sayfayı yenilemek
        }

        function resimIndir(id) {
            const c = document.getElementById(id);
            const link = document.createElement('a');
            link.download = 'tattoo-design.png';
            link.href = c.toDataURL("image/png");
            link.click();
        }

        function dinle1() {
            if (!source1) {
                source1 = ctx.createMediaElementSource(ses1);
                const an = ctx.createAnalyser();
                source1.connect(an);
                an.connect(ctx.destination);
                ciz(an, 'cv1');
            }
            ses1.play();
        }

        function dosyaSecildi(i) {
            const f = i.files[0];
            ses2.src = URL.createObjectURL(f);
            document.getElementById('bP2').style.display = 'block';
            document.getElementById('bS2').style.display = 'flex';
            if(!ctx) ctx = new AudioContext();
            if (!source2) {
                source2 = ctx.createMediaElementSource(ses2);
                const an = ctx.createAnalyser();
                source2.connect(an);
                an.connect(ctx.destination);
                ciz(an, 'cv2');
            }
            ses2.play();
        }

        function dinle2() { ses2.play(); }
    </script>
</body>
</html>
