<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonik Skin - Universal Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --neon: #d4ff00; --bg: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, var(--bg) 100%);
            color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column;
        }

        header {
            width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid #222;
        }
        .logo { font-weight: 900; color: var(--neon); font-size: 1.1rem; letter-spacing: 1px; }

        .lang-dropdown { position: relative; }
        .lang-btn { background: #222; border: 1px solid #444; color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .lang-content {
            display: none; position: absolute; right: 0; background: #1a1a1a;
            min-width: 110px; border: 1px solid #333; border-radius: 8px; z-index: 1000;
        }
        .lang-content span { padding: 12px; display: block; cursor: pointer; border-bottom: 1px solid #222; font-size: 13px; }
        .lang-dropdown:hover .lang-content { display: block; }

        .container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .card {
            background: #111; border: 1px solid #222; padding: 25px;
            border-radius: 25px; width: 100%; max-width: 380px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        .wave-box {
            background: #000; height: 140px; border-radius: 20px; margin-bottom: 25px;
            position: relative; border: 1px solid #1a1a1a; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        canvas { width: 100%; height: 100%; background: #000; }
        #timer { position: absolute; top: 12px; right: 15px; color: var(--neon); font-family: monospace; font-size: 14px; }

        .btn {
            width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 15px; border: none;
            font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-gray { background: #222; color: #fff; border: 1px solid #333; }
        .btn-listen { background: #2a2a2a; color: var(--neon); display: none; }
        .btn-main { background: var(--neon); color: #000; margin-top: 10px; }
        
        .btn:active { transform: scale(0.96); opacity: 0.8; }
    </style>
</head>
<body>

<header>
    <div class="logo">SONIK SKIN</div>
    <div class="lang-dropdown">
        <button class="lang-btn" id="curLang">TR ▾</button>
        <div class="lang-content">
            <span onclick="updateLang('tr')">Türkçe</span>
            <span onclick="updateLang('en')">English</span>
            <span onclick="updateLang('ru')">Русский</span>
            <span onclick="updateLang('fr')">Français</span>
            <span onclick="updateLang('zh')">中文</span>
            <span onclick="updateLang('de')">Deutsch</span>
        </div>
    </div>
</header>

<div class="container">
    <div class="card">
        <h2 id="ui-title">DOSYADAN DÖVME YAP</h2>
        
        <div class="wave-box" id="captureZone">
            <canvas id="waveCanvas"></canvas>
            <div id="timer">00:00 / 00:08</div>
        </div>

        <button class="btn btn-gray" id="btn-rec" onclick="initMic()">🎤 <span id="ui-rec">SESİ KAYDET</span></button>
        
        <input type="file" id="fInp" hidden onchange="handleFile(event)">
        <button class="btn btn-gray" onclick="document.getElementById('fInp').click()">📁 <span id="ui-select">DOSYA SEÇ</span></button>

        <button class="btn btn-listen" id="btn-play" onclick="playAudio()">🔊 <span id="ui-listen">DİNLE</span></button>

        <button class="btn btn-main" onclick="handleFlow()" id="ui-down">BUNU HATIRAYA DÖNÜŞTÜR (İNDİR)</button>
    </div>
</div>

<script>
    // SƏNİN YENİ VƏ İŞLƏK LİNKİN
    const NEW_LINK = "https://sonikskin.lemonsqueezy.com/checkout/buy/7997dd0f-76bd-4a1c-99f5-b2253aeb1ee6";

    const langs = {
        tr: { title: "DOSYADAN DÖVME YAP", select: "DOSYA SEÇ", down: "BUNU HATIRAYA DÖNÜŞTÜR (İNDİR)", listen: "DİNLE", rec: "SESİ KAYDET" },
        en: { title: "CREATE TATTOO FROM FILE", select: "CHOOSE FILE", down: "CONVERT TO MEMORY", listen: "LISTEN", rec: "RECORD" },
        ru: { title: "ТАТУ ИЗ ФАЙЛА", select: "ВЫБРАТЬ ФАЙЛ", down: "СКАЧАТЬ", listen: "СЛУШАТЬ", rec: "ЗАПИСЬ" },
        fr: { title: "CRÉER TATOUAGE", select: "CHOISIR", down: "CONVERTIR", listen: "ÉCOUTER", rec: "ENREGISTRER" },
        zh: { title: "纹身制作", select: "选择文件", down: "下载", listen: "倾听", rec: "录音" },
        de: { title: "TATTOO DATEI", select: "WÄHLEN", down: "SPEICHERN", listen: "ANHÖREN", rec: "AUFNAHME" }
    };

    let recorder, chunks = [], audioURL, audio, animInterval;
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');

    function updateLang(l) {
        document.getElementById('ui-title').innerText = langs[l].title;
        document.getElementById('ui-select').innerText = langs[l].select;
        document.getElementById('ui-down').innerText = langs[l].down;
        document.getElementById('ui-listen').innerText = langs[l].listen;
        document.getElementById('ui-rec').innerText = langs[l].rec;
        document.getElementById('curLang').innerText = l.toUpperCase() + " ▾";
    }

    function drawStatic(active = false) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#d4ff00'; ctx.lineWidth = 3; ctx.beginPath();
        for (let i = 0; i < canvas.width; i += 7) {
            let h = active ? Math.random() * 80 + 10 : 35;
            ctx.moveTo(i, canvas.height/2 - h/2); ctx.lineTo(i, canvas.height/2 + h/2);
        }
        ctx.stroke();
    }
    drawStatic();

    // ÖDƏNİŞ VƏ YÜKLƏMƏ AXINI
    function handleFlow() {
        const params = new URLSearchParams(window.location.search);
        if (params.get('status') === 'success') {
            const zone = document.getElementById('captureZone');
            const timer = document.getElementById('timer');
            timer.style.opacity = '0'; 

            html2canvas(zone, { backgroundColor: "#000000", scale: 4 }).then(c => {
                const a = document.createElement('a');
                a.download = 'sonik-tattoo.png';
                a.href = c.toDataURL("image/png");
                a.click();
                timer.style.opacity = '1';
            });
        } else {
            window.location.href = NEW_LINK;
        }
    }

    async function initMic() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const options = { mimeType: MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4' };
            recorder = new MediaRecorder(stream, options);
            recorder.start();
            chunks = [];
            let s = 0;
            const t = setInterval(() => {
                s++; drawStatic(true);
                document.getElementById('timer').innerText = `00:0${s} / 00:08`;
                if(s >= 8) { 
                    clearInterval(t); 
                    if(recorder.state !== 'inactive') recorder.stop();
                    drawStatic(false);
                    stream.getTracks().forEach(track => track.stop());
                }
            }, 1000);
            recorder.onstop = () => {
                audioURL = URL.createObjectURL(new Blob(chunks, { type: options.mimeType }));
                audio = new Audio(audioURL);
                document.getElementById('btn-play').style.display = 'flex';
            };
            recorder.ondataavailable = e => chunks.push(e.data);
        } catch(e) { alert("Mikrofon hatası!"); }
    }

    function handleFile(e) {
        const file = e.target.files[0];
        if(!file) return;
        audioURL = URL.createObjectURL(file);
        audio = new Audio(audioURL);
        document.getElementById('btn-play').style.display = 'flex';
        drawStatic();
    }

    function playAudio() {
        if(!audio) return;
        audio.play();
        animInterval = setInterval(() => {
            drawStatic(true);
            if(audio.paused || audio.ended) { clearInterval(animInterval); drawStatic(false); }
        }, 100);
    }
</script>
</body>
</html>
