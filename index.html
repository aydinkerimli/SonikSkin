<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SONİK SKİN - Artist Pro</title>
    <style>
        :root { 
            --neon: #d4ff00; 
            --bg: #0a0a0a; 
            --card-bg: rgba(20, 20, 20, 0.95);
            --border: rgba(212, 255, 0, 0.2);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            color: white; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        /* HEADER */
        header {
            width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-weight: 900; color: var(--neon); font-size: 1.4rem; letter-spacing: 2px; cursor: pointer; }

        /* CONTAINER */
        .container { width: 100%; max-width: 420px; padding: 20px; margin-top: 20px; }
        
        .card {
            background: var(--card-bg); border: 1px solid var(--border); padding: 30px;
            border-radius: 30px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        /* WAVEBOX & CANVAS */
        .wave-box {
            background: #000; height: 220px; border-radius: 20px; margin-bottom: 25px;
            position: relative; border: 1px solid #222; overflow: hidden;
            box-shadow: inset 0 0 20px rgba(212, 255, 0, 0.05);
        }
        canvas { width: 100%; height: 100%; cursor: crosshair; }
        
        #timer { 
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            color: var(--neon); font-family: 'Courier New', monospace; font-size: 14px;
            background: rgba(0,0,0,0.6); padding: 4px 12px; border-radius: 10px;
        }

        /* DÜYMƏLƏR */
        .btn {
            width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 15px; border: none;
            font-weight: 700; font-size: 15px; cursor: pointer; transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-gray { background: #1a1a1a; color: #ccc; border: 1px solid #333; }
        .btn-gray:hover { background: #252525; color: #fff; }
        
        .btn-main { background: var(--neon); color: #000; box-shadow: 0 0 15px rgba(212, 255, 0, 0.3); }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(212, 255, 0, 0.5); }

        /* MODAL / LOGIN */
        #login-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .login-card { 
            background: #111; border: 1px solid var(--neon); padding: 35px; border-radius: 25px; 
            width: 90%; max-width: 350px; text-align: center;
        }
        .login-card input {
            width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; 
            border: 1px solid #333; background: #000; color: #fff; font-size: 14px;
        }

        /* STATUS */
        .status-msg { font-size: 13px; color: #888; margin-top: 15px; }

    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">SONİK SKİN</div>
    <button class="btn-main" style="width:auto; padding:8px 18px; font-size:11px;" onclick="openLogin()">SƏNATKAR GİRİŞİ</button>
</header>

<div id="login-modal">
    <div class="login-card">
        <h3 style="color:var(--neon); margin-bottom:20px;">ARTİST PANELİ</h3>
        <input type="email" id="login-email" placeholder="E-poçt ünvanı">
        <input type="password" id="login-pass" placeholder="Şifrə">
        <button class="btn btn-main" onclick="closeLogin()">DAXİL OL</button>
        <p style="color:#555; font-size:11px; margin-top:15px; cursor:pointer" onclick="closeLogin()">Ləğv et</p>
    </div>
</div>

<div class="container">
    <div class="card">
        <h2 style="font-size: 1.3rem; margin-bottom: 10px; color:#fff;">SƏSİ SƏNƏTƏ ÇEVİR</h2>
        <p style="color:#777; font-size: 13px; margin-bottom: 25px;">Səsinizi yazın və ya yükləyin</p>
        
        <div class="wave-box" id="captureZone">
            <canvas id="waveCanvas"></canvas>
            <div id="timer">00:00 / 00:08</div>
        </div>

        <div id="action-area">
            <button class="btn btn-gray" id="btn-rec" onclick="initMic()">🎤 SƏSİ YAZ</button>
            <input type="file" id="fInp" hidden accept="audio/*" onchange="handleFile(event)">
            <button class="btn btn-gray" onclick="document.getElementById('fInp').click()">📁 FAYL SEÇİN</button>
            <button class="btn btn-main" id="btn-download" onclick="downloadPNG()" style="display:none; margin-top:10px;">📥 TATU ŞƏKLİNİ YÜKLƏ</button>
        </div>
        
        <p class="status-msg" id="status-text">Format: PNG • Yüksək Keyfiyyət</p>
    </div>
</div>

<script>
    let recorder, chunks = [], animFrame, analyser, dataArray;
    let staticDataArray = []; 
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');

    // Canvas ölçüsünü tənzimlə
    function resizeCanvas() {
        canvas.width = canvas.offsetWidth * window.devicePixelRatio;
        canvas.height = canvas.offsetHeight * window.devicePixelRatio;
        ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    }
    window.onload = resizeCanvas;
    window.onresize = resizeCanvas;

    function openLogin() { document.getElementById('login-modal').style.display = 'flex'; }
    function closeLogin() { document.getElementById('login-modal').style.display = 'none'; }

    async function initMic() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            setupStreamAnalyser(stream);
            recorder = new MediaRecorder(stream);
            recorder.start(); chunks = [];
            document.getElementById('btn-rec').innerText = "🛑 YAZILIR...";
            document.getElementById('btn-rec').style.color = "#ff4444";
            
            let s = 0;
            const t = setInterval(() => {
                s++; 
                document.getElementById('timer').innerText = `00:0${s} / 00:08`;
                if(s >= 8) { 
                    clearInterval(t); 
                    recorder.stop(); 
                    stream.getTracks().forEach(tr => tr.stop()); 
                    document.getElementById('btn-rec').innerText = "🎤 YENİDƏN YAZ";
                    document.getElementById('btn-rec').style.color = "#fff";
                }
            }, 1000);

            recorder.onstop = () => processAudioData(new Blob(chunks));
            recorder.ondataavailable = e => chunks.push(e.data);
        } catch(e) { alert("Mikrofon icazəsi verilmədi!"); }
    }

    function handleFile(e) { 
        if(e.target.files[0]) {
            document.getElementById('status-text').innerText = "Fayl emal olunur...";
            processAudioData(e.target.files[0]); 
        }
    }

    async function processAudioData(data) {
        const arrayBuffer = await data.arrayBuffer();
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const decodedData = await audioCtx.decodeAudioData(arrayBuffer);
        generateStaticWave(decodedData);
        document.getElementById('btn-download').style.display = 'flex';
        document.getElementById('status-text').innerText = "Tatu hazırdır!";
    }

    function setupStreamAnalyser(stream) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        const source = audioCtx.createMediaStreamSource(stream);
        source.connect(analyser);
        analyser.fftSize = 64;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        drawLive();
    }

    function drawLive() {
        animFrame = requestAnimationFrame(drawLive);
        analyser.getByteFrequencyData(dataArray);
        const w = canvas.width / window.devicePixelRatio;
        const h = canvas.height / window.devicePixelRatio;
        
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = '#000'; ctx.fillRect(0,0, w, h);
        
        ctx.strokeStyle = '#d4ff00'; ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        let x = 0;
        const sliceWidth = w / dataArray.length;
        
        for(let i=0; i<dataArray.length; i++) {
            let barHeight = (dataArray[i] / 255) * (h * 0.6);
            ctx.beginPath();
            ctx.moveTo(x, h/2 - barHeight/2);
            ctx.lineTo(x, h/2 + barHeight/2);
            ctx.stroke();
            x += sliceWidth;
        }
    }

    function generateStaticWave(buffer) {
        cancelAnimationFrame(animFrame);
        const rawData = buffer.getChannelData(0);
        const samples = 60; 
        const blockSize = Math.floor(rawData.length / samples);
        staticDataArray = [];
        for (let i = 0; i < samples; i++) {
            let sum = 0;
            for (let j = 0; j < blockSize; j++) { sum += Math.abs(rawData[(blockSize * i) + j]); }
            staticDataArray.push(sum / blockSize);
        }
        drawFinalDesign();
    }

    function drawFinalDesign() {
        const w = canvas.width / window.devicePixelRatio;
        const h = canvas.height / window.devicePixelRatio;
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, w, h);
        
        // 1. ƏSAS SƏS DALĞASI (Estetik Rəngli)
        const barWidth = w / staticDataArray.length;
        staticDataArray.forEach((val, i) => {
            const barHeight = val * h * 3.5 + 5;
            // Neon rəng keçidi
            ctx.strokeStyle = `hsl(${180 + i*2}, 100%, 50%)`; 
            ctx.lineWidth = 3; ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(i * barWidth + barWidth/2, (h/2 - 25) - barHeight/2);
            ctx.lineTo(i * barWidth + barWidth/2, (h/2 - 25) + barHeight/2);
            ctx.stroke();
        });

        // 2. MİNİMALİST AUDİO BARCODE (Açar xətlər)
        const codeY = h - 45;
        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5;
        for(let i=20; i < w-20; i+=5) {
            let codeHeight = Math.random() * 12 + 4;
            ctx.beginPath();
            ctx.moveTo(i, codeY - codeHeight/2);
            ctx.lineTo(i, codeY + codeHeight/2);
            ctx.stroke();
        }
        
        // Loqo və Kod mətni
        ctx.fillStyle = 'rgba(212, 255, 0, 0.6)';
        ctx.font = 'bold 9px Arial';
        ctx.fillText("SONİK SKİN • AUDİO TRACE", w/2 - 60, h - 15);
    }

    function downloadPNG() {
        const link = document.createElement('a');
        link.download = `sonic-skin-${Date.now()}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
    }
</script>
</body>
</html>
