<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Skin | Final Force</title>
    <style>
        :root { --accent: #d4ff00; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .panel { background: #111; border: 2px solid #222; border-radius: 20px; width: 90%; max-width: 400px; margin: 20px auto; padding: 20px; }
        .tattoo-box { width: 100%; aspect-ratio: 1/1; background: #000; border: 1px dashed #444; margin-bottom: 15px; }
        canvas { width: 100%; height: 100%; }
        .btn { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; display: block; }
        #recBtn { background: #ff3e3e; color: white; }
        #playBtn1, #playBtn2 { background: #333; color: white; display: none; }
        .buy-btn { background: var(--accent); color: black; display: none; text-decoration: none; padding: 15px; border-radius: 10px; font-weight: bold; }
        #debug { color: red; font-size: 10px; margin-top: 20px; }
        select { padding: 10px; margin-bottom: 20px; border-radius: 5px; background: #222; color: #fff; }
    </style>
</head>
<body>

    <select id="langSelect">
        <option value="tr">Türkçe</option>
        <option value="en">English</option>
        <option value="de">Deutsch</option>
        <option value="es">Español</option>
        <option value="zh">中文</option>
    </select>

    <div class="panel">
        <h2 id="t1">CANLI SES DÖVMESİ</h2>
        <div class="tattoo-box"><canvas id="c1"></canvas></div>
        <button id="recBtn">🎤 SESİ KAYDET</button>
        <button id="playBtn1">▶️ DİNLE</button>
        <a href="https://sonic-skin.lemonsqueezy.com/checkout" id="buy1" class="buy-btn">BU SESİ HATIRAYA DÖNÜŞTÜR</a>
    </div>

    <div class="panel">
        <h2 id="t2">DOSYADAN DÖVME</h2>
        <div class="tattoo-box"><canvas id="c2"></canvas></div>
        <input type="file" id="fIn" hidden accept="audio/*">
        <button onclick="document.getElementById('fIn').click()" id="fBtn" class="btn" style="background:#222; color:#fff;">📁 DOSYA SEÇ</button>
        <button id="playBtn2">▶️ DİNLE</button>
        <a href="https://sonic-skin.lemonsqueezy.com/checkout" id="buy2" class="buy-btn">BU SESİ HATIRAYA DÖNÜŞTÜR</a>
    </div>

    <div id="debug">Sistem hazır. Butonlara basıldığında hata burada görünecek.</div>

    <script>
        const debug = (msg) => document.getElementById('debug').innerText = "LOG: " + msg;
        const langData = {
            tr: {t1:"CANLI SES DÖVMESİ", t2:"DOSYADAN DÖVME", rec:"🎤 SESİ KAYDET", f:"📁 DOSYA SEÇ", buy:"BU SESİ HATIRAYA DÖNÜŞTÜR"},
            en: {t1:"LIVE VOICE TATTOO", t2:"TATTOO FROM FILE", rec:"🎤 RECORD", f:"📁 CHOOSE FILE", buy:"CONVERT TO MEMORY"},
            de: {t1:"LIVE-STIMMTÄTOWIERUNG", t2:"TATTOO AUS DATEI", rec:"🎤 AUFNEHMEN", f:"📁 DATEI WÄHLEN", buy:"IN ERINNERUNG VERWANDELN"},
            es: {t1:"TATUAJE DE VOZ", t2:"DESDE ARCHIVO", rec:"🎤 GRABAR", f:"📁 ELEGIR", buy:"CONVERTIR EN RECUERDO"},
            zh: {t1:"现场声音纹身", t2:"从文件制作", rec:"🎤 录制", f:"📁 选择文件", buy:"转化为回忆"}
        };

        // DİL DEĞİŞİMİ - DOĞRUDAN MÜDAHALE
        document.getElementById('langSelect').onchange = function() {
            const l = langData[this.value];
            document.getElementById('t1').innerText = l.t1;
            document.getElementById('t2').innerText = l.t2;
            document.getElementById('recBtn').innerText = l.rec;
            document.getElementById('fBtn').innerText = l.f;
            document.getElementById('buy1').innerText = l.buy;
            document.getElementById('buy2').innerText = l.buy;
            debug("Dil " + this.value + " olarak değişti.");
        };

        let audioCtx, liveStream, recorder, chunks = [], liveAud = new Audio(), fileAud = new Audio();

        async function startVisuals(stream, canvasId) {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') await audioCtx.resume();
            
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            const analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            
            const data = new Uint8Array(analyser.frequencyBinCount);
            function draw() {
                requestAnimationFrame(draw);
                analyser.getByteTimeDomainData(data);
                ctx.fillStyle = "#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.lineWidth = 2; ctx.strokeStyle = "#d4ff00";
                ctx.beginPath();
                let x = 0, slice = canvas.width / data.length;
                for(let i=0; i<data.length; i++) {
                    let v = data[i]/128, y = v * canvas.height/2;
                    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
                    x += slice;
                }
                ctx.stroke();
            }
            draw();
        }

        // KAYIT
        document.getElementById('recBtn').onclick = async () => {
            try {
                debug("Mikrofon izni isteniyor...");
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                startVisuals(stream, 'c1');
                recorder = new MediaRecorder(stream);
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const b = new Blob(chunks, {type:'audio/wav'});
                    liveAud.src = URL.createObjectURL(b);
                    document.getElementById('playBtn1').style.display = 'block';
                    document.getElementById('buy1').style.display = 'block';
                };
                recorder.start();
                document.getElementById('recBtn').innerText = "8sn KAYDEDİLİYOR...";
                setTimeout(() => { 
                    recorder.stop(); 
                    stream.getTracks().forEach(t => t.stop());
                    document.getElementById('recBtn').style.display = 'none';
                    debug("Kayıt bitti.");
                }, 8000);
            } catch (err) { debug("HATA: " + err.message); }
        };

        // DOSYA
        document.getElementById('fIn').onchange = (e) => {
            const f = e.target.files[0];
            if(f) {
                fileAud.src = URL.createObjectURL(f);
                document.getElementById('playBtn2').style.display = 'block';
                document.getElementById('buy2').style.display = 'block';
                debug("Dosya yüklendi: " + f.name);
            }
        };

        document.getElementById('playBtn1').onclick = () => liveAud.play();
        document.getElementById('playBtn2').onclick = () => fileAud.play();
    </script>
</body>
</html>
