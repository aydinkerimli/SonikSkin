<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonik Skin - Fixed Build</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --neon: #d4ff00; --azure: #00a2ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: radial-gradient(circle at top right, #003366 0%, #050505 100%);
            color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0;
            display: flex; flex-direction: column; min-height: 100vh;
        }
        header {
            padding: 15px 25px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-weight: 900; font-size: 1.4rem; letter-spacing: 1px; }
        .logo span { color: var(--neon); }

        /* DİLLƏR ÜÇÜN SADƏ VƏ İŞLƏK SAHƏ */
        .lang-switcher { display: flex; gap: 10px; }
        .lang-link { 
            font-size: 12px; font-weight: bold; cursor: pointer; opacity: 0.6; 
            padding: 5px 8px; border: 1px solid rgba(255,255,255,0.2); border-radius: 5px;
        }
        .lang-link.active { opacity: 1; border-color: var(--neon); color: var(--neon); }

        .container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px; border-radius: 35px; width: 100%; max-width: 400px; text-align: center;
        }
        .wave-box {
            background: #000; height: 160px; border-radius: 20px; margin: 20px 0;
            position: relative; border: 1px solid rgba(0, 162, 255, 0.3); display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        canvas { width: 100%; height: 100%; }
        #timer { position: absolute; top: 10px; right: 15px; color: var(--neon); font-weight: bold; font-family: monospace; }
        
        .btn { width: 100%; padding: 16px; margin-bottom: 10px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-gray { background: rgba(255,255,255,0.1); color: white; }
        .btn-main { background: var(--neon); color: black; font-weight: 900; margin-top: 10px; }
        .btn-listen { background: var(--azure); color: white; display: none; }
        .btn:active { transform: scale(0.97); }
    </style>
</head>
<body>

<header>
    <div class="logo">SONIK <span>SKIN</span></div>
    <div class="lang-switcher">
        <span class="lang-link active" onclick="setLang('tr', this)">TR</span>
        <span class="lang-link" onclick="setLang('en', this)">EN</span>
        <span class="lang-link" onclick="setLang('ru', this)">RU</span>
    </div>
</header>

<div class="container">
    <div class="card">
        <h2 id="ui-title">DOSYADAN DÖVME YAP</h2>
        <div class="wave-box" id="captureArea">
            <canvas id="waveCanvas"></canvas>
            <div id="timer">00:00 / 00:08</div>
        </div>
        
        <button class="btn btn-gray" onclick="startRec()">🎤 <span id="ui-rec">Sesi Kaydet</span></button>
        <input type="file" id="fInp" hidden accept="audio/*" onchange="loadFile(event)">
        <button class="btn btn-gray" onclick="document.getElementById('fInp').click()">📁 <span id="ui-select">Dosya Seç</span></button>
        
        <button class="btn btn-listen" id="playBtn" onclick="play()">▶ <span id="ui-listen">Dinle</span></button>
        
        <button class="btn btn-main" onclick="handleBtn()" id="ui-main">Bunu Hatıraya Dönüştür (İNDİR)</button>
    </div>
</div>

<script>
    // Lemon Squeezy Linkin
    const MY_LINK = "https://sonik-skin.lemonsqueezy.com/checkout/buy/ffd068b3-1426-421d-b589-8c612056fd7e";

    // Dil lüğəti
    const langs = {
        tr: { title: "DOSYADAN DÖVME YAP", rec: "Sesi Kaydet", select: "Dosya Seç", listen: "Dinle", main: "Bunu Hatıraya Dönüştür" },
        en: { title: "CREATE TATTOO FROM FILE", rec: "Record Voice", select: "Choose File", listen: "Listen", main: "Convert to Memory" },
        ru: { title: "ТАТУ ИЗ ФАЙЛА", rec: "Записать голос", select: "Выбрать файл", listen: "Слушать", main: "Сохранить в память" }
    };

    function setLang(lang, el) {
        // Düymə rənglərini dəyiş
        document.querySelectorAll('.lang-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
        
        // Mətnləri dəyiş
        document.getElementById('ui-title').innerText = langs[lang].title;
        document.getElementById('ui-rec').innerText = langs[lang].rec;
        document.getElementById('ui-select').innerText = langs[lang].select;
        document.getElementById('ui-listen').innerText = langs[lang].listen;
        document.getElementById('ui-main').innerText = langs[lang].main;
    }

    // Səs və Dalğa funksiyaları (Sənin orijinal kodun)
    let rec, chunks = [], audio, anim;
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');

    function draw(active = false) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let mid = canvas.height / 2;
        for (let i = 0; i < canvas.width; i += 10) {
            let h = active ? Math.random() * 80 + 20 : 35;
            let g = ctx.createLinearGradient(0, mid-h/2, 0, mid+h/2);
            g.addColorStop(0, '#00a2ff'); g.addColorStop(0.5, '#d4ff00'); g.addColorStop(1, '#00a2ff');
            ctx.fillStyle = g; ctx.beginPath(); ctx.roundRect(i, mid-h/2, 6, h, 4); ctx.fill();
        }
    }
    draw();

    function handleBtn() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('status') === 'success') {
            const area = document.getElementById('captureArea');
            document.getElementById('timer').style.display = 'none';
            html2canvas(area, { backgroundColor: "#000", scale: 4 }).then(c => {
                const a = document.createElement('a');
                a.download = 'sonik-tattoo.png';
                a.href = c.toDataURL();
                a.click();
                document.getElementById('timer').style.display = 'block';
            });
        } else {
            window.location.href = MY_LINK;
        }
    }

    async function startRec() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ audio: true });
            rec = new MediaRecorder(s); rec.start(); chunks = []; let sec = 0;
            const t = setInterval(() => {
                sec++; draw(true);
                document.getElementById('timer').innerText = `00:0${sec} / 00:08`;
                if(sec >= 8) { clearInterval(t); rec.stop(); draw(false); s.getTracks().forEach(k => k.stop()); }
            }, 1000);
            rec.onstop = () => { setup(URL.createObjectURL(new Blob(chunks))); };
            rec.ondataavailable = e => chunks.push(e.data);
        } catch(e) { alert("Mikrofon xətası!"); }
    }

    function loadFile(e) {
        const f = e.target.files[0];
        if(f) { const r = new FileReader(); r.onload = (v) => setup(v.target.result); r.readAsDataURL(f); }
    }

    function setup(u) {
        audio = new Audio(u); document.getElementById('playBtn').style.display = 'flex';
        document.getElementById('timer').innerText = "00:08 / 00:08"; draw();
    }

    function play() {
        if(!audio) return; audio.play();
        anim = setInterval(() => { draw(true); if(audio.paused || audio.ended) { clearInterval(anim); draw(false); } }, 100);
    }
</script>
</body>
</html>
