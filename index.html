<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SONIC SKIN - Artist Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --neon: #d4ff00; --bg: #050505; }
        body {
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f2027);
            background-size: 400% 400%; animation: moveGradient 15s ease infinite;
            color: white; font-family: sans-serif; margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column;
        }
        @keyframes moveGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        header { width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-weight: 900; color: var(--neon); font-size: 1.1rem; cursor: pointer; }

        .container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .card { background: rgba(17, 17, 17, 0.9); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; }

        .wave-box { background: #000; height: 180px; border-radius: 20px; margin-bottom: 25px; position: relative; border: 1px solid #1a1a1a; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        canvas { width: 100%; height: 100%; }
        #timer { position: absolute; top: 12px; right: 15px; color: var(--neon); font-family: monospace; font-size: 12px; }

        .btn { width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 15px; border: none; font-weight: bold; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .btn-gray { background: #222; color: #fff; border: 1px solid #333; }
        .btn-main { background: var(--neon); color: #000; }
        
        #login-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 9999; justify-content: center; align-items: center; }
        .login-card { background: #111; border: 1px solid var(--neon); padding: 30px; border-radius: 20px; width: 90%; max-width: 340px; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">SONIK SKIN</div>
    <button class="btn-main" style="width:auto; padding:8px 15px; font-size:12px;" onclick="document.getElementById('login-modal').style.display='flex'">ARTIST LOGIN</button>
</header>

<div id="login-modal">
    <div class="login-card">
        <h3 style="color:var(--neon)">ARTIST LOGIN</h3>
        <input type="email" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px; background:#000; border:1px solid #333; color:#fff;">
        <input type="password" placeholder="Password" style="width:100%; padding:10px; margin-bottom:15px; background:#000; border:1px solid #333; color:#fff;">
        <button class="btn btn-main" onclick="document.getElementById('login-modal').style.display='none'">LOGIN</button>
    </div>
</div>

<div class="container">
    <div class="card">
        <h2 style="font-size: 1.2rem; margin-bottom: 20px;">GENERATE SOUND WAVE</h2>
        
        <div class="wave-box" id="captureZone">
            <canvas id="waveCanvas"></canvas>
            <div id="timer">00:00 / 00:08</div>
        </div>

        <div id="action-area">
            <button class="btn btn-gray" id="btn-rec" onclick="initMic()">🎤 RECORD</button>
            <input type="file" id="fInp" hidden onchange="handleFile(event)">
            <button class="btn btn-gray" onclick="document.getElementById('fInp').click()">📁 CHOOSE FILE</button>
            <button class="btn btn-main" id="btn-download" onclick="downloadPNG()" style="display:none;">📥 DOWNLOAD PNG</button>
        </div>
    </div>
</div>

<script>
    let recorder, chunks = [], animFrame, analyser, dataArray, staticDataArray = [];
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');

    async function initMic() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            analyser.fftSize = 64;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            recorder = new MediaRecorder(stream);
            recorder.start(); chunks = [];
            let s = 0;
            const t = setInterval(() => {
                s++; 
                document.getElementById('timer').innerText = `00:0${s} / 00:08`;
                if(s >= 8) { 
                    clearInterval(t); 
                    recorder.stop(); 
                    stream.getTracks().forEach(tr => tr.stop()); 
                }
            }, 1000);

            recorder.onstop = () => processAudio(new Blob(chunks));
            recorder.ondataavailable = e => chunks.push(e.data);
            drawLive();
        } catch(e) { alert("Mikrofona icazə verilmədi!"); }
    }

    function handleFile(e) { if(e.target.files[0]) processAudio(e.target.files[0]); }

    async function processAudio(blob) {
        const arrayBuffer = await blob.arrayBuffer();
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const decoded = await audioCtx.decodeAudioData(arrayBuffer);
        generateWave(decoded);
        document.getElementById('btn-download').style.display = 'flex';
    }

    function drawLive() {
        animFrame = requestAnimationFrame(drawLive);
        analyser.getByteFrequencyData(dataArray);
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#d4ff00'; ctx.lineWidth = 3;
        let x = 0;
        const slice = canvas.width / dataArray.length;
        for(let i=0; i<dataArray.length; i++) {
            let h = (dataArray[i] / 255) * (canvas.height * 0.7);
            ctx.beginPath(); ctx.moveTo(x, canvas.height/2 - h/2); ctx.lineTo(x, canvas.height/2 + h/2); ctx.stroke();
            x += slice;
        }
    }

    function generateWave(buffer) {
        cancelAnimationFrame(animFrame);
        const rawData = buffer.getChannelData(0);
        const samples = 60;
        const blockSize = Math.floor(rawData.length / samples);
        staticDataArray = [];
        for (let i = 0; i < samples; i++) {
            let sum = 0;
            for (let j = 0; j < blockSize; j++) { sum += Math.abs(rawData[(blockSize * i) + j]); }
            staticDataArray.push(sum / blockSize);
        }
        drawFinal();
    }

    function drawFinal() {
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        const barWidth = canvas.width / staticDataArray.length;
        
        // Səs Dalğası
        staticDataArray.forEach((val, i) => {
            const h = val * canvas.height * 3.5;
            ctx.strokeStyle = `hsl(${i * 4}, 100%, 50%)`;
            ctx.lineWidth = 3; ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(i * barWidth + barWidth/2, (canvas.height/2 - 25) - h/2);
            ctx.lineTo(i * barWidth + barWidth/2, (canvas.height/2 - 25) + h/2);
            ctx.stroke();
        });

        // BALACA SKAN KODU (Barcode) - Dalğanın altına ehtiyatla əlavə olundu
        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2;
        for(let i=20; i < canvas.width-20; i+=6) {
            let h = Math.random() * 10 + 4;
            ctx.beginPath();
            ctx.moveTo(i, canvas.height - 35 - h/2);
            ctx.lineTo(i, canvas.height - 35 + h/2);
            ctx.stroke();
        }
        
        ctx.fillStyle = 'rgba(212, 255, 0, 0.5)';
        ctx.font = 'bold 10px Arial';
        ctx.fillText("SONIC SKIN • AUDIO TRACE", canvas.width/2 - 60, canvas.height - 10);
    }

    function downloadPNG() {
        const link = document.createElement('a');
        link.download = `sonic-skin-${Date.now()}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
    }
</script>
</body>
</html>
