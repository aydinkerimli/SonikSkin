<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Skin | Final Master</title>
    <style>
        :root { --accent: #d4ff00; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; }
        .panel { background: #111; border: 2px solid #222; border-radius: 20px; width: 95%; max-width: 420px; margin: 15px auto; padding: 20px; box-sizing: border-box; }
        .tattoo-box { width: 100%; aspect-ratio: 1/1; background: #000; border: 1px dashed #444; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; }
        canvas { width: 100%; height: 60%; }
        .btn { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; display: block; font-size: 14px; transition: 0.3s; }
        #recBtn { background: #ff3e3e; color: white; }
        #playBtn1, #playBtn2 { background: #333; color: white; display: none; }
        .buy-btn { background: var(--accent); color: black; display: none; text-decoration: none; padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 10px; font-size: 14px; }
        select { padding: 12px; margin: 10px 0; border-radius: 8px; background: #222; color: #fff; border: 1px solid #444; width: 200px; cursor: pointer; }
        #debug { color: #555; font-size: 11px; margin-top: 15px; font-family: monospace; }
        h2 { font-size: 18px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <select id="langSelect">
        <option value="tr">Türkçe</option>
        <option value="en">English</option>
        <option value="ru">Русский</option>
        <option value="de">Deutsch</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="zh">中文</option>
    </select>

    <div class="panel">
        <h2 id="t1">CANLI SES DÖVMESİ</h2>
        <div class="tattoo-box"><canvas id="c1"></canvas></div>
        <button id="recBtn" class="btn">🎤 SESİ KAYDET</button>
        <button id="playBtn1" class="btn">▶️ KAYDI DİNLE</button>
        <a href="https://sonic-skin.lemonsqueezy.com/checkout" id="buy1" class="buy-btn">BU SESİ HATIRAYA DÖNÜŞTÜR</a>
    </div>

    <div class="panel">
        <h2 id="t2">DOSYADAN DÖVME YAP</h2>
        <div class="tattoo-box"><canvas id="c2"></canvas></div>
        <input type="file" id="fIn" hidden accept="audio/*">
        <button onclick="document.getElementById('fIn').click()" id="fBtn" class="btn" style="background:#222; color:#fff; border:1px solid #444;">📁 SES DOSYASI SEÇ</button>
        <button id="playBtn2" class="btn">▶️ DOSYAYI DİNLE</button>
        <a href="https://sonic-skin.lemonsqueezy.com/checkout" id="buy2" class="buy-btn">BU SESİ HATIRAYA DÖNÜŞTÜR</a>
    </div>

    <div id="debug">Sistem hazır.</div>

    <script>
        const log = (m) => document.getElementById('debug').innerText = "LOG: " + m;
        
        const langData = {
            tr: {t1:"CANLI SES DÖVMESİ", t2:"DOSYADAN DÖVME YAP", rec:"🎤 SESİ KAYDET", f:"📁 SES DOSYASI SEÇ", buy:"BU SESİ HATIRAYA DÖNÜŞTÜR", play:"▶️ DİNLE", recStop:"8sn Kaydediliyor..."},
            en: {t1:"LIVE VOICE TATTOO", t2:"TATTOO FROM FILE", rec:"🎤 RECORD VOICE", f:"📁 CHOOSE AUDIO FILE", buy:"CONVERT VOICE TO MEMORY", play:"▶️ PLAY", recStop:"Recording 8s..."},
            ru: {t1:"ЖИВАЯ ТАТУ ГОЛОСА", t2:"ТАТУ ИЗ ФАЙЛА", rec:"🎤 ЗАПИСАТЬ ГОЛОС", f:"📁 ВЫБРАТЬ ФАЙЛ", buy:"ПРЕВРАТИТЬ В ПАМЯТЬ", play:"▶️ СЛУШАТЬ", recStop:"Запись 8 сек..."},
            de: {t1:"LIVE-STIMMTÄTOWIERUNG", t2:"STIMME AUS DATEI", rec:"🎤 STIMME AUFNEHMEN", f:"📁 DATEI WÄHLEN", buy:"IN ERINNERUNG VERWANDELN", play:"▶️ ABSPIELEN", recStop:"8 Sek. Aufnahme..."},
            es: {t1:"TATUAJE DE VOZ EN VIVO", t2:"TATUAJE DESDE ARCHIVO", rec:"🎤 GRABAR VOZ", f:"📁 ELEGIR ARCHIVO", buy:"CONVERTIR EN RECUERDO", play:"▶️ REPRODUCIR", recStop:"Grabando 8s..."},
            fr: {t1:"TATOUAGE VOCAL EN DIRECT", t2:"TATOUAGE VIA FICHIER", rec:"🎤 ENREGISTRER", f:"📁 CHOISIR UN FICHIER", buy:"TRANSFORMER EN SOUVENIR", play:"▶️ ÉCOUTER", recStop:"Enregistrement 8s..."},
            zh: {t1:"现场声音纹身", t2:"从文件制作纹身", rec:"🎤 录制声音", f:"📁 选择音频文件", buy:"将声音转化为回忆", play:"▶️ 播放", recStop:"正在录音 8秒..."}
        };

        const langSelect = document.getElementById('langSelect');
        langSelect.onchange = function() {
            const l = langData[this.value];
            document.getElementById('t1').innerText = l.t1;
            document.getElementById('t2').innerText = l.t2;
            document.getElementById('recBtn').innerText = l.rec;
            document.getElementById('fBtn').innerText = l.f;
            document.getElementById('buy1').innerText = l.buy;
            document.getElementById('buy2').innerText = l.buy;
            document.getElementById('playBtn1').innerText = l.play;
            document.getElementById('playBtn2').innerText = l.play;
            log("Dil: " + this.value);
        };

        let audioCtx, recorder, chunks = [], liveAud = new Audio(), fileAud = new Audio();

        async function initVisuals(stream, canvasId) {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') await audioCtx.resume();
            
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            const analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            
            const data = new Uint8Array(analyser.frequencyBinCount);
            function draw() {
                requestAnimationFrame(draw);
                analyser.getByteTimeDomainData(data);
                ctx.fillStyle = "#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.lineWidth = 2; ctx.strokeStyle = "#d4ff00";
                ctx.beginPath();
                let x = 0, slice = canvas.width / data.length;
                for(let i=0; i<data.length; i++) {
                    let v = data[i]/128, y = v * canvas.height/2;
                    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
                    x += slice;
                }
                ctx.stroke();
            }
            draw();
        }

        document.getElementById('recBtn').onclick = async function() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                initVisuals(stream, 'c1');
                recorder = new MediaRecorder(stream);
                chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const b = new Blob(chunks, {type:'audio/wav'});
                    liveAud.src = URL.createObjectURL(b);
                    document.getElementById('playBtn1').style.display = 'block';
                    document.getElementById('buy1').style.display = 'inline-block';
                };
                recorder.start();
                this.innerText = langData[langSelect.value].recStop;
                this.disabled = true;
                setTimeout(() => { 
                    recorder.stop(); 
                    stream.getTracks().forEach(t => t.stop());
                    this.style.display = 'none';
                    log("Kayıt tamamlandı.");
                }, 8000);
            } catch (e) { log("Mikrofon Hatası: " + e.message); }
        };

        document.getElementById('fIn').onchange = function(e) {
            const f = e.target.files[0];
            if(f) {
                fileAud.src = URL.createObjectURL(f);
                document.getElementById('playBtn2').style.display = 'block';
                document.getElementById('buy2').style.display = 'inline-block';
                log("Dosya seçildi.");
            }
        };

        document.getElementById('playBtn1').onclick = () => liveAud.play();
        document.getElementById('playBtn2').onclick = () => fileAud.play();
    </script>
</body>
</html>
