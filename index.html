<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonik Skin - Universal Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --neon: #d4ff00; --bg: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f2027);
            background-size: 400% 400%;
            animation: moveGradient 15s ease infinite;
            color: white; font-family: sans-serif;
            margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-weight: 900; color: var(--neon); font-size: 1.1rem; cursor: pointer; }

        .lang-dropdown { position: relative; }
        .lang-btn { background: #222; border: 1px solid #444; color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .lang-content {
            display: none; position: absolute; right: 0; background: #1a1a1a;
            min-width: 110px; border: 1px solid #333; border-radius: 8px; z-index: 1000;
        }
        .lang-content span { padding: 12px; display: block; cursor: pointer; border-bottom: 1px solid #222; font-size: 13px; }
        .lang-dropdown:hover .lang-content { display: block; }

        .container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .card {
            background: rgba(17, 17, 17, 0.9); border: 1px solid rgba(255,255,255,0.1); padding: 25px;
            border-radius: 25px; width: 100%; max-width: 380px; text-align: center;
        }

        .wave-box {
            background: #000; height: 140px; border-radius: 20px; margin-bottom: 25px;
            position: relative; border: 1px solid #1a1a1a; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        #lock-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(15px);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; color: #fff; text-align: center; padding: 10px;
        }

        canvas { width: 100%; height: 100%; background: #000; }
        #timer { position: absolute; top: 12px; right: 15px; color: var(--neon); font-family: monospace; font-size: 14px; z-index: 5; }

        .btn {
            width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 15px; border: none;
            font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-gray { background: #222; color: #fff; border: 1px solid #333; }
        .btn-listen { background: #2a2a2a; color: var(--neon); display: none; }
        .btn-main { background: var(--neon); color: #000; }
        
        #success-btn { display: none; background: #00c3ff; color: #fff; animation: pulse 1.5s infinite; border: 2px solid #fff; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="resetPage()">SONIK SKIN</div>
    <div class="lang-dropdown">
        <button class="lang-btn" id="curLang">TR ▾</button>
        <div class="lang-content">
            <span onclick="updateLang('tr')">Türkçe</span>
            <span onclick="updateLang('en')">English</span>
            <span onclick="updateLang('ru')">Русский</span>
            <span onclick="updateLang('fr')">Français</span>
            <span onclick="updateLang('zh')">中文</span>
            <span onclick="updateLang('de')">Deutsch</span>
        </div>
    </div>
</header>

<div class="container">
    <div class="card">
        <h2 id="ui-title">DOSYADAN DÖVME YAP</h2>
        
        <div class="wave-box" id="captureZone">
            <canvas id="waveCanvas"></canvas>
            <div id="timer">00:00 / 00:08</div>
            <div id="lock-overlay">
                <span id="ui-lock-title" style="font-weight: bold; font-size: 16px;">🔒</span>
                <p id="ui-lock-msg" style="font-size: 11px; margin-top: 5px; opacity: 0.8;"></p>
            </div>
        </div>

        <button class="btn btn-main" id="success-btn" onclick="downloadPNG()">✅ <span id="ui-success">ÖDEME BAŞARILI! TIKLA İNDİR</span></button>
        
        <div id="action-area">
            <button class="btn btn-gray" id="btn-rec" onclick="initMic()">🎤 <span id="ui-rec">SESİ KAYDET</span></button>
            <input type="file" id="fInp" hidden onchange="handleFile(event)">
            <button class="btn btn-gray" id="btn-file" onclick="document.getElementById('fInp').click()">📁 <span id="ui-select">DOSYA SEÇ</span></button>
            <button class="btn btn-listen" id="btn-play" onclick="playAudio()">🔊 <span id="ui-listen">DİNLE</span></button>
            <button class="btn btn-main" onclick="handleCheckoutFlow()" id="ui-down">BUNU HATIRAYA DÖNÜŞTÜR (İNDİR)</button>
        </div>
    </div>
</div>

<script>
    const LEMON_LINK = "https://sonikskin.lemonsqueezy.com/checkout/buy/7997dd0f-76bd-4a1c-99f5-b2253aeb1ee6";
    
    const langs = {
        tr: { title: "DOSYADAN DÖVME YAP", select: "DOSYA SEÇ", down: "BUNU HATIRAYA DÖNÜŞTÜR (İNDİR)", listen: "DİNLE", rec: "SESİ KAYDET", success: "ÖDEME BAŞARILI! TIKLA İNDİR", lockT: "🔒 ÖNİZLEME KİLİTLİ", lockM: "Tam sürüm için ödeme yapın" },
        en: { title: "CREATE TATTOO FROM FILE", select: "CHOOSE FILE", down: "CONVERT TO MEMORY (DOWNLOAD)", listen: "LISTEN", rec: "RECORD", success: "PAYMENT SUCCESS! CLICK TO DOWNLOAD", lockT: "🔒 PREVIEW LOCKED", lockM: "Pay for the full version" },
        ru: { title: "ТАТУ ИЗ ФАЙЛА", select: "ВЫБРАТЬ ФАЙЛ", down: "ПРЕВРАТИТЬ В ПАМЯТЬ (СКАЧАТЬ)", listen: "СЛУШАТЬ", rec: "ЗАПИСЬ", success: "ОПЛАТА УСПЕШНА! СКАЧАТЬ", lockT: "🔒 ПРЕДПРОСМОТР ЗАБЛОКИРОВАН", lockM: "Оплатите полную версию" },
        fr: { title: "CRÉER TATOUAGE", select: "CHOISIR UN FICHIER", down: "CONVERTIR EN SOUVENIR (TÉLÉCHARGER)", listen: "ÉCOUTER", rec: "ENREGISTRER", success: "PAIEMENT RÉUSSI ! TÉLÉCHARGER", lockT: "🔒 APERÇU VERROUILLÉ", lockM: "Payez pour la version complète" },
        zh: { title: "纹身制作", select: "选择文件", down: "将其转化为记忆 (下载)", listen: "倾听", rec: "录音", success: "支付成功！点击下载", lockT: "🔒 预览已锁定", lockM: "支付以获取完整版" },
        de: { title: "TATTOO DATEI", select: "WÄHLEN", down: "IN ERINNERUNG VERWANDELN (DOWNLOAD)", listen: "ANHÖREN", rec: "AUFNAHME", success: "ZAHLUNG ERFOLGREICH! HERUNTERLADEN", lockT: "🔒 VORSCHAU GESPERRT", lockM: "Für Vollversion bezahlen" }
    };

    let recorder, chunks = [], audioURL, audio, animFrame, analyser, dataArray;
    let staticDataArray = []; 
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('lock-overlay');

    window.onload = function() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        const savedLang = localStorage.getItem('sonikLang') || 'tr';
        updateLang(savedLang);
        const params = new URLSearchParams(window.location.search);
        if (params.get('status') === 'success') {
            overlay.style.display = 'none';
            document.getElementById('success-btn').style.display = 'flex';
            document.getElementById('action-area').style.display = 'none';
            if(localStorage.getItem('lastStaticWave')) {
                staticDataArray = JSON.parse(localStorage.getItem('lastStaticWave'));
                drawStaticWave(true);
            }
        }
    };

    function clearPreviousSession() {
        // Yeni səs yüklənəndə köhnəni tamamilə sıfırla
        if (animFrame) cancelAnimationFrame(animFrame);
        if (audio) { audio.pause(); audio = null; }
        staticDataArray = [];
        overlay.style.display = 'none';
        ctx.clearRect(0, 0, canvas.width, canvas.height); // Ekranı tam sil
        document.getElementById('timer').innerText = "00:00 / 00:08";
        document.getElementById('btn-play').style.display = 'none';
    }

    function updateLang(l) {
        localStorage.setItem('sonikLang', l);
        document.getElementById('ui-title').innerText = langs[l].title;
        document.getElementById('ui-select').innerText = langs[l].select;
        document.getElementById('ui-down').innerText = langs[l].down;
        document.getElementById('ui-listen').innerText = langs[l].listen;
        document.getElementById('ui-rec').innerText = langs[l].rec;
        document.getElementById('ui-success').innerText = langs[l].success;
        document.getElementById('ui-lock-title').innerText = langs[l].lockT;
        document.getElementById('ui-lock-msg').innerText = langs[l].lockM;
        document.getElementById('curLang').innerText = l.toUpperCase() + " ▾";
    }

    function setupStreamAnalyser(streamOrElement) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        let source;
        if (streamOrElement instanceof MediaStream) {
            source = audioCtx.createMediaStreamSource(streamOrElement);
        } else {
            source = audioCtx.createMediaElementSource(streamOrElement);
        }
        source.connect(analyser);
        if (!(streamOrElement instanceof MediaStream)) analyser.connect(audioCtx.destination);
        analyser.fftSize = 128;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        drawWave();
    }

    async function processAudioData(data) {
        overlay.style.display = 'none';
        audioURL = URL.createObjectURL(data);
        audio = new Audio(audioURL);
        const arrayBuffer = await data.arrayBuffer();
        const audioCtx = new AudioContext();
        const decodedData = await audioCtx.decodeAudioData(arrayBuffer);
        
        audio.onended = () => {
            cancelAnimationFrame(animFrame);
            drawStaticWave();
        };

        generateStaticWave(decodedData);
        document.getElementById('btn-play').style.display = 'flex';
        document.getElementById('timer').innerText = `00:08 / 00:08`;
    }

    function generateStaticWave(buffer) {
        const rawData = buffer.getChannelData(0);
        const samples = 60; 
        const blockSize = Math.floor((buffer.sampleRate * 8) / samples);
        staticDataArray = [];
        for (let i = 0; i < samples; i++) {
            let sum = 0;
            for (let j = 0; j < blockSize; j++) { sum += Math.abs(rawData[(blockSize * i) + j] || 0); }
            staticDataArray.push(sum / blockSize);
        }
        localStorage.setItem('lastStaticWave', JSON.stringify(staticDataArray));
        drawStaticWave();
    }

    function drawStaticWave(isPaid = false) {
        if (!isPaid) overlay.style.display = 'flex';
        ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        const barWidth = canvas.width / staticDataArray.length;
        staticDataArray.forEach((val, i) => {
            const h = val * canvas.height * 5;
            ctx.strokeStyle = (i/staticDataArray.length < 0.2 || i/staticDataArray.length > 0.8) ? '#00c3ff' : '#ffff1c';
            ctx.lineWidth = 3; ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(i * barWidth + barWidth/2, (canvas.height/2) - (h/2));
            ctx.lineTo(i * barWidth + barWidth/2, (canvas.height/2) + (h/2));
            ctx.stroke();
        });
    }

    function playAudio() {
        if(!audio) return;
        overlay.style.display = 'none';
        setupStreamAnalyser(audio);
        audio.play();
    }

    function drawWave() {
        if (!analyser) return;
        animFrame = requestAnimationFrame(drawWave);
        analyser.getByteFrequencyData(dataArray);
        ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        const grad = ctx.createLinearGradient(0, 0, canvas.width, 0);
        grad.addColorStop(0, '#00c3ff'); grad.addColorStop(0.5, '#ffff1c'); grad.addColorStop(1, '#ff1744');
        ctx.strokeStyle = grad; ctx.lineWidth = 4; ctx.lineCap = 'round';
        ctx.beginPath();
        const barWidth = (canvas.width / dataArray.length) * 2.5;
        let x = 0;
        for (let i = 0; i < dataArray.length; i++) {
            const h = dataArray[i] / 2;
            ctx.moveTo(x, canvas.height/2 - h/2); ctx.lineTo(x, canvas.height/2 + h/2);
            x += barWidth + 2;
        }
        ctx.stroke();
    }

    async function initMic() {
        clearPreviousSession(); // KÖHNƏ SESSİYANI SİL
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            setupStreamAnalyser(stream);
            recorder = new MediaRecorder(stream);
            recorder.start(); chunks = [];
            let s = 0; 
            const t = setInterval(() => {
                s++; document.getElementById('timer').innerText = `00:0${s} / 00:08`;
                if(s >= 8) { 
                    clearInterval(t); recorder.stop(); 
                    stream.getTracks().forEach(tr => tr.stop());
                    cancelAnimationFrame(animFrame);
                }
            }, 1000);
            recorder.onstop = () => processAudioData(new Blob(chunks));
            recorder.ondataavailable = e => chunks.push(e.data);
        } catch(e) { alert("Mikrofon hatası!"); }
    }

    function handleFile(e) { 
        if(e.target.files[0]) {
            clearPreviousSession(); // KÖHNƏ SESSİYANI SİL
            processAudioData(e.target.files[0]);
        }
    }

    function handleCheckoutFlow() { if(staticDataArray.length === 0) return; window.location.href = LEMON_LINK; }
    function downloadPNG() { drawStaticWave(true); const link = document.createElement('a'); link.download = 'sonik-skin.png'; link.href = canvas.toDataURL(); link.click(); }
    function resetPage() { localStorage.removeItem('lastStaticWave'); window.location.href = window.location.origin + window.location.pathname; }
</script>
</body>
</html>
