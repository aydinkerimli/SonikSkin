<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonik Skin Premium</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --neon: #d4ff00; --bg: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, var(--bg) 100%);
            color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column;
        }

        header {
            width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid #222;
        }
        .logo { font-weight: 900; letter-spacing: 1px; color: var(--neon); font-size: 1.2rem; }
        
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .auth-btns { display: none; } 
        @media (min-width: 600px) { .auth-btns { display: flex; gap: 15px; font-size: 12px; color: #888; } }

        .lang-dropdown { position: relative; }
        .lang-btn { background: #222; border: 1px solid #444; color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        .lang-content {
            display: none; position: absolute; right: 0; background: #1a1a1a;
            min-width: 120px; border: 1px solid #333; border-radius: 10px; z-index: 1000;
        }
        .lang-content span { padding: 12px; display: block; cursor: pointer; border-bottom: 1px solid #222; font-size: 14px; }
        .lang-dropdown:hover .lang-content { display: block; }

        .container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .card {
            background: #111; border: 1px solid #222; padding: 25px;
            border-radius: 30px; width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        h2 { font-size: 1.1rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        .wave-box {
            background: #000; height: 150px; border-radius: 20px; margin-bottom: 20px;
            position: relative; border: 1px solid #1a1a1a; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        canvas { width: 100%; height: 100%; }
        #timer { position: absolute; top: 12px; right: 15px; color: var(--neon); font-family: monospace; font-size: 14px; }

        .btn {
            width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 15px; border: none;
            font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-gray { background: #222; color: #fff; border: 1px solid #333; }
        .btn-listen { background: #2a2a2a; color: var(--neon); display: none; }
        .btn-main { background: var(--neon); color: #000; margin-top: 10px; }
        
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

<header>
    <div class="logo">SONIK SKIN</div>
    <div class="nav-right">
        <div class="auth-btns">
            <span id="u-login">USER LOGIN</span>
            <span id="a-login">ARTIST LOGIN</span>
        </div>
        <div class="lang-dropdown">
            <button class="lang-btn" id="curLang">TR ▾</button>
            <div class="lang-content">
                <span onclick="updateLang('tr')">Türkçe</span>
                <span onclick="updateLang('en')">English</span>
                <span onclick="updateLang('ru')">Русский</span>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <div class="card">
        <h2 id="ui-title">DOSYADAN DÖVME YAP</h2>
        
        <div class="wave-box" id="waveCaptureArea">
            <canvas id="waveCanvas"></canvas>
            <div id="timer">00:00 / 00:08</div>
        </div>

        <button class="btn btn-gray" id="btn-rec" onclick="startRec()">🎤 <span id="ui-rec">SESİ KAYDET</span></button>
        
        <input type="file" id="fInp" hidden accept="audio/*" onchange="handleFile(event)">
        <button class="btn btn-gray" onclick="document.getElementById('fInp').click()">📁 <span id="ui-select">DOSYA SEÇ</span></button>

        <button class="btn btn-listen" id="btn-play" onclick="playAudio()">🔊 <span id="ui-listen">DİNLE</span></button>

        <button class="btn btn-main" onclick="handleMainAction()" id="ui-down">BUNU HATIRAYA DÖNÜŞTÜR (İNDİR)</button>
    </div>
</div>

<script>
    // Lemon Squeezy Linkin
    const LEMON_LINK = "https://sonik-skin.lemonsqueezy.com/checkout/buy/ffd068b3-1426-421d-b589-8c612056fd7e";

    const langs = {
        tr: { title: "DOSYADAN DÖVME YAP", select: "DOSYA SEÇ", down: "BUNU HATIRAYA DÖNÜŞTÜR (İNDİR)", listen: "DİNLE", rec: "SESİ KAYDET", u: "GİRİŞ", a: "SANATÇI" },
        en: { title: "CREATE TATTOO FROM FILE", select: "CHOOSE FILE", down: "CONVERT TO MEMORY", listen: "LISTEN", rec: "RECORD", u: "LOGIN", a: "ARTIST" },
        ru: { title: "ТАТУ ИЗ ФАЙЛА", select: "ФАЙЛ", down: "СКАЧАТЬ", listen: "СЛУШАТЬ", rec: "ЗАПИСЬ", u: "ВХОД", a: "АРТ" }
    };

    let recorder, chunks = [], audioURL, audio;
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');

    function updateLang(l) {
        document.getElementById('ui-title').innerText = langs[l].title;
        document.getElementById('ui-select').innerText = langs[l].select;
        document.getElementById('ui-down').innerText = langs[l].down;
        document.getElementById('ui-listen').innerText = langs[l].listen;
        document.getElementById('ui-rec').innerText = langs[l].rec;
        document.getElementById('curLang').innerText = l.toUpperCase() + " ▾";
    }

    function draw(active = false) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#d4ff00'; ctx.lineWidth = 3; ctx.beginPath();
        for(let i=0; i<canvas.width; i+=6) {
            let h = active ? Math.random()*80 + 10 : 30;
            ctx.moveTo(i, canvas.height/2 - h/2); ctx.lineTo(i, canvas.height/2 + h/2);
        }
        ctx.stroke();
    }
    draw();

    // ÖDƏNİŞ VƏ YÜKLƏMƏ MƏNTİQİ
    function handleMainAction() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('status') === 'success') {
            // Ödəniş edilibsə şəkli endir
            const area = document.getElementById('waveCaptureArea');
            const timer = document.getElementById('timer');
            timer.style.opacity = '0'; // Taymer şəkildə görünməsin

            html2canvas(area, { backgroundColor: "#000", scale: 4 }).then(cvs => {
                const link = document.createElement('a');
                link.download = 'sonik-skin-tattoo.png';
                link.href = cvs.toDataURL();
                link.click();
                timer.style.opacity = '1';
            });
        } else {
            // Ödəniş yoxdursa Lemon Squeezy-yə yönləndir
            window.location.href = LEMON_LINK;
        }
    }

    async function startRec() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            recorder = new MediaRecorder(stream);
            recorder.start(); chunks = []; let s = 0;
            const t = setInterval(() => {
                s++; draw(true);
                document.getElementById('timer').innerText = `00:0${s} / 00:08`;
                if(s >= 8) { 
                    clearInterval(t); recorder.stop(); draw(false); 
                    stream.getTracks().forEach(track => track.stop());
                }
            }, 1000);

            recorder.onstop = () => {
                audioURL = URL.createObjectURL(new Blob(chunks, { type: 'audio/mp3' }));
                audio = new Audio(audioURL);
                document.getElementById('btn-play').style.display = 'flex';
            };
            recorder.ondataavailable = e => chunks.push(e.data);
        } catch(e) { alert("Mikrofon izni gerekli!"); }
    }

    function playAudio() {
        if(audio) {
            audio.play();
            const anim = setInterval(() => {
                draw(true);
                if(audio.paused || audio.ended) { clearInterval(anim); draw(false); }
            }, 100);
        }
    }

    function handleFile(e) {
        const file = e.target.files[0];
        if(file) {
            audioURL = URL.createObjectURL(file);
            audio = new Audio(audioURL);
            document.getElementById('btn-play').style.display = 'flex';
            draw();
        }
    }
</script>
</body>
</html>
