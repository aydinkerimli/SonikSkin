<!DOCTYPE html>
<html lang="tr" translate="no">

    <title>SonikSkin | Global</title>
    <style>
        :root { --neon: #00ffcc; --bg: #0a0a0a; }

        nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 10px; border-bottom: 1px solid #222; }

        .container { max-width: 500px; margin: 0 auto; }
        h1 { font-size: 28px; margin-bottom: 10px; }
        #status { color: var(--neon); margin: 20px 0; font-weight: bold; height: 24px; }
        .btn { padding: 20px; width: 100%; font-size: 18px; border-radius: 15px; border: none; cursor: pointer; margin-bottom: 15px; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        #recordBtn { background: #ff4757; color: white; box-shadow: 0 5px 15px rgba(255,71,87,0.3); }
        #debug { color: #555; font-size: 11px; margin-top: 40px; border-top: 1px solid #222; padding-top: 10px; }
    </style>
</head>
