<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Tattoo Waveform</title>
    <style>
        /* PREMİUM DİZAYN (CSS) */
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 25px;
            width: 380px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .lang-selector {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .lang-btn {
            background: none;
            border: 1px solid #333;
            color: #888;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            transition: 0.3s;
        }

        .lang-btn.active {
            color: #d4ff00;
            border-color: #d4ff00;
            background: rgba(212, 255, 0, 0.1);
        }

        h2 {
            font-size: 16px;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .waveform-box {
            background: #000;
            height: 120px;
            border-radius: 15px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 1px solid #1a1a1a;
            overflow: hidden;
        }

        /* Dalğa animasiyası simulyasiyası */
        .wave-bar {
            width: 3px;
            height: 20px;
            background: #d4ff00;
            margin: 0 2px;
            border-radius: 10px;
            animation: pulse 1s infinite ease-in-out;
            display: none;
        }

        @keyframes pulse {
            0%, 100% { height: 20px; opacity: 0.5; }
            50% { height: 60px; opacity: 1; }
        }

        .timer {
            position: absolute;
            bottom: 5px;
            right: 10px;
            font-size: 12px;
            color: #666;
        }

        .btn {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-file {
            background: #1a1a1a;
            color: #ccc;
            border: 1px solid #333;
        }

        .btn-listen {
            background: #333;
            color: #fff;
            display: none; /* Fayl seçilməyənə qədər gizli */
        }

        .btn-main {
            background: #d4ff00;
            color: #000;
            margin-top: 15px;
        }

        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="container">
        <div class="lang-selector">
            <button class="lang-btn active" onclick="changeLang('tr')">TR</button>
            <button class="lang-btn" onclick="changeLang('en')">EN</button>
            <button class="lang-btn" onclick="changeLang('ru')">RU</button>
            <button class="lang-btn" onclick="changeLang('fr')">FR</button>
            <button class="lang-btn" onclick="changeLang('zh')">ZH</button>
            <button class="lang-btn" onclick="changeLang('de')">DE</button>
        </div>

        <h2 id="title">DOSYADAN DÖVME YAP</h2>

        <div class="waveform-box" id="waveContainer">
            <div class="wave-bar" style="animation-delay: 0.1s"></div>
            <div class="wave-bar" style="animation-delay: 0.3s"></div>
            <div class="wave-bar" style="animation-delay: 0.5s"></div>
            <div class="wave-bar" style="animation-delay: 0.2s"></div>
            <div class="wave-bar" style="animation-delay: 0.4s"></div>
            <span class="timer" id="timerDisplay">0s / 8s</span>
        </div>

        <input type="file" id="audioInput" accept="audio/*" style="display: none;" onchange="handleFile(this)">
        
        <button class="btn btn-file" onclick="document.getElementById('audioInput').click()" id="selectBtn">
            📁 DOSYA SEÇ
        </button>

        <button class="btn btn-listen" id="listenBtn">
            🔊 DİNLE
        </button>

        <button class="btn btn-main" id="convertBtn">
            BUNU HATIRAYA DÖNÜŞTÜR (İNDİR)
        </button>
    </div>

    <script>
        // LOKALİZASYON DATA
        const translations = {
            tr: { title: "DOSYADAN DÖVME YAP", select: "DOSYA SEÇ", listen: "DİNLE", convert: "BUNU HATIRAYA DÖNÜŞTÜR (İNDİR)" },
            en: { title: "CREATE TATTOO FROM FILE", select: "CHOOSE FILE", listen: "LISTEN", convert: "CONVERT TO MEMORY (DOWNLOAD)" },
            ru: { title: "СОЗДАТЬ ТАТУ ИЗ ФАЙЛА", select: "ВЫБРАТЬ ФАЙЛ", listen: "СЛУШАТЬ", convert: "СКАЧАТЬ ПАМЯТЬ" },
            fr: { title: "CRÉER UN TATOUAGE", select: "CHOISIR FICHIER", listen: "ÉCOUTER", convert: "CONVERTIR EN SOUVENIR" },
            zh: { title: "从文件制作纹身", select: "选择文件", listen: "倾听", convert: "下载回忆" },
            de: { title: "TATTOO AUS DATEI", select: "DATEI WÄHLEN", listen: "ANHÖREN", convert: "ALS ERINNERUNG SPEICHERN" }
        };

        let currentLang = 'tr';

        function changeLang(lang) {
            currentLang = lang;
            document.getElementById('title').innerText = translations[lang].title;
            document.getElementById('selectBtn').innerText = "📁 " + translations[lang].select;
            document.getElementById('listenBtn').innerText = "🔊 " + translations[lang].listen;
            document.getElementById('convertBtn').innerText = translations[lang].convert;

            // Aktiv düymə rəngini dəyiş
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase() === lang) btn.classList.add('active');
            });
        }

        function handleFile(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                
                // Dinlə düyməsini göstər
                document.getElementById('listenBtn').style.display = 'block';
                
                // Dalğa animasiyasını aktiv et
                document.querySelectorAll('.wave-bar').forEach(bar => bar.style.display = 'block');

                // 8 Saniyəlik Limit Məntiqi (Simulyasiya)
                let timeLeft = 0;
                const interval = setInterval(() => {
                    timeLeft++;
                    document.getElementById('timerDisplay').innerText = timeLeft + "s / 8s";
                    if (timeLeft >= 8) {
                        clearInterval(interval);
                        alert(currentLang === 'tr' ? "Maksimum 8 saniye sınırı!" : "Limit: 8 seconds!");
                    }
                }, 1000);
            }
        }
    </script>
</body>
</html>
