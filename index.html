<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sonic Skin</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        canvas { border: 1px solid #333; background: #050505; width: 80%; max-width: 600px; height: 300px; border-radius: 15px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 50px; border: none; font-weight: bold; margin-top: 20px; }
        #startBtn { background: #ff0000; color: white; }
        #buyBtn { background: #d4ff00; color: #000; display: none; }
    </style>
</head>
<body>

    <h1>Sonic Skin</h1>
    <canvas id="c"></canvas>
    
    <button id="startBtn">SESİ KAYDET</button>
    <button id="buyBtn">GÖRSELİ İNDİR (Lemon Squeezy)</button>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const buyBtn = document.getElementById('buyBtn');

        startBtn.onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioCtx = new AudioContext();
            const source = audioCtx.createMediaStreamSource(stream);
            const analyser = audioCtx.createAnalyser();
            source.connect(analyser);
            const data = new Uint8Array(analyser.frequencyBinCount);

            startBtn.innerText = "SES ANALİZ EDİLİYOR...";
            
            function draw() {
                if(startBtn.innerText === "TAMAMLANDI") return;
                requestAnimationFrame(draw);
                analyser.getByteFrequencyData(data);
                ctx.fillStyle = 'rgba(0,0,0,0.05)';
                ctx.fillRect(0,0,canvas.width,canvas.height);
                data.forEach((v, i) => {
                    ctx.beginPath();
                    ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, v/10, 0, Math.PI*2);
                    ctx.fillStyle = `hsl(${v}, 80%, 50%)`;
                    ctx.fill();
                });
            }
            draw();

            setTimeout(() => {
                startBtn.innerText = "TAMAMLANDI";
                startBtn.style.display = 'none';
                buyBtn.style.display = 'block';
                stream.getTracks().forEach(t => t.stop());
            }, 5000);
        };

        buyBtn.onclick = () => {
            window.location.href = 'https://sonic-skin.lemonsqueezy.com/checkout';
        };
    </script>
</body>
</html>
