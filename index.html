<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Dovme Yap Premium</title>
    <style>
        /* FON VƏ PREMİUM ATMOSFER */
        body {
            background: #080808; /* Tam tünd premium fon */
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .main-card {
            background: #121212; /* Kartın içi */
            border: 1px solid #222;
            padding: 25px;
            border-radius: 20px;
            width: 360px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* DİLLƏR - Yuxarıda kiçik və səliqəli */
        .lang-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .lang-nav span {
            font-size: 12px;
            color: #555;
            cursor: pointer;
            transition: 0.3s;
        }
        .lang-nav span.active {
            color: #d4ff00;
            font-weight: bold;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* VİZUAL DALĞA SAHƏSİ */
        .wave-area {
            background: #000;
            height: 130px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #1a1a1a;
            position: relative;
        }

        #timer {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 12px;
            color: #d4ff00;
        }

        /* DÜYMƏLƏR - Sənin istədiyin sıra ilə */
        .btn {
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-gray { background: #252525; color: white; }
        .btn-listen { background: #353535; color: #aaa; display: none; } /* Səs olanda açılır */
        .btn-main { background: #d4ff00; color: black; margin-top: 10px; }

        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="lang-nav">
        <span class="active" onclick="setLang('tr')">TR</span>
        <span onclick="setLang('en')">EN</span>
        <span onclick="setLang('ru')">RU</span>
        <span onclick="setLang('fr')">FR</span>
        <span onclick="setLang('zh')">ZH</span>
        <span onclick="setLang('de')">DE</span>
    </div>

    <h2 id="ui-title">DOSYADAN DÖVME YAP</h2>

    <div class="wave-area">
        <img src="https://i.imgur.com/8N99U7i.png" width="80%" alt="Waveform">
        <div id="timer">00:00 / 00:08</div>
    </div>

    <button class="btn btn-gray" onclick="startRecording()">🎤 SESİ KAYDET</button>
    
    <input type="file" id="fileInput" style="display:none" onchange="fileSelected()">
    <button class="btn btn-gray" onclick="document.getElementById('fileInput').click()" id="ui-select">📁 DOSYA SEÇ</button>

    <button class="btn btn-listen" id="listenBtn">🔊 DİNLE</button>

    <button class="btn btn-main" id="ui-download">BUNU HATIRAYA DÖNÜŞTÜR (İNDİR)</button>
</div>

<script>
    const texts = {
        tr: { title: "DOSYADAN DÖVME YAP", select: "DOSYA SEÇ", download: "BUNU HATIRAYA DÖNÜŞTÜR (İNDİR)" },
        en: { title: "CREATE TATTOO FROM FILE", select: "CHOOSE FILE", download: "CONVERT TO MEMORY (DOWNLOAD)" },
        ru: { title: "СОЗДАТЬ ТАТУ ИЗ ФАЙЛА", select: "ВЫБРАТЬ ФАЙЛ", download: "СКАЧАТЬ ПАМЯТЬ" },
        fr: { title: "CRÉER UN TATOUAGE", select: "CHOISIR FICHIER", download: "CONVERTIR EN SOUVENIR" },
        zh: { title: "从文件制作纹身", select: "选择文件", download: "下载回忆" },
        de: { title: "TATTOO AUS DATEI", select: "DATEI WÄHLEN", download: "ALS ERINNERUNG SPEICHERN" }
    };

    function setLang(lang) {
        document.getElementById('ui-title').innerText = texts[lang].title;
        document.getElementById('ui-select').innerText = "📁 " + texts[lang].select;
        document.getElementById('ui-download').innerText = texts[lang].download;
        
        document.querySelectorAll('.lang-nav span').forEach(s => s.classList.remove('active'));
        event.target.classList.add('active');
    }

    function startRecording() {
        let sec = 0;
        const timerDisplay = document.getElementById('timer');
        const interval = setInterval(() => {
            sec++;
            timerDisplay.innerText = `00:0${sec} / 00:08`;
            if(sec >= 8) {
                clearInterval(interval);
                document.getElementById('listenBtn').style.display = 'flex';
                alert("8 saniye limitine ulaşıldı!");
            }
        }, 1000);
    }

    function fileSelected() {
        document.getElementById('listenBtn').style.display = 'flex';
    }
</script>

</body>
</html>
