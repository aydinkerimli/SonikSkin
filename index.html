<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonik Skin - Universal Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --neon: #d4ff00; --bg: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f2027);
            background-size: 400% 400%;
            animation: moveGradient 15s ease infinite;
            color: white; font-family: sans-serif;
            margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo { font-weight: 900; color: var(--neon); font-size: 1.3rem; cursor: pointer; text-shadow: 0 0 10px rgba(212, 255, 0, 0.4); }

        .container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 15px; }
        
        .card {
            background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(10px);
            padding: 25px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        /* DALĞA QUTUSU VƏ QORUYUCU TƏBƏQƏ */
        .wave-box {
            background: #000; height: 140px; border-radius: 20px; margin-bottom: 25px;
            position: relative; border: 1px solid #222; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* Screenshot əleyhinə dumanlı təbəqə */
        #lock-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(12px);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; color: #fff; font-size: 12px; font-weight: bold;
        }

        canvas { width: 100%; height: 100%; background: #000; }
        
        .btn {
            width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 15px; border: none;
            font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-gray { background: #222; color: #fff; }
        .btn-main { background: var(--neon); color: #000; }
        
        #success-btn { display: none; background: #00c3ff; color: #fff; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="resetPage()">SONIK SKIN</div>
</header>

<div class="container">
    <div class="card">
        <h2 id="ui-title">SESİNİ DÖVMEYE DÖNÜŞTÜR</h2>
        
        <div class="wave-box" id="captureZone">
            <canvas id="waveCanvas"></canvas>
            <div id="lock-overlay">
                <span>🔒 ÖNİZLEME KİLİTLİ</span>
                <p style="font-size: 10px; margin-top: 5px; opacity: 0.7;">Tam sürüm için ödeme yapın</p>
            </div>
        </div>

        <button class="btn btn-main" id="success-btn" onclick="downloadPNG()">✅ ÖDEME BAŞARILI! TIKLA İNDİR</button>
        
        <div id="action-area">
            <button class="btn btn-gray" onclick="initMic()">🎤 SESİ KAYDET</button>
            <input type="file" id="fInp" hidden onchange="handleFile(event)">
            <button class="btn btn-gray" onclick="document.getElementById('fInp').click()">📁 DOSYA SEÇ</button>
            <button class="btn btn-main" onclick="handleCheckoutFlow()" id="ui-down">BUNU HATIRAYA DÖNÜŞTÜR (İNDİR)</button>
        </div>
    </div>
</div>

<script>
    const LEMON_LINK = "https://sonikskin.lemonsqueezy.com/checkout/buy/7997dd0f-76bd-4a1c-99f5-b2253aeb1ee6";
    let staticDataArray = []; 
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('lock-overlay');

    window.onload = function() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        
        const params = new URLSearchParams(window.location.search);
        if (params.get('status') === 'success') {
            // Ödəniş uğurludursa, dumanı qaldır
            overlay.style.display = 'none';
            document.getElementById('success-btn').style.display = 'flex';
            document.getElementById('action-area').style.display = 'none';
            if(localStorage.getItem('lastStaticWave')) {
                staticDataArray = JSON.parse(localStorage.getItem('lastStaticWave'));
                drawStaticWave();
            }
        }
    };

    function handleCheckoutFlow() { 
        if(staticDataArray.length === 0) { alert("Önce ses yükleyin"); return; }
        window.location.href = LEMON_LINK; 
    }

    function processAudioData(data) {
        // Səs yüklənən kimi dumanı aktiv et
        overlay.style.display = 'flex';
        // ... səs analizi kodları (köhnə kodun eynisi) ...
        handleDecoding(data);
    }

    async function handleDecoding(data) {
        const arrayBuffer = await data.arrayBuffer();
        const audioCtx = new AudioContext();
        const buffer = await audioCtx.decodeAudioData(arrayBuffer);
        const rawData = buffer.getChannelData(0);
        const samples = 60;
        const blockSize = Math.floor((buffer.sampleRate * 8) / samples);
        staticDataArray = [];
        for (let i = 0; i < samples; i++) {
            let sum = 0;
            for (let j = 0; j < blockSize; j++) { sum += Math.abs(rawData[(blockSize * i) + j] || 0); }
            staticDataArray.push(sum / blockSize);
        }
        localStorage.setItem('lastStaticWave', JSON.stringify(staticDataArray));
        drawStaticWave();
    }

    function drawStaticWave() {
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        const barWidth = canvas.width / staticDataArray.length;
        staticDataArray.forEach((val, i) => {
            const h = val * canvas.height * 5;
            ctx.strokeStyle = (i/staticDataArray.length < 0.2 || i/staticDataArray.length > 0.8) ? '#00c3ff' : '#ffff1c';
            ctx.lineWidth = 3; ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(i * barWidth + barWidth/2, (canvas.height/2) - (h/2));
            ctx.lineTo(i * barWidth + barWidth/2, (canvas.height/2) + (h/2));
            ctx.stroke();
        });
    }

    function resetPage() {
        localStorage.removeItem('lastStaticWave');
        window.location.href = window.location.origin + window.location.pathname;
    }
    
    function downloadPNG() {
        const link = document.createElement('a');
        link.download = 'tattoo.png';
        link.href = canvas.toDataURL();
        link.click();
    }
    
    function handleFile(e) { if(e.target.files[0]) processAudioData(e.target.files[0]); }
    async function initMic() { /* Mikrofondan qeyd və processAudioData-ya göndərmə */ }
</script>
</body>
</html>
