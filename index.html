<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Skin | Portal</title>
    <style>
        :root { --accent: #d4ff00; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        /* Navbar */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: rgba(0,0,0,0.8); border-bottom: 1px solid #222; }
        .logo { font-weight: bold; color: var(--accent); letter-spacing: 2px; font-size: 1.2rem; }
        .nav-right { display: flex; gap: 15px; align-items: center; }

        .btn-join { background: transparent; color: #fff; border: 1px solid #444; padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-artist { background: var(--accent); color: #000; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-artist:hover { transform: translateY(-2px); box-shadow: 0 0 15px rgba(212, 255, 0, 0.3); }

        /* Ana Paneller */
        .main-container { display: flex; justify-content: center; gap: 30px; padding: 60px 20px; flex-wrap: wrap; }
        .panel { background: var(--card); border: 1px solid #222; border-radius: 24px; width: 420px; padding: 30px; box-sizing: border-box; }
        
        .tattoo-box { width: 100%; aspect-ratio: 1/1; background: #000; border: 1px dashed #333; margin-bottom: 20px; border-radius: 12px; display: flex; align-items: center; overflow: hidden; }
        canvas { width: 100%; height: 50%; }

        .btn { width: 100%; padding: 16px; margin: 8px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.3s; }
        #recBtn { background: #ff3e3e; color: white; }
        .play-btn { background: #222; color: #fff; display: none; border: 1px solid #333; }
        .buy-btn { background: var(--accent); color: black; display: none; text-decoration: none; text-align: center; }

        /* Giriş Modalı */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 40px; border-radius: 30px; border: 1px solid #333; width: 350px; text-align: center; }
        .social-btn { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px; }
        .google { background: white; color: black; }
        .apple { background: black; color: white; border: 1px solid #333; }

        select { background: #1a1a1a; color: white; border: 1px solid #333; padding: 8px; border-radius: 8px; outline: none; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">SONIC SKIN</div>
        <div class="nav-right">
            <select id="langSelect">
                <option value="tr">TR</option>
                <option value="en">EN</option>
                <option value="ru">RU</option>
            </select>
            <button class="btn-join" onclick="openModal('member')">GİRİŞ YAP</button>
            <button class="btn-artist" onclick="openModal('artist')">SANATÇI PORTALI</button>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-bottom: 30px;">Giriş Yap</h2>
            <button class="social-btn google">Gmail ile Giriş</button>
            <button class="social-btn apple">Apple ID ile Giriş</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#555; margin-top:25px; cursor:pointer; font-weight:bold; font-size: 12px; letter-spacing: 1px;">KAPAT</button>
        </div>
    </div>

        <div class="panel">
