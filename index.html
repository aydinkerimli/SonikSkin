<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonik Skin - Final 8s Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --neon: #d4ff00; --bg: #050505; --red: #ff3b3b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f2027);
            background-size: 400% 400%; animation: moveGradient 15s ease infinite;
            color: white; font-family: sans-serif; margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column;
        }

        @keyframes moveGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        header {
            width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-weight: 900; color: var(--neon); font-size: 1.1rem; cursor: pointer; }

        .lang-dropdown { position: relative; }
        .lang-btn { background: #222; border: 1px solid #444; color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .lang-content {
            display: none; position: absolute; right: 0; background: #1a1a1a;
            min-width: 110px; border: 1px solid #333; border-radius: 8px; z-index: 1000;
        }
        .lang-content span { padding: 12px; display: block; cursor: pointer; border-bottom: 1px solid #222; font-size: 13px; }
        .lang-dropdown:hover .lang-content { display: block; }

        .container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .card {
            background: rgba(17, 17, 17, 0.9); border: 1px solid rgba(255,255,255,0.1); padding: 25px;
            border-radius: 25px; width: 100%; max-width: 380px; text-align: center;
        }

        .wave-box {
            background: #000; height: 140px; border-radius: 20px; margin-bottom: 25px;
            position: relative; border: 1px solid #1a1a1a; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        #lock-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; color: #fff; text-align: center; padding: 10px;
        }

        canvas { width: 100%; height: 100%; background: #000; }
        #timer { position: absolute; top: 12px; right: 15px; color: var(--neon); font-family: monospace; font-size: 14px; z-index: 5; }

        .btn {
            width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 15px; border: none;
            font-weight: bold; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-gray { background: #222; color: #fff; border: 1px solid #333; }
        .btn-listen { background: #2a2a2a; color: var(--neon); display: none; }
        .btn-main { background: var(--neon); color: #000; }
        
        #success-btn { display: none; background: #00c3ff; color: #fff; border: 2px solid #fff; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="resetPage()">SONIK SKIN</div>
    <div class="lang-dropdown">
        <button class="lang-btn" id="curLang">TR ▾</button>
        <div class="lang-content">
            <span onclick="updateLang('tr')">Türkçe</span>
            <span onclick="updateLang('en')">English</span>
            <span onclick="updateLang('ru')">Русский</span>
            <span onclick="updateLang('fr')">Français</span>
            <span onclick="updateLang('zh')">中文</span>
            <span onclick="updateLang('de')">Deutsch</span>
            <span onclick="updateLang('es')">Español</span> 
        </div>
    </div>
</header>

<div class="container">
    <div class="card">
        <h2 id="ui-title">DOSYADAN DÖVME YAP</h2>
        
        <div class="wave-box" id="captureZone">
            <canvas id="waveCanvas"></canvas>
            <div id="timer">00:00 / 00:08</div>
            <div id="lock-overlay">
                <span id="ui-lock-title" style="font-weight: bold;">🔒</span>
                <p id="ui-lock-msg" style="font-size: 11px; margin-top: 5px; opacity: 0.8;"></p>
            </div>
        </div>

        <button class="btn btn-main" id="success-btn" onclick="downloadPNG()">✅ <span id="ui-success">ÖDEME BAŞARILI! TIKLA İNDİR</span></button>
        
        <div id="action-area">
            <button class="btn btn-gray" id="btn-rec" onclick="initMic()">🎤 <span id="ui-rec">SESİ KAYDET</span></button>
            <input type="file" id="fInp" hidden onchange="handleFile(event)">
            <button class="btn btn-gray" onclick="document.getElementById('fInp').click()">📁 <span id="ui-select">DOSYA SEÇ</span></button>
            <button class="btn btn-listen" id="btn-play" onclick="playAudio()">🔊 <span id="ui-listen">DİNLE</span></button>
            <button class="btn btn-main" onclick="handleCheckoutFlow()" id="ui-down">BUNU HATIRAYA DÖNÜŞTÜR</button>
        </div>
    </div>
</div>

<script>
    const LEMON_LINK = "https://sonikskin.lemonsqueezy.com/checkout/buy/7997dd0f-76bd-4a1c-99f5-b2253aeb1ee6";
    const langs = {
        tr: { title: "DOSYADAN DÖVME YAP", select: "DOSYA SEÇ", down: "BUNU HATIRAYA DÖNÜŞTÜR", listen: "DİNLE", rec: "SESİ KAYDET", success: "ÖDEME BAŞARILI!", lockT: "🔒 KİLİTLİ", lockM: "Ödeme yapın" },
        en: { title: "CREATE TATTOO", select: "CHOOSE FILE", down: "CONVERT TO MEMORY", listen: "LISTEN", rec: "RECORD", success: "SUCCESS!", lockT: "🔒 LOCKED", lockM: "Pay to unlock" },
        ru: { title: "ТАТУ ИЗ ФАЙЛА", select: "ВЫБРАТЬ", down: "СКАЧАТЬ", listen: "СЛУШАТЬ", rec: "ЗАПИСЬ", success: "УСПЕШНО!", lockT: "🔒 БЛОК", lockM: "Оплатите" },
        fr: { title: "CRÉER TATOUAGE", select: "CHOISIR", down: "CONVERTIR", listen: "ÉCOUTER", rec: "ENREGISTRER", success: "SUCCÈS!", lockT: "🔒 BLOQUÉ", lockM: "Payez" },
        zh: { title: "纹身制作", select: "选择文件", down: "下载", listen: "倾听", rec: "录音", success: "成功!", lockT: "🔒 锁定", lockM: "支付" },
        de: { title: "TATTOO DATEI", select: "WÄHLEN", down: "DOWNLOAD", listen: "ANHÖREN", rec: "AUFNAHME", success: "ERFOLG!", lockT: "🔒 GESPERRT", lockM: "Zahlen" },
        es: { title: "CREAR TATUAJE", select: "ELEGIR", down: "CONVERTIR", listen: "ESCUCHAR", rec: "GRABAR", success: "¡EXITO!", lockT: "🔒 BLOQUEADO", lockM: "Pague" }
    };

    let recorder, chunks = [], audioURL, audio, animFrame, analyser, dataArray, staticDataArray = [];
    const canvas = document.getElementById('waveCanvas'), ctx = canvas.getContext('2d'), overlay = document.getElementById('lock-overlay');

    window.onload = () => {
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        updateLang(localStorage.getItem('sonikLang') || 'tr');
        if (new URLSearchParams(window.location.search).get('status') === 'success') {
            overlay.style.display = 'none'; document.getElementById('success-btn').style.display = 'flex';
            document.getElementById('action-area').style.display = 'none';
            if(localStorage.getItem('lastStaticWave')) { staticDataArray = JSON.parse(localStorage.getItem('lastStaticWave')); drawStaticWave(true); }
        }
    };

    function updateLang(l) {
        localStorage.setItem('sonikLang', l); const ln = langs[l];
        document.getElementById('ui-title').innerText = ln.title;
        document.getElementById('ui-select').innerText = ln.select;
        document.getElementById('ui-down').innerText = ln.down;
        document.getElementById('ui-listen').innerText = ln.listen;
        document.getElementById('ui-rec').innerText = ln.rec;
        document.getElementById('ui-success').innerText = ln.success;
        document.getElementById('ui-lock-title').innerText = ln.lockT;
        document.getElementById('ui-lock-msg').innerText = ln.lockM;
        document.getElementById('curLang').innerText = l.toUpperCase() + " ▾";
    }

    async function processAudioData(data) {
        overlay.style.display = 'none'; audioURL = URL.createObjectURL(data); audio = new Audio(audioURL);
        const arrayBuffer = await data.arrayBuffer();
        const decodedData = await new AudioContext().decodeAudioData(arrayBuffer);
        generateStaticWave(decodedData);
        document.getElementById('btn-play').style.display = 'flex';
        document.getElementById('timer').innerText = `00:08 / 00:08`;
    }

    function generateStaticWave(buffer) {
        const rawData = buffer.getChannelData(0); const samples = 60; const blockSize = Math.floor((buffer.sampleRate * 8) / samples);
        staticDataArray = []; for (let i = 0; i < samples; i++) {
            let sum = 0; for (let j = 0; j < blockSize; j++) { sum += Math.abs(rawData[(blockSize * i) + j] || 0); }
            staticDataArray.push(sum / blockSize);
        }
        localStorage.setItem('lastStaticWave', JSON.stringify(staticDataArray)); drawStaticWave();
    }

    function drawStaticWave(isPaid = false) {
        if (!isPaid) overlay.style.display = 'flex';
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        const barWidth = canvas.width / staticDataArray.length;
        staticDataArray.forEach((val, i) => {
            const h = val * canvas.height * 5;
            ctx.strokeStyle = (i/staticDataArray.length < 0.2 || i/staticDataArray.length > 0.8) ? '#00c3ff' : '#ffff1c';
            ctx.lineWidth = 3; ctx.beginPath();
            ctx.moveTo(i * barWidth + barWidth/2, (canvas.height/2) - (h/2));
            ctx.lineTo(i * barWidth + barWidth/2, (canvas.height/2) + (h/2)); ctx.stroke();
        });
    }

    function playAudio() { if(audio) { setupStreamAnalyser(audio); audio.play(); } }
    
    function setupStreamAnalyser(s) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser(); 
        const src = (s instanceof MediaStream) ? audioCtx.createMediaStreamSource(s) : audioCtx.createMediaElementSource(s);
        src.connect(analyser); if (!(s instanceof MediaStream)) analyser.connect(audioCtx.destination);
        dataArray = new Uint8Array(analyser.frequencyBinCount); drawWave();
    }

    function drawWave() {
        animFrame = requestAnimationFrame(drawWave); analyser.getByteFrequencyData(dataArray);
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#d4ff00'; ctx.lineWidth = 4; ctx.beginPath();
        let x = 0; let slice = canvas.width / dataArray.length;
        for(let i=0; i<dataArray.length; i++) {
            let h = (dataArray[i]/255) * canvas.height;
            ctx.moveTo(x, canvas.height/2 - h/2); ctx.lineTo(x, canvas.height/2 + h/2); x += slice * 2.5;
        }
        ctx.stroke();
    }

    async function initMic() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ audio: true }); setupStreamAnalyser(s);
            recorder = new MediaRecorder(s); recorder.start(); chunks = []; let sec = 0;
            const t = setInterval(() => {
                sec++; document.getElementById('timer').innerText = `00:0${sec} / 00:08`;
                if(sec >= 8) { 
                    clearInterval(t); 
                    recorder.stop(); // 8 SANİYƏDƏ STOP!
                    s.getTracks().forEach(tr => tr.stop()); // MİKROFONU SÖNDÜR!
                }
            }, 1000);
            recorder.onstop = () => processAudioData(new Blob(chunks)); recorder.ondataavailable = e => chunks.push(e.data);
        } catch(e) { alert("Mic error!"); }
    }

    function handleFile(e) { if(e.target.files[0]) processAudioData(e.target.files[0]); }
    function handleCheckoutFlow() { if(staticDataArray.length > 0) window.location.href = LEMON_LINK; }
    function downloadPNG() { drawStaticWave(true); const link = document.createElement('a'); link.download = 'sonik-skin.png'; link.href = canvas.toDataURL(); link.click(); }
    function resetPage() { localStorage.removeItem('lastStaticWave'); location.reload(); }
</script>
</body>
</html>
