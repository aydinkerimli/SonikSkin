<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Skin | Soundwave Creator</title>
    <style>
        :root { --neon: #d4ff00; --dark: #050505; --panel: #111; }
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }

        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: #000; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: bold; color: var(--neon); letter-spacing: 2px; }
        .nav-right { display: flex; gap: 10px; align-items: center; }

        .btn-top { background: transparent; color: #fff; border: 1px solid #444; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-artist { background: var(--neon); color: #000; border: none; }

        .main-container { display: flex; justify-content: center; gap: 20px; padding: 40px 10px; flex-wrap: wrap; }
        .panel { background: var(--panel); border: 2px solid #222; border-radius: 20px; width: 450px; padding: 25px; box-sizing: border-box; text-align: center; }
        
        .box { width: 100%; aspect-ratio: 2/1; background: #000; border: 1px solid #222; margin-bottom: 20px; border-radius: 12px; display: flex; align-items: center; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }

        .btn { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; display: block; font-size: 14px; transition: 0.3s; }
        #bRec { background: #ff3e3e; color: white; }
        .play-btn { background: #444; color: white; display: none; }
        .retry-btn { background: #222; color: #fff; border: 1px solid #444; display: none; }
        
        /* Satın Alma / İndirme Butonu */
        .buy-btn { background: var(--neon); color: black; text-decoration: none; display: none; justify-content: center; align-items: center; }
        .buy-btn:hover { background: #fff; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: #161616; padding: 30px; border-radius: 25px; border: 1px solid #333; width: 300px; text-align: center; }
        .soc-btn { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        
        select { background: #1a1a1a; color: white; border: 1px solid #333; padding: 5px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">SONIC SKIN</div>
        <div class="nav-right">
            <select id="langSel" onchange="dilDegistir(this.value)">
                <option value="tr">TR</option>
                <option value="en">EN</option>
                <option value="ru">RU</option>
            </select>
            <button class="btn-top" onclick="ac('Giriş Yap')">GİRİŞ YAP</button>
            <button class="btn-top btn-artist" onclick="ac('Sanatçı Portalı')">SANATÇI PORTALI</button>
        </div>
    </div>

    <div id="pop" class="modal">
        <div class="modal-content">
            <h3 id="pTitle">Üye Girişi</h3>
            <p style="font-size: 12px; color: #888;">Anılarını saklamak için giriş yap.</p>
            <button class="soc-btn" style="background:white; color:black;">Gmail ile Giriş</button>
            <button onclick="kapat()" style="background:none; border:none; color:#ff3e3e; margin-top:15px; cursor:pointer; font-weight:bold;">KAPAT</button>
        </div>
    </div>

    <div class="main-container">
        <div class="panel">
            <h2 id="h1">CANLI SES DÖVMESİ</h2>
            <div class="box"><canvas id="cv1"></canvas></div>
            <button id="bRec" class="btn" onclick="kaydet()">🎤 SESİ KAYDET</button>
            <button id="bP1" class="btn play-btn" onclick="dinle1()">▶️ DİNLE</button>
            <button id="bR1" class="btn retry-btn" onclick="location.reload()">🔄 YENİDEN TEKRAR YAP</button>
            <button id="bS1" class="btn buy-btn" onclick="indir('cv1')">BUNU HATIRAYA DÖNÜŞTÜR (İNDİR)</button>
        </div>

        <div class="panel">
            <h2 id="h2">DOSYADAN DÖVME YAP</h2>
            <div class="box"><canvas id="cv2"></canvas></div>
            <input type="file" id="fIn" hidden accept="audio/*" onchange="dosyaSecildi(this)">
            <button class="btn" style="background:#222; color:#fff;" onclick="document.getElementById('fIn').click()" id="bF">📁 DOSYA SEÇ</button>
            <button id="bP2" class="btn play-btn" onclick="dinle2()">▶️ DİNLE</button>
            <button id="bS2" class="btn buy-btn" onclick="indir('cv2')">BUNU HATIRAYA DÖNÜŞTÜR (İNDİR)</button>
        </div>
    </div>

    <script>
        const diller = {
            tr: {h1:"CANLI SES DÖVMESİ", h2:"DOSYADAN DÖVME YAP", rec:"🎤 SESİ KAYDET", f:"📁 DOSYA SEÇ", buy:"BUNU HATIRAYA DÖNÜŞTÜR", listen:"▶️ DİNLE", recording:"🛑 DURDUR"},
            en: {h1:"LIVE VOICE TATTOO", h2:"TATTOO FROM FILE", rec:"🎤 RECORD VOICE", f:"📁 CHOOSE FILE", buy:"TURN THIS INTO A MEMORY", listen:"▶️ LISTEN", recording:"🛑 STOP"}
        };

        let ctx, rec, chunks = [], ses1 = new Audio(), ses2 = new Audio();
        const MAX_SURE = 8000;

        function dilDegistir(v) {
            const d = diller[v] || diller.tr;
            document.getElementById('h1').innerText = d.h1; document.getElementById('h2').innerText = d.h2;
            document.getElementById('bRec').innerText = d.rec; document.getElementById('bF').innerText = d.f;
            document.getElementById('bS1').innerText = d.buy; document.getElementById('bS2').innerText = d.buy;
            document.getElementById('bP1').innerText = d.listen; document.getElementById('bP2').innerText = d.listen;
        }

        function ac(t) { document.getElementById('pTitle').innerText = t; document.getElementById('pop').style.display = 'flex'; }
        function kapat() { document.getElementById('pop').style.display = 'none'; }

        // --- REFERANS GÖRSELİNE UYGUN HASSAS ÇİZİM ---
        async function sesDalgasiCiz(audioBlob, canvasId) {
            const c = document.getElementById(canvasId);
            const x = c.getContext('2d');
            const dpr = 2; // Yüksek çözünürlük için
            c.width = c.offsetWidth * dpr;
            c.height = c.offsetHeight * dpr;
            x.scale(dpr, dpr);

            if (!ctx) ctx = new AudioContext();
            const buffer = await ctx.decodeAudioData(await audioBlob.arrayBuffer());
            const data = buffer.getChannelData(0);

            // Çizgi ve Boşluk Ayarları (Referans görselindeki o sık doku için)
            const barWidth = 2;  // Daha ince barlar
            const gap = 1;       // Daha dar boşluk
            const samples = Math.floor(c.offsetWidth / (barWidth + gap));
            const step = Math.floor(data.length / samples);
            
            x.fillStyle = "#000";
            x.fillRect(0, 0, c.offsetWidth, c.offsetHeight);
            x.fillStyle = "#d4ff00";

            for (let i = 0; i < samples; i++) {
                let min = 1.0, max = -1.0;
                for (let j = 0; j < step; j++) {
                    const datum = data[(i * step) + j];
                    if (datum < min) min = datum;
                    if (datum > max) max = datum;
                }
                
                // Simetrik boyutu referans görseline göre ayarla
                const height = Math.max(2, (max - min) * (c.offsetHeight * 0.7));
                const xPos = i * (barWidth + gap);
                const yPos = (c.offsetHeight / 2) - (height / 2);
                
                x.fillRect(xPos, yPos, barWidth, height);
            }
        }

        async function kaydet() {
            try {
                if(!ctx) ctx = new AudioContext();
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                rec = new MediaRecorder(s); chunks = [];
                rec.ondataavailable = e => chunks.push(e.data);
                rec.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/ogg' });
                    ses1.src = URL.createObjectURL(blob);
                    sesDalgasiCiz(blob, 'cv1');
                    document.getElementById('bP1').style.display = 'block';
                    document.getElementById('bR1').style.display = 'block';
                    document.getElementById('bS1').style.display = 'flex';
                    document.getElementById('bRec').style.display = 'none';
                    s.getTracks().forEach(t => t.stop());
                };
                rec.start();
                let sn = 8;
                const b = document.getElementById('bRec');
                const t = setInterval(() => { 
                    sn--; b.innerText = `🛑 DURDUR (${sn}s)`; 
                    if(sn<=0) clearInterval(t);
                }, 1000);
                setTimeout(() => { if(rec.state==="recording") rec.stop(); }, MAX_SURE);
                b.onclick = () => { clearInterval(t); rec.stop(); };
            } catch(e) { alert("Mikrofon hatası!"); }
        }

        function dosyaSecildi(i) {
            const f = i.files[0]; if(!f) return;
            ses2.src = URL.createObjectURL(f);
            document.getElementById('bP2').style.display = 'block';
            document.getElementById('bS2').style.display = 'flex';
            sesDalgasiCiz(f, 'cv2');
        }

        function dinle1() { ses1.play(); }
        function dinle2() { ses2.play(); }

        // --- İNDİRME FONKSİYONU ---
        function indir(id) {
            const c = document.getElementById(id);
            const link = document.createElement('a');
            link.download = 'sonic-skin-tattoo.png';
            link.href = c.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
