<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Skin | Final Working Edition</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; }
        .navbar { display: flex; justify-content: space-between; padding: 15px 30px; background: #000; border-bottom: 1px solid #222; }
        .logo { color: #d4ff00; font-weight: bold; letter-spacing: 2px; }
        .nav-right { display: flex; gap: 10px; }
        .btn-top { background: transparent; color: #fff; border: 1px solid #444; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .btn-artist { background: #d4ff00; color: #000; border: none; font-weight: bold; }
        
        .main-container { display: flex; justify-content: center; gap: 20px; padding: 40px; flex-wrap: wrap; }
        .panel { background: #111; border: 2px solid #222; border-radius: 20px; width: 450px; padding: 25px; text-align: center; }
        .box { background: #fff; border-radius: 12px; margin-bottom: 20px; overflow: hidden; height: 200px; }
        canvas { width: 100%; height: 100%; display: block; }

        .btn { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #bRec { background: #ff3e3e; color: #fff; }
        .play-btn, .buy-btn { display: none; background: #d4ff00; color: #000; }
        select { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 5px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">SONIC SKIN</div>
    <div class="nav-right">
        <select id="lang" onchange="changeLang(this.value)">
            <option value="tr">TR</option>
            <option value="en">EN</option>
            <option value="ru">RU</option>
        </select>
        <button class="btn-top" onclick="alert('Giriş Sistemi Hazırlanıyor')">GİRİŞ YAP</button>
        <button class="btn-top btn-artist">SANATÇI PORTALI</button>
    </div>
</div>

<div class="main-container">
    <div class="panel">
        <h2 id="h1">CANLI SES DÖVMESİ</h2>
        <div class="box"><canvas id="cv1"></canvas></div>
        <button id="bRec" class="btn" onclick="startRec()">🎤 SESİ KAYDET</button>
        <button id="bP1" class="btn play-btn" onclick="playAudio(1)">▶️ DİNLE</button>
        <button id="bS1" class="btn buy-btn" onclick="downloadTattoo('cv1')">BUNU HATIRAYA DÖNÜŞTÜR</button>
    </div>

    <div class="panel">
        <h2 id="h2">DOSYADAN DÖVME YAP</h2>
        <div class="box"><canvas id="cv2"></canvas></div>
        <input type="file" id="fIn" hidden accept="audio/*" onchange="loadFile(this)">
        <button class="btn" style="background:#222; color:#fff;" onclick="document.getElementById('fIn').click()">📁 DOSYA SEÇ</button>
        <button id="bP2" class="btn play-btn" onclick="playAudio(2)">▶️ DİNLE</button>
        <button id="bS2" class="btn buy-btn" onclick="downloadTattoo('cv2')">BUNU HATIRAYA DÖNÜŞTÜR</button>
    </div>
</div>

<script>
    let aCtx, rec, chunks = [], s1 = new Audio(), s2 = new Audio(), src1, src2;
    const langData = {
        tr: {h1:"CANLI SES DÖVMESİ", h2:"DOSYADAN DÖVME YAP", rec:"🎤 SESİ KAYDET", buy:"BUNU HATIRAYA DÖNÜŞTÜR"},
        en: {h1:"LIVE VOICE TATTOO", h2:"TATTOO FROM FILE", rec:"🎤 RECORD VOICE", buy:"TURN INTO MEMORY"},
        ru: {h1:"ЖИВАЯ ТАТУ", h2:"ИЗ ФАЙЛА", rec:"🎤 ЗАПИСАТЬ", buy:"СОХРАНИТЬ В ПАМЯТЬ"}
    };

    function changeLang(v) {
        document.getElementById('h1').innerText = langData[v].h1;
        document.getElementById('h2').innerText = langData[v].h2;
        document.getElementById('bRec').innerText = langData[v].rec;
        document.querySelectorAll('.buy-btn').forEach(b => b.innerText = langData[v].buy);
    }

    function draw(an, id) {
        const c = document.getElementById(id), x = c.getContext('2d');
        an.fftSize = 256;
        const bLen = an.frequencyBinCount, data = new Uint8Array(bLen);
        function r() {
            requestAnimationFrame(r);
            an.getByteFrequencyData(data);
            x.fillStyle = "#fff"; x.fillRect(0,0,c.width,c.height);
            let bw = (c.width / bLen) * 2.5, cur = 0;
            for(let i=0; i<bLen; i++) {
                let bh = data[i] * 0.6;
                x.fillStyle = "#000"; 
                x.fillRect(cur, (c.height - bh)/2.5, bw - 1, bh); // Ana dalga
                x.fillStyle = "rgba(0,0,0,0.1)"; 
                x.fillRect(cur, c.height * 0.8, bw - 1, bh * 0.3); // Yansıma
                cur += bw;
            }
        } r();
    }

    async function startRec() {
        if(!aCtx) aCtx = new AudioContext();
        const s = await navigator.mediaDevices.getUserMedia({ audio: true });
        const an = aCtx.createAnalyser(); aCtx.createMediaStreamSource(s).connect(an);
        draw(an, 'cv1');
        rec = new MediaRecorder(s); chunks = [];
        rec.ondataavailable = e => chunks.push(e.data);
        rec.onstop = () => {
            s1.src = URL.createObjectURL(new Blob(chunks));
            document.getElementById('bP1').style.display = 'block';
            document.getElementById('bS1').style.display = 'block';
        };
        rec.start(); document.getElementById('bRec').innerText = "KAYDEDİLİYOR...";
        setTimeout(() => { rec.stop(); s.getTracks().forEach(t=>t.stop()); document.getElementById('bRec').style.display='none'; }, 5000);
    }

    function loadFile(i) {
        if(!aCtx) aCtx = new AudioContext();
        s2.src = URL.createObjectURL(i.files[0]);
        document.getElementById('bP2').style.display = 'block';
        document.getElementById('bS2').style.display = 'block';
        playAudio(2);
    }
