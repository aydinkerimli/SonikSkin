<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Skin Art Lab</title>
    <style>
        :root { --bg: #0a0a0a; --neon: #d4ff00; --panel: #151515; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Üst Menü ve Diller */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; border-bottom: 1px solid #222; }
        select { background: #222; color: white; border: 1px solid #444; padding: 8px; border-radius: 8px; cursor: pointer; }

        .main-container { display: flex; flex: 1; justify-content: center; align-items: center; gap: 50px; padding: 20px; flex-wrap: wrap; }
        
        /* Panel Tasarımı */
        .card { background: var(--panel); border: 1px solid #333; border-radius: 30px; padding: 40px; width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Görsel Alan (Kare) */
        .visual-box { width: 100%; aspect-ratio: 1 / 1; background: #000; border-radius: 20px; margin-bottom: 30px; border: 2px solid #222; overflow: hidden; position: relative; }
        canvas { width: 100%; height: 100%; }

        .btn { width: 100%; padding: 18px; margin: 10px 0; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 16px; transition: all 0.3s ease; }
