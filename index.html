<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Skin | Global Fixed</title>
    <style>
        :root { --accent: #d4ff00; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: #000; border-bottom: 1px solid #222; }
        .nav-right { display: flex; gap: 10px; align-items: center; }
        .btn-top { background: transparent; color: #fff; border: 1px solid #444; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-artist { background: var(--accent); color: #000; border: none; }
        .main-container { display: flex; justify-content: center; gap: 20px; padding: 40px 10px; flex-wrap: wrap; }
        .panel { background: var(--card); border: 2px solid #222; border-radius: 20px; width: 420px; padding: 25px; box-sizing: border-box; }
        .tattoo-box { width: 100%; aspect-ratio: 1/1; background: #000; border: 1px dashed #333; margin-bottom: 20px; border-radius: 12px; display: flex; align-items: center; }
        canvas { width: 100%; height: 50%; }
        .btn { width: 100%; padding: 16px; margin: 8px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 14px; }
        #recBtn { background: #ff3e3e; color: white; }
        .play-btn { background: #333; color: white; display: none; }
        .buy-btn { background: var(--accent); color: black; display: none; text-decoration: none; text-align: center; line-height: 1.2; padding: 16px; box-sizing: border-box; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 35px; border-radius: 25px; border: 1px solid #333; width: 320px; text-align: center; }
        .social-btn { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        select { background: #1a1a1a; color: white; border: 1px solid #333; padding: 6px; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">SONIC SKIN</div>
        <div class="nav-right">
            <select id="langSelect">
                <option value="tr">TR</option><option value="en">EN</option><option value="ru">RU</option>
                <option value="zh">ZH</option><option value="de">DE</option><option value="es">ES</option><option value="fr">FR</option>
            </select>
            <button class="btn-top" onclick="window.openModal('member')">GİRİŞ YAP</button>
            <button class="btn-top btn-artist" onclick="window.openModal('artist')">SANATÇI PORTALI</button>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h3 id="mTitle">Giriş Yap</h3>
            <button class="social-btn" style="background:white; color:black;">Gmail ile Giriş</button>
            <button class="social-btn" style="background:black; color:white; border:1px solid #444;">Apple ID ile Giriş</button>
            <button onclick="window.closeModal()" style="background:none; border:none; color:#ff3e3e; margin-top:20px; cursor:pointer;">KAPAT</button>
        </div>
    </div>

    <div class="main-container">
        <div class="panel">
            <h2 id="t1" style="text-align:center">CANLI SES DÖVMESİ</h2>
            <div class="tattoo-box"><canvas id="c1"></canvas></div>
            <button id="recBtn" class="btn">🎤 SESİ KAYDET</button>
            <button id="p1" class="btn play-btn">▶️ KAYDI DİNLE</button>
            <a href="#" id="b1" class="btn buy-btn">TASLAĞI SATIN AL</a>
        </div>
        <div class="panel">
            <h2 id="t2" style="text-align:center">DOSYADAN DÖVME YAP</h2>
            <div class="tattoo-box"><canvas id="c2"></canvas></div>
            <input type="file" id="fIn" hidden accept="audio/*">
            <button onclick="document.getElementById('fIn').click()" id="fBtn" class="btn" style="background:#222; color:#fff;">📁 SES DOSYASI SEÇ</button>
            <button id="p2" class="btn play-btn">▶️ DOSYAYI DİNLE</button>
            <a href="#" id="b2" class="btn buy-btn">TASLAĞI SATIN AL</a>
        </div>
    </div>

    <script>
        const langs = {
            tr: {t1:"CANLI SES DÖVMESİ", t2:"DOSYADAN DÖVME YAP", rec:"🎤 SESİ KAYDET", f:"📁 SES DOSYASI SEÇ", buy:"TASLAĞI SATIN AL", l:"GİRİŞ YAP", p:"SANATÇI PORTALI"},
            en: {t1:"LIVE VOICE TATTOO", t2:"TATTOO FROM FILE", rec:"🎤 RECORD VOICE", f:"📁 CHOOSE AUDIO", buy:"BUY DRAFT", l:"LOGIN", p:"ARTIST PORTAL"},
            ru: {t1:"ЖИВАЯ ТАТУ", t2:"ИЗ ФАЙЛА", rec:"🎤 ЗАПИСАТЬ", f:"📁 ВЫБРАТЬ ФАЙЛ", buy:"КУПИТЬ", l:"ВХОД", p:"ПОРТАЛ"},
            zh: {t1:"现场声音纹身", t2:"从文件制作", rec:"🎤 录制声音", f:"📁 选择文件", buy:"购买草图", l:"登录", p:"艺术家"}
        };

        document.getElementById('langSelect').onchange = function() {
            const l = langs[this.value] || langs.en;
            document.getElementById('t1').innerText = l.t1; document.getElementById('t2').innerText = l.t2;
            document.getElementById('recBtn').innerText = l.rec; document.getElementById('fBtn').innerText = l.f;
            document.getElementById('b1').innerText = l.buy; document.getElementById('b2').innerText = l.buy;
        };

        window.openModal = (t) => { document.getElementById('mTitle').innerText = t==='artist'?'Sanatçı Portalı':'Giriş Yap'; document.getElementById('loginModal').style.display='flex'; };
        window.closeModal = () => { document.getElementById('loginModal').style.display='none'; };

        let ctx, recorder, chunks = [], lAud = new Audio(), fAud = new Audio();

        function draw(an, id) {
            const c = document.getElementById(id), x = c.getContext('2d'), d = new Uint8Array(an.frequencyBinCount);
            function r() { requestAnimationFrame(r); an.getByteTimeDomainData(d); x.fillStyle="#000"; x.fillRect(0,0,c.width,c.height); x.lineWidth=3; x.strokeStyle="#d4ff00"; x.beginPath(); let s=c.width/d.length, curX=0; for(let i=0;i<d.length;i++){ let v=d[i]/128, y=v*c.height/2; if(i===0)x.moveTo(curX,y); else x.lineTo(curX,y); curX+=s; } x.stroke(); } r();
        }

        document.getElementById('recBtn').onclick = async function() {
            if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
            if(ctx.state === 'suspended') await ctx.resume();
            const s = await navigator.mediaDevices.getUserMedia({ audio: true });
            const an = ctx.createAnalyser(); ctx.createMediaStreamSource(s).connect(an); draw(an, 'c1');
