<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SONIC SKIN - Artist Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* Sənin Orijinal Dizaynın - Heç bir rəng və ya ölçü dəyişmədi */
        :root { --neon: #d4ff00; --bg: #050505; }
        body {
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f2027);
            background-size: 400% 400%; animation: moveGradient 15s ease infinite;
            color: white; font-family: sans-serif; margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column;
        }
        @keyframes moveGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .card { background: rgba(17, 17, 17, 0.9); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 25px; width: 90%; max-width: 380px; margin: auto; text-align: center; }
        .wave-box { background: #000; height: 200px; border-radius: 20px; margin-bottom: 25px; position: relative; border: 1px solid #1a1a1a; overflow: hidden; }
        canvas { width: 100%; height: 100%; }

        .btn { width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 15px; border: none; font-weight: bold; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-gray { background: #222; color: #fff; border: 1px solid #333; }
        .btn-main { background: var(--neon); color: #000; }
    </style>
</head>
<body>

<div class="container" style="padding-top: 50px;">
    <div class="card">
        <h2 style="font-size: 1.2rem; margin-bottom: 20px;">SONIC SKIN PRO</h2>
        
        <div class="wave-box" id="captureZone">
            <canvas id="waveCanvas"></canvas>
            <div id="timer" style="position: absolute; top: 10px; right: 10px; color: var(--neon); font-size: 12px;">00:00 / 00:08</div>
        </div>

        <div id="action-area">
            <button class="btn btn-gray" id="btn-rec" onclick="initMic()">🎤 RECORD AUDIO</button>
            <input type="file" id="fInp" hidden onchange="handleFile(event)">
            <button class="btn btn-gray" onclick="document.getElementById('fInp').click()">📁 CHOOSE FILE</button>
            
            <button class="btn btn-main" id="btn-download" onclick="downloadPNG()" style="display:none;">📥 DOWNLOAD TATTOO PNG</button>
        </div>
    </div>
</div>

<script>
    let recorder, chunks = [], animFrame, analyser, dataArray, staticDataArray = [];
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');

    // Səs emalı (Orijinal qalır)
    async function initMic() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const audioCtx = new AudioContext();
        analyser = audioCtx.createAnalyser();
        const source = audioCtx.createMediaStreamSource(stream);
        source.connect(analyser);
        analyser.fftSize = 64;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        
        recorder = new MediaRecorder(stream);
        recorder.start(); chunks = [];
        let s = 0;
        const t = setInterval(() => {
            s++; document.getElementById('timer').innerText = `00:0${s} / 00:08`;
            if(s >= 8) { clearInterval(t); recorder.stop(); stream.getTracks().forEach(tr => tr.stop()); }
        }, 1000);

        recorder.onstop = () => processAudio(new Blob(chunks));
        recorder.ondataavailable = e => chunks.push(e.data);
        drawLive();
    }

    function handleFile(e) { if(e.target.files[0]) processAudio(e.target.files[0]); }

    async function processAudio(blob) {
        const arrayBuffer = await blob.arrayBuffer();
        const audioCtx = new AudioContext();
        const decoded = await audioCtx.decodeAudioData(arrayBuffer);
        generateWave(decoded);
        document.getElementById('btn-download').style.display = 'flex';
    }

    function drawLive() {
        animFrame = requestAnimationFrame(drawLive);
        analyser.getByteFrequencyData(dataArray);
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#d4ff00'; ctx.lineWidth = 3;
        let x = 0;
        for(let i=0; i<dataArray.length; i++) {
            let h = dataArray[i] / 2;
            ctx.beginPath(); ctx.moveTo(x, 100 - h/2); ctx.lineTo(x, 100 + h/2); ctx.stroke();
            x += (canvas.width / dataArray.length);
        }
    }

    function generateWave(buffer) {
        cancelAnimationFrame(animFrame);
        const rawData = buffer.getChannelData(0);
        const samples = 60;
        const blockSize = Math.floor(rawData.length / samples);
        staticDataArray = [];
        for (let i = 0; i < samples; i++) {
            let sum = 0;
            for (let j = 0; j < blockSize; j++) { sum += Math.abs(rawData[(blockSize * i) + j]); }
            staticDataArray.push(sum / blockSize);
        }
        drawFinal();
    }

    // BURADA ESTETİK BARCODE ƏLAVƏSİ EDİLDİ
    function drawFinal() {
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 1. Sənin Rəngli Dalğan
        const barWidth = canvas.width / staticDataArray.length;
        staticDataArray.forEach((val, i) => {
            const h = val * canvas.height * 4;
            ctx.strokeStyle = `hsl(${i * 4}, 100%, 50%)`;
            ctx.lineWidth = 3; ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(i * barWidth + barWidth/2, (canvas.height/2 - 25) - h/2);
            ctx.lineTo(i * barWidth + barWidth/2, (canvas.height/2 - 25) + h/2);
            ctx.stroke();
        });

        // 2. O dediyimiz Minimalist Spotify-style Xətlər
        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5;
        for(let i=15; i<canvas.width-15; i+=6) {
            let h = Math.random() * 12 + 5;
            ctx.beginPath();
            ctx.moveTo(i, canvas.height - 40 - h/2);
            ctx.lineTo(i, canvas.height - 40 + h/2);
            ctx.stroke();
        }
        
        ctx.fillStyle = 'rgba(212, 255, 0, 0.4)';
        ctx.font = 'bold 10px Arial';
        ctx.fillText("SONIC SKIN • ARTIST TRACE", canvas.width/2 - 60, canvas.height - 15);
    }

    // LEMON SQUEEZY-SİZ BİRBAŞA YÜKLƏMƏ FUNKSİYASI
    function downloadPNG() {
        const link = document.createElement('a');
        link.download = `sonic-skin-${Date.now()}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
    }
</script>
</body>
</html>
