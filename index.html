<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonik Skin - Premium Tattoo</title>
    <style>
        /* PREMİUM ARXA FON VƏ ÜMUMİ STİL */
        body {
            background: radial-gradient(circle, #1a1a1a 0%, #050505 100%);
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* YUXARI PANEL (HEADER) */
        header {
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 3px;
            color: #d4ff00;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .nav-links {
            display: flex;
            gap: 15px;
            font-size: 13px;
            font-weight: 600;
            color: #888;
        }

        .nav-links span {
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-links span:hover { color: #fff; }

        /* DİL SEÇİMİ YUXARI SAĞDA */
        .lang-panel {
            display: flex;
            gap: 8px;
            border-left: 1px solid #333;
            padding-left: 15px;
        }

        .lang-panel span {
            font-size: 11px;
            color: #555;
            cursor: pointer;
            transition: 0.3s;
        }

        .lang-panel span.active { color: #d4ff00; font-weight: bold; }

        /* ƏSAS KART */
        .main-card {
            background: rgba(30, 30, 30, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 30px;
            width: 400px;
            margin-top: 80px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
        }

        h2 {
            font-size: 18px;
            margin-bottom: 25px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* DALĞA SAHƏSİ */
        .wave-container {
            background: #000;
            height: 140px;
            border-radius: 20px;
            margin-bottom: 25px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #222;
        }

        .static-wave {
            width: 80%;
            height: 60px;
            background: linear-gradient(90deg, transparent 0%, #d4ff00 50%, transparent 100%);
            mask-image: url('https://www.svgrepo.com/show/443594/waveform.svg'); /* Təmiz SVG istifadəsi */
            mask-size: contain;
            mask-repeat: no-repeat;
            opacity: 0.6;
        }

        #timer {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #d4ff00;
            font-size: 12px;
            font-family: monospace;
        }

        /* BUTONLAR */
        .btn {
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 14px;
            border: none;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-gray { background: #2a2a2a; color: #fff; }
        .btn-gray:hover { background: #333; }

        .btn-listen { 
            background: #1a1a1a; 
            color: #d4ff00; 
            border: 1px solid #d4ff0033;
            display: none; 
        }

        .btn-premium { 
            background: #d4ff00; 
            color: #000; 
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(212, 255, 0, 0.15);
        }

        .btn-premium:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(212, 255, 0, 0.25); }

    </style>
</head>
