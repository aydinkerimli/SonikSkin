<!DOCTYPE html>
<html lang="tr" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonikSkin | Pro</title>
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/record.min.js"></script>
    <style>
        :root { --neon: #00ffcc; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .l-btn { background: #111; border: 1px solid var(--neon); color: var(--neon); padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        #waveform { width: 100%; height: 150px; margin: 30px 0; background: #050505; border-radius: 10px; border: 1px solid #111; }
        .controls { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .main-btn { 
            background: #ff4757; color: white; border: none; padding: 20px; 
            width: 100%; max-width: 300px; font-size: 18px; font-weight: bold; 
            border-radius: 50px; cursor: pointer; transition: 0.3s;
        }
        .play-btn { background: var(--neon); color: #000; display: none; } /* Kayıt bitince çıkacak */
        .recording { background: #222 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body class="notranslate">

    <div class="nav">
        <span style="color:var(--neon); font-weight:bold;">SONIKSKIN</span>
        <div>
            <button class="l-btn" onclick="setLang('TR')">TR</button>
            <button class="l-btn" onclick="setLang('EN')">EN</button>
            <button class="l-btn" onclick="setLang('RU')">RU</button>
        </div>
    </div>

    <h1 id="t-h">Sesini Sanata Dönüştür</h1>
    <div id="waveform"></div>

    <div class="controls">
        <button id="rec-btn" class="main-btn">KAYDA BAŞLA</button>
        <button id="play-btn" class="main-btn play-btn">KAYDI DİNLE</button>
    </div>

    <script>
        const texts = {
            'TR': { h: "Sesini Sanata Dönüştür", b1: "KAYDA BAŞLA", b2: "DURDUR", p: "KAYDI DİNLE" },
            'EN': { h: "Turn Voice into Art", b1: "START RECORDING", b2: "STOP", p: "PLAY RECORDING" },
            'RU': { h: "Голос в Искусство", b1: "НАЧАТЬ ЗАПИСЬ", b2: "СТОП", p: "ПРОСLUШАТЬ" }
        };

        let currentLang = 'TR';
        let audioUrl = null;
        
        const wavesurfer = WaveSurfer.create({
            container: '#waveform',
            waveColor: '#00ffcc',
            progressColor: '#fff',
            barWidth: 2,
            height: 150
        });

        const record = wavesurfer.registerPlugin(WaveSurfer.Record.create());

        function setLang(lang) {
            currentLang = lang;
            document.getElementById('t-h').innerText = texts[lang].h;
            if(!record.isRecording()) {
                document.getElementById('rec-btn').innerText = texts[lang].b1;
                document.getElementById('play-btn').innerText = texts[lang].p;
            }
        }

        const recBtn = document.getElementById('rec-btn');
        const playBtn = document.getElementById('play-btn');

        // Kayıt Butonu İşlemi
        recBtn.onclick = async () => {
            if (record.isRecording()) {
                record.stopRecording();
                recBtn.innerText = texts[currentLang].b1;
                recBtn.classList.remove('recording');
                return;
            }

            playBtn.style.display = 'none'; // Yeni kayıt başlarken eskiyi gizle
            await record.startRecording();
            recBtn.innerText = texts[currentLang].b2;
            recBtn.classList.add('recording');
        };

        // Kayıt bittiğinde tetiklenir
        record.on('record-end', (blob) => {
            audioUrl = URL.createObjectURL(blob);
            playBtn.style.display = 'block'; // Oynat butonunu göster
            
            // Kaydedilen sesi dalga formuna yükle
            wavesurfer.load(audioUrl);
        });

        // Oynat Butonu İşlemi
        playBtn.onclick = () => {
            wavesurfer.playPause();
        };
    </script>
</body>
</html>
