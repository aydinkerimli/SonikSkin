<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sonic Skin | Memory to Tattoo</title>
    <style>
        :root { --accent: #d4ff00; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        .header { padding: 20px 50px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        select { background: #111; color: white; border: 1px solid #333; padding: 8px; border-radius: 8px; cursor: pointer; }
        .container { display: flex; justify-content: center; gap: 30px; padding: 40px; flex-wrap: wrap; }
        .panel { background: #0c0c0c; border: 1px solid #222; border-radius: 20px; width: 420px; padding: 25px; }
        .tattoo-box { width: 100%; aspect-ratio: 1/1; background: #000; border: 1px dashed #444; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        canvas { width: 100%; height: 60%; }
        .btn { width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .btn-rec { background: #ff3e3e; color: white; }
        .btn-play { background: #333; color: white; display: none; }
        .btn-buy { background: var(--accent); color: black; display: none; }
        .btn-file { background: #222; border: 1px solid #444; color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: bold; color: var(--accent); letter-spacing: 2px;">SONIC SKIN</div>
        <select id="langSelect">
            <option value="tr">Türkçe</option>
            <option value="en">English</option>
            <option value="ru">Русский</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
            <option value="zh">中文 (Chinese)</option>
        </select>
    </div>

    <div class="container">
        <div class="panel">
            <h2 id="txt-live-title">CANLI SES DÖVMESİ</h2>
            <div class="tattoo-box"><canvas id="liveCanvas"></canvas></div>
            <button id="recBtn" class="btn btn-rec">🎤 SESİ KAYDET</button>
            <button id="playBtn1" class="btn btn-play">▶️ KAYDI DİNLE</button>
            <button id="buyBtn1" class="btn btn-buy">BU SESİ HATIRAYA DÖNÜŞTÜR</button>
        </div>

        <div class="panel">
            <h2 id="txt-file-title">DOSYADAN DÖVME YAP</h2>
            <div class="tattoo-box"><canvas id="fileCanvas"></canvas></div>
