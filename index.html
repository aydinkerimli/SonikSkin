<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Skin | V3 Pro</title>
    <style>
        :root { --neon: #d4ff00; --dark: #050505; --panel: #111; }
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Navbar */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: #000; border-bottom: 1px solid #222; }
        .logo { font-weight: bold; color: var(--neon); letter-spacing: 2px; }
        .nav-right { display: flex; gap: 10px; align-items: center; }

        .btn-top { background: transparent; color: #fff; border: 1px solid #444; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-artist { background: var(--neon); color: #000; border: none; }

        /* Main */
        .main-container { display: flex; justify-content: center; gap: 20px; padding: 40px 10px; flex-wrap: wrap; }
        .panel { background: var(--panel); border: 2px solid #222; border-radius: 20px; width: 420px; padding: 25px; box-sizing: border-box; text-align: center; }
        
        .box { width: 100%; aspect-ratio: 1/1; background: #000; border: 1px dashed #333; margin-bottom: 20px; border-radius: 12px; display: flex; align-items: center; }
        canvas { width: 100%; height: 50%; }

        .btn { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; display: block; text-decoration: none; }
        .rec-btn { background: #ff3e3e; color: white; }
        .file-btn { background: #222; color: #fff; border: 1px solid #333; }
        .play-btn { background: #444; color: white; display: none; }
        .buy-btn { background: var(--neon); color: black; display: none; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: #161616; padding: 30px; border-radius: 25px; border: 1px solid #333; width: 300px; text-align: center; }
        .soc-btn { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; }
        
        select { background: #1a1a1a; color: white; border: 1px solid #333; padding: 5px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">SONIC SKIN</div>
        <div class="nav-right">
            <select id="langSel">
                <option value="tr">TR</option>
                <option value="en">EN</option>
                <option value="ru">RU</option>
                <option value="zh">ZH</option>
                <option value="de">DE</option>
                <option value="es">ES</option>
                <option value="fr">FR</option>
            </select>
            <button class="btn-top" onclick="showPop('login')">GİRİŞ YAP</button>
            <button class="btn-top btn-artist" onclick="showPop('artist')">SANATÇI PORTALI</button>
        </div>
    </div>

    <div id="pop" class="modal">
        <div class="modal-content">
            <h3 id="pTitle">Giriş Yap</h3>
            <button class="soc-btn" style="background:white; color:black;">Gmail ile Giriş</button>
            <button class="soc-btn" style="background:black; color:white; border:1px solid #444;">Apple ID ile Giriş</button>
            <button onclick="hidePop()" style="background:none; border:none; color:#ff3e3e; margin-top:15px; cursor:pointer; font-weight:bold;">KAPAT</button>
        </div>
    </div>

    <div class="main-container">
        <div class="panel">
            <h2 id="h1">CANLI SES DÖVMESİ</h2>
            <div class="box"><canvas id="cv1"></canvas></div>
            <button id="btnRec" class="btn rec-btn">🎤 SESİ KAYDET</button>
            <button id="btnP1" class="btn play-btn">▶️ DİNLE</button>
            <a href="#" id="btnB1" class="btn buy-btn">SATIN AL</a>
        </div>

        <div class="panel">
            <h2 id="h2">DOSYADAN DÖVME YAP</h2>
            <div class="box"><canvas id="cv2"></canvas></div>
            <input type="file" id="fInput" hidden accept="audio/*">
            <button id="btnF" class="btn file-btn">📁 DOSYA SEÇ</button>
            <button id="btnP2" class="btn play-btn">▶️ DİNLE</button>
            <a href="#" id="btnB2" class="btn buy-btn">SATIN AL</a>
        </div>
    </div>

    <script>

        const dict = {

            zh: {h1:"现场声音纹身", h2:"从文件制作", rec:"🎤 录制声音", f:"📁 选择文件", buy:"购买草图"},

            fr: {h1:"TATOUAGE VOCAL", h2:"VIA FICHIER", rec:"🎤 ENREGISTRER", f:"📁 CHOISIR", buy:"ACHETER"}
        };

        document.getElementById('langSel').onchange = function() {
            const l = dict[this.value];
            document.getElementById('h1').innerText = l.h1;
            document.getElementById('h2').innerText = l.h2;
            document.getElementById('btnRec').innerText = l.rec;
            document.getElementById('btnF').innerText = l.f;
            document.getElementById('btnB1').innerText = l.buy;
            document.getElementById('btnB2').innerText = l.buy;
        };

        // 2. MODAL SİSTEMİ
        function showPop(type) {
            document.getElementById('pTitle').innerText = type === 'artist' ? 'Sanatçı Portalı' : 'Giriş Yap';
            document.getElementById('pop').style.display = 'flex';
        }
        function hidePop() { document.getElementById('pop').style.display = 'none'; }

        let aCtx, rec, chunks = [], lAud = new Audio(), fAud = new Audio();
