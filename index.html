<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonikSkin | Global</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .nav { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .l-btn { background: #222; border: 1px solid #00ffcc; color: #00ffcc; padding: 10px; border-radius: 5px; cursor: pointer; }
        #visualizer { width: 100%; height: 200px; background: #111; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; }
        .btn { width: 100%; max-width: 300px; padding: 15px; border-radius: 30px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; }
        #recBtn { background: #ff4757; color: #fff; margin-bottom: 10px; }
        #waBtn { background: #25d366; color: #fff; display: none; text-decoration: none; display: none; align-items: center; justify-content: center; margin: 0 auto; }
    </style>
</head>
<body>

    <div class="nav">
        <button class="l-btn" onclick="degis('TR')">TR</button>
        <button class="l-btn" onclick="degis('EN')">EN</button>
        <button class="l-btn" onclick="degis('RU')">RU</button>
    </div>

    <h1 id="baslik">Sesini Sanata Dönüştür</h1>
    <canvas id="visualizer"></canvas>

    <button id="recBtn" onclick="baslatDurdur()">KAYDA BAŞLA</button>
    <a id="waBtn" href="#" target="_blank" class="btn">ŞABLONU SATIN AL (WA)</a>

    <script>
        let kayıtVar = false;
        let seciliDil = 'TR';
        const diller = {
            'TR': { h: "Sesini Sanata Dönüştür", b1: "KAYDA BAŞLA", b2: "DURDUR", wa: "ŞABLONU SATIN AL" },
            'EN': { h: "Turn Voice into Art", b1: "START RECORDING", b2: "STOP", wa: "BUY DESIGN" },
            'RU': { h: "Голос в Искусство", b1: "НАЧАТЬ ЗАПИСЬ", b2: "СТОП", wa: "КУПИТЬ ЭСКИЗ" }
        };

        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        let audioCtx, analyser, dataArray, source, anim;

        function degis(dil) {
            seciliDil = dil;
            document.getElementById('baslik').innerText = diller[dil].h;
            document.getElementById('recBtn').innerText = kayıtVar ? diller[dil].b2 : diller[dil].b1;
            document.getElementById('waBtn').innerText = diller[dil].wa;
        }

        async function baslatDurdur() {
            const btn = document.getElementById('recBtn');
            const wa = document.getElementById('waBtn');

            if (!kayıtVar) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    kayıtVar = true;
                    btn.innerText = diller[seciliDil].b2;
                    wa.style.display = 'none';

                    audioCtx = new AudioContext();
                    analyser = audioCtx.createAnalyser();
                    source = audioCtx.createMediaStreamSource(stream);
                    source.connect(analyser);
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                    
                    function ciz() {
                        anim = requestAnimationFrame(ciz);
                        analyser.getByteFrequencyData(dataArray);
                        ctx.fillStyle = '#111';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        let x = 0;
                        for (let i = 0; i < dataArray.length; i++) {
                            let h = dataArray[i] / 2;
                            ctx.fillStyle = '#00ffcc';
                            ctx.fillRect(x, canvas.height - h, 2, h);
                            x += 3;
                        }
                    }
                    ciz();
                } catch (e) { alert("Mikrofon izni veriniz!"); }
            } else {
                kayıtVar = false;
                btn.innerText = diller[seciliDil].b1;
                wa.style.display = 'flex';
                cancelAnimationFrame(anim);
                
                // WhatsApp Linkini Ayarla
                const numara = "905XXXXXXXXX"; // BURAYA KENDİ NUMARANI YAZ
                const mesaj = encodeURIComponent("Selam, ses dalgamı oluşturdum. Satın almak istiyorum.");
                wa.href = "https://wa.me/" + numara + "?text=" + mesaj;
            }
        }

        window.onload = () => {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        };
    </script>
</body>
</html>
