<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonik Skin - Universal Pro AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --neon: #d4ff00; --bg: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f2027);
            background-size: 400% 400%; animation: moveGradient 15s ease infinite;
            color: white; font-family: sans-serif; margin: 0; padding: 0; min-height: 100vh;
        }

        @keyframes moveGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        header {
            width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-weight: 900; color: var(--neon); font-size: 1.1rem; cursor: pointer; }

        /* SCANET DÜYMƏSİ - SOLDA, LOGO ALTI */
        .scan-trigger-box { position: absolute; top: 75px; left: 20px; z-index: 999; }
        .btn-scan-trigger {
            background: rgba(212, 255, 0, 0.15); color: var(--neon); border: 1px solid var(--neon); 
            padding: 8px 15px; border-radius: 10px; font-weight: bold; font-size: 12px; cursor: pointer;
        }

        .lang-dropdown { position: relative; }
        .lang-btn { background: #222; border: 1px solid #444; color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .lang-content {
            display: none; position: absolute; right: 0; background: #1a1a1a;
            min-width: 110px; border: 1px solid #333; border-radius: 8px; z-index: 1000;
        }
        .lang-content span { padding: 12px; display: block; cursor: pointer; border-bottom: 1px solid #222; font-size: 13px; }
        .lang-dropdown:hover .lang-content { display: block; }

        .container { display: flex; justify-content: center; align-items: center; padding: 110px 15px 15px; }
        .card {
            background: rgba(17, 17, 17, 0.9); border: 1px solid rgba(255,255,255,0.1); padding: 25px;
            border-radius: 25px; width: 100%; max-width: 380px; text-align: center;
        }

        .wave-box {
            background: #000; height: 140px; border-radius: 20px; margin-bottom: 25px;
            position: relative; border: 1px solid #1a1a1a; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        canvas { width: 100%; height: 100%; background: #000; }
        #timer { position: absolute; top: 12px; right: 15px; color: var(--neon); font-family: monospace; font-size: 14px; z-index: 5; }

        .btn {
            width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 15px; border: none;
            font-weight: bold; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-gray { background: #222; color: #fff; border: 1px solid #333; }
        .btn-main { background: var(--neon); color: #000; }
        
        #ar-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 3000; background: #000; }
        .close-ar { position: absolute; top: 30px; right: 30px; background: red; color: white; padding: 10px 20px; border-radius: 10px; z-index: 3001; cursor: pointer; }
        .mindar-ui-loading, .mindar-ui-overlay { display: none !important; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="resetPage()">SONIK SKIN</div>
    <div class="lang-dropdown">
        <button class="lang-btn" id="curLang">TR ▾</button>
        <div class="lang-content">
            <span onclick="updateLang('tr')">Türkçe</span>
            <span onclick="updateLang('en')">English</span>
            <span onclick="updateLang('ru')">Русский</span>
            <span onclick="updateLang('fr')">Français</span>
            <span onclick="updateLang('zh')">中文</span>
            <span onclick="updateLang('de')">Deutsch</span>
        </div>
    </div>
</header>

<div class="scan-trigger-box">
    <button class="btn-scan-trigger" onclick="startAR()">🔍 SCANET</button>
</div>

<div class="container">
    <div class="card">
        <h2 id="ui-title">DOSYADAN DÖVME YAP</h2>
        <div class="wave-box">
            <canvas id="waveCanvas"></canvas>
            <div id="timer">00:00 / 00:08</div>
        </div>
        <div id="action-area">
            <button class="btn btn-gray" onclick="initMic()">🎤 <span id="ui-rec">SESİ KAYDET</span></button>
            <input type="file" id="fInp" hidden onchange="handleFile(event)">
            <button class="btn btn-gray" onclick="document.getElementById('fInp').click()">📁 <span id="ui-select">DOSYA SEÇ</span></button>
            <button class="btn btn-gray" id="btn-play" style="display:none;" onclick="playAudio()">🔊 <span id="ui-listen">DİNLE</span></button>
            <button class="btn btn-main" onclick="location.href='https://sonikskin.lemonsqueezy.com/checkout/buy/7997dd0f-76bd-4a1c-99f5-b2253aeb1ee6'" id="ui-down">HATIRAYA DÖNÜŞTÜR</button>
        </div>
    </div>
</div>

<div id="ar-view">
    <div class="close-ar" onclick="stopAR()">KAPAT</div>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;" embedded vr-mode-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0" id="arTarget">
            <a-plane position="0 0 0" height="0.5" width="0.5" material="src: #waveCanvas; transparent: true"></a-plane>
        </a-entity>
    </a-scene>
</div>

<script>
    // DİLLƏR TAM ŞƏKİLDƏ QAYTARILDI
    const langs = {
        tr: { title: "DOSYADAN DÖVME YAP", select: "DOSYA SEÇ", down: "HATIRAYA DÖNÜŞTÜR", listen: "DİNLE", rec: "SESİ KAYDET" },
        en: { title: "CREATE TATTOO FROM FILE", select: "CHOOSE FILE", down: "CONVERT TO MEMORY", listen: "LISTEN", rec: "RECORD" },
        ru: { title: "ТАТУ ИЗ ФАЙЛА", select: "ВЫБРАТЬ ФАЙЛ", down: "СОЗДАТЬ ВОСПОМИНАНИЕ", listen: "СЛУШАТЬ", rec: "ЗАПИСЬ" },
        fr: { title: "CRÉER TATOUAGE", select: "CHOISIR UN FICHIER", down: "CONVERTIR EN SOUVENIR", listen: "ÉCOUTER", rec: "ENREGISTRER" },
        zh: { title: "纹身制作", select: "选择文件", down: "将其转化为记忆", listen: "倾听", rec: "录音" },
        de: { title: "TATTOO DATEI", select: "WÄHLEN", down: "IN ERINNERUNG VERWANDELN", listen: "ANHÖREN", rec: "AUFNAHME" }
    };

    let audio, analyser, dataArray, animFrame, staticData = [];
    const canvas = document.getElementById('waveCanvas'), ctx = canvas.getContext('2d');

    function updateLang(l) {
        localStorage.setItem('sonikLang', l);
        document.getElementById('ui-title').innerText = langs[l].title;
        document.getElementById('ui-select').innerText = langs[l].select;
        document.getElementById('ui-down').innerText = langs[l].down;
        document.getElementById('ui-listen').innerText = langs[l].listen;
        document.getElementById('ui-rec').innerText = langs[l].rec;
        document.getElementById('curLang').innerText = l.toUpperCase() + " ▾";
    }

    async function processAudio(blob) {
        audio = new Audio(URL.createObjectURL(blob));
        const buffer = await blob.arrayBuffer();
        const aCtx = new AudioContext();
        const decoded = await aCtx.decodeAudioData(buffer);
        generateStatic(decoded);
        document.getElementById('btn-play').style.display = 'flex';
    }

    function generateStatic(buffer) {
        const raw = buffer.getChannelData(0);
        const samples = 60, blockSize = Math.floor((buffer.sampleRate * 8) / samples);
        staticData = [];
        for (let i = 0; i < samples; i++) {
            let sum = 0;
            for (let j = 0; j < blockSize; j++) { sum += Math.abs(raw[(blockSize * i) + j] || 0); }
            staticData.push(sum / blockSize);
        }
        drawStatic();
    }

    function drawStatic() {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
        let barW = canvas.width / staticData.length;
        staticData.forEach((v, i) => {
            let h = v * canvas.height * 5;
            ctx.strokeStyle = (i < 15 || i > 45) ? '#00c3ff' : '#d4ff00';
            ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.beginPath();
            ctx.moveTo(i*barW + barW/2, canvas.height/2-h/2); ctx.lineTo(i*barW + barW/2, canvas.height/2+h/2); ctx.stroke();
        });
    }

    function playAudio() {
        const aCtx = new AudioContext();
        analyser = aCtx.createAnalyser();
        const src = aCtx.createMediaElementSource(audio);
        src.connect(analyser); analyser.connect(aCtx.destination);
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        render(); audio.play();
    }

    function render() {
        animFrame = requestAnimationFrame(render);
        analyser.getByteFrequencyData(dataArray);
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.strokeStyle = '#d4ff00'; ctx.lineWidth = 4; ctx.beginPath();
        let x = 0, barW = (canvas.width / dataArray.length) * 2.5;
        for(let i=0; i<dataArray.length; i++){
            let h = dataArray[i]/2; ctx.moveTo(x, canvas.height/2-h/2); ctx.lineTo(x, canvas.height/2+h/2); x += barW+2;
        }
        ctx.stroke();
    }

    function startAR() {
        document.getElementById('ar-view').style.display = 'block';
        document.querySelector('a-scene').systems['mindar-image-system'].start();
        const target = document.getElementById('arTarget');
        target.addEventListener("targetFound", () => { if(audio) audio.play(); });
        target.addEventListener("targetLost", () => { if(audio) audio.pause(); });
    }

    function stopAR() {
        document.getElementById('ar-view').style.display = 'none';
        document.querySelector('a-scene').systems['mindar-image-system'].stop();
    }

    function initMic() {
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            const mediaRec = new MediaRecorder(stream); mediaRec.start();
            let chunks = [], s = 0;
            const t = setInterval(() => { s++; document.getElementById('timer').innerText = `00:0${s} / 00:08`; if(s>=8){ clearInterval(t); mediaRec.stop(); stream.getTracks().forEach(tr=>tr.stop()); } }, 1000);
            mediaRec.onstop = () => processAudio(new Blob(chunks)); mediaRec.ondataavailable = e => chunks.push(e.data);
        });
    }

    function handleFile(e) { if(e.target.files[0]) processAudio(e.target.files[0]); }
    function resetPage() { window.location.reload(); }
    updateLang(localStorage.getItem('sonikLang') || 'tr');
</script>
</body>
</html>
