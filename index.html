<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Skin | Final Fix</title>
    <style>
        :root { --accent: #d4ff00; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        
        /* Navbar */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: #000; border-bottom: 1px solid #222; }
        .logo { font-weight: bold; color: var(--accent); letter-spacing: 2px; }
        .nav-right { display: flex; gap: 10px; }

        .btn-top { background: transparent; color: #fff; border: 1px solid #444; padding: 8px 15px; border-radius: 6px; cursor: pointer; }
        .btn-artist { background: var(--accent); color: #000; border: none; font-weight: bold; }

        /* Paneller */
        .main-container { display: flex; justify-content: center; gap: 20px; padding: 40px 10px; flex-wrap: wrap; }
        .panel { background: #111; border: 2px solid #222; border-radius: 20px; width: 400px; padding: 25px; box-sizing: border-box; }
        .tattoo-box { width: 100%; aspect-ratio: 1/1; background: #000; border: 1px dashed #333; margin-bottom: 20px; border-radius: 12px; display: flex; align-items: center; }
        canvas { width: 100%; height: 50%; }

        .btn { width: 100%; padding: 16px; margin: 8px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #recBtn { background: #ff3e3e; color: white; }
        .play-btn { background: #333; color: white; display: none; }
        .buy-btn { background: var(--accent); color: black; display: none; text-decoration: none; text-align: center; display: none; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #333; width: 300px; text-align: center; }
        
        select { background: #1a1a1a; color: white; border: 1px solid #333; padding: 6px; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">SONIC SKIN</div>
        <div class="nav-right">
            <select id="langSelect">
                <option value="tr">TR</option>
                <option value="en">EN</option>
                <option value="ru">RU</option>
                <option value="zh">ZH</option>
            </select>
            <button class="btn-top" onclick="showModal('Giriş Yap')">GİRİŞ YAP</button>
            <button class="btn-top btn-artist" onclick="showModal('Sanatçı Portalı')">SANATÇI PORTALI</button>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h3 id="mTitle">Giriş Yap</h3>
            <button class="btn" style="background:white; color:black; margin-bottom:10px;">Gmail ile Giriş</button>
            <button class="btn" style="background:black; color:white; border:1px solid #444;">Apple ID ile Giriş</button>
            <button onclick="hideModal()" style="background:none; border:none; color:#ff3e3e; margin-top:15px; cursor:pointer; font-weight:bold;">KAPAT</button>
        </div>
    </div>

    <div class="main-container">
        <div class="panel">
            <h2 id="t1" style="text-align:center">CANLI SES DÖVMESİ</h2>
            <div class="tattoo-box"><canvas id="c1"></canvas></div>
            <button id="recBtn" class="btn">🎤 SESİ KAYDET</button>
            <button id="p1" class="btn play-btn">▶️ KAYDI DİNLE</button>
            <a href="#" id="b1" class="btn buy-btn" style="display:none">TASLAĞI SATIN AL</a>
        </div>
        <div class="panel">
            <h2 id="t2" style="text-align:center">DOSYADAN DÖVME YAP</h2>
            <div class="tattoo-box"><canvas id="c2"></canvas></div>
            <input type="file" id="fIn" hidden accept="audio/*">
            <button onclick="document.getElementById('fIn').click()" id="fBtn" class="btn" style="background:#222; color:#fff;">📁 SES DOSYASI SEÇ</button>
            <button id="p2" class="btn play-btn">▶️ DOSYAYI DİNLE</button>
            <a href="#" id="b2" class="btn buy-btn" style="display:none">TASLAĞI SATIN AL</a>
        </div>
    </div>

    <script>
        // MODAL KONTROLÜ
        function showModal(text) {
            document.getElementById('mTitle').innerText = text;
            document.getElementById('loginModal').style.display = 'flex';
        }
        function hideModal() {
            document.getElementById('loginModal').style.display = 'none';
        }

        // DİL DEĞİŞTİRME
        const texts = {
            tr: {t1:"CANLI SES DÖVMESİ", t2:"DOSYADAN DÖVME YAP", rec:"🎤 SESİ KAYDET", f:"📁 SES DOSYASI SEÇ", buy:"TASLAĞI SATIN AL"},
            en: {t1:"LIVE VOICE TATTOO", t2:"TATTOO FROM FILE", rec:"🎤 RECORD VOICE", f:"📁 CHOOSE AUDIO", buy:"BUY DRAFT"},
            ru: {t1:"ЖИВАЯ ТАТУ", t2:"ИЗ ФАЙЛА", rec:"🎤 ЗАПИСАТЬ", f:"📁 ВЫБРАТЬ", buy:"КУПИТЬ"},
            zh: {t1:"现场声音纹身", t2:"从文件制作", rec:"🎤 录制声音", f:"📁 选择文件", buy:"购买草图"}
        };

        document.getElementById('langSelect').addEventListener('change', function() {
            const val = this.value;
            document.getElementById('t1').innerText = texts[val].t1;
            document.getElementById('t2').innerText = texts[val].t2;
            document.getElementById('recBtn').innerText = texts[val].rec;
            document.getElementById('fBtn').innerText = texts[val].f;
            document.getElementById('b1').innerText = texts[val].buy;
            document.getElementById('b2').innerText = texts[val].buy;
        });

        // SES SİSTEMİ
        let aCtx, rec, chunks = [], liveA = new Audio(), fileA = new Audio();

        function draw(an, id) {
            const c = document.getElementById(id), ctx = c.getContext('2d'), d = new Uint8Array(an.frequencyBinCount);
            function render() {
                requestAnimationFrame(render); an.getByteTimeDomainData(d);
                ctx.fillStyle="#000"; ctx.fillRect(0,0,c.width,c.height);
                ctx.lineWidth=3; ctx.strokeStyle="#d4ff00"; ctx.beginPath();
                let slice=c.width/d.length, x=0;
                for(let i=0; i<d.length; i++) {
                    let v=d[i]/128, y=v*c.height/2;
                    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); x+=slice;
                }
                ctx.stroke();
            } render();
        }

        document.getElementById('recBtn').addEventListener('click', async function() {
            try {
                if(!aCtx) aCtx = new (window.AudioContext || window.webkitAudioContext)();
                if(aCtx.state === 'suspended') await aCtx.resume();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const an = aCtx.createAnalyser(); aCtx.createMediaStreamSource(stream).connect(an);
                draw(an, 'c1');
                rec = new MediaRecorder(stream); chunks = [];
                rec.ondataavailable = e => chunks.push(e.data);
                rec.onstop = () => {
                    liveA.src = URL.createObjectURL(new Blob(chunks));
                    document.getElementById('p1').style.display='block';
                    document.getElementById('b1').style.display='block';
                };
                rec.start(); this.innerText = "8sn...";
                setTimeout(() => { rec.stop(); stream.getTracks().forEach(t=>t.stop()); this.style.display='none'; }, 8000);
            } catch(e) { alert("Mikrofon izni gerekli!"); }
        });

        document.getElementById('fIn').addEventListener('change', function(e) {
            const f = e.target.files[0]; if(!f) return;
            fileA.src = URL.createObjectURL(f);
            document.getElementById('p2').style.display='block';
            document.getElementById('b2').style.display='block';
            if(!aCtx) aCtx = new AudioContext();
            const src = aCtx.createMediaElementSource(fileA), an = aCtx.createAnalyser();
            src.connect(an); an.connect(aCtx.destination); draw(an, 'c2');
        });

        document.getElementById('p1').onclick = () => liveA.play();
        document.getElementById('p2').onclick = () => fileA.play();
    </script>
</body>
</html>
