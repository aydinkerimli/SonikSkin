<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Skin | Global Master</title>
    <style>
        :root { --neon: #d4ff00; --bg: #050505; --panel: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Navbar */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: #000; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: bold; color: var(--neon); letter-spacing: 2px; }
        .nav-right { display: flex; gap: 12px; align-items: center; }

        .btn-top { background: transparent; color: #fff; border: 1px solid #444; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.3s; }
        .btn-artist { background: var(--neon); color: #000; border: none; }

        /* Ana Konteyner - Görseldeki Yan Yana Düzen */
        .main-container { display: flex; justify-content: center; gap: 25px; padding: 50px 15px; flex-wrap: wrap; }
        .panel { background: var(--panel); border: 2px solid #222; border-radius: 24px; width: 420px; padding: 30px; box-sizing: border-box; text-align: center; }
        
        /* Dalga Formu Kutusu */
        .box { width: 100%; aspect-ratio: 1/1; background: #000; border: 1px dashed #333; margin-bottom: 25px; border-radius: 15px; display: flex; align-items: center; overflow: hidden; position: relative; }
        canvas { width: 100%; height: 50%; }

        /* Butonlar */
        .btn { width: 100%; padding: 16px; margin: 10px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; }
        #bRec { background: #ff3e3e; color: white; }
        .play-btn { background: #333; color: white; display: none; }
        .buy-btn { background: var(--neon); color: black; display: none; text-decoration: none; text-align: center; line-height: 1.2; }

        /* Giriş Penceresi (Modal) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: #161616; padding: 40px; border-radius: 30px; border: 1px solid #333; width: 340px; text-align: center; }
        .soc-btn { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; }
        
        select { background: #1a1a1a; color: white; border: 1px solid #333; padding: 8px; border-radius: 8px; cursor: pointer; outline: none; }
    </style>
</head>
