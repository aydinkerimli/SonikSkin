<script>

    recordBtn.onclick = () => {
        // Tarayıcıdan mikrofon izni iste ve kontrol et
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                if (record.isRecording()) stopRecording();
                else startRecording();
            })
            .catch(err => {
                alert("Mikrofon hatası: " + err.name + ". Lütfen tarayıcı ayarlarından mikrofona izin verin.");
                console.error(err);
            });
    };

    // ... (diğer fonksiyonlar aynı kalsın) ...
</script>
