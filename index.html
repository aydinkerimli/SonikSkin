<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Skin | Memory Tattoo</title>
    <style>
        :root { --accent: #d4ff00; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; text-align: center; }
        .header { padding: 20px 50px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        select { background: #111; color: white; border: 1px solid #333; padding: 10px; border-radius: 8px; cursor: pointer; outline: none; }
        .container { display: flex; justify-content: center; gap: 30px; padding: 40px; flex-wrap: wrap; }
        .panel { background: #0c0c0c; border: 1px solid #222; border-radius: 20px; width: 420px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .tattoo-box { width: 100%; aspect-ratio: 1/1; background: #000; border: 1px dashed #444; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; position: relative; }
        canvas { width: 100%; height: 100%; }
        .btn { width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; display: block; }
        .btn-rec { background: #ff3e3e; color: white; }
        .btn-play { background: #333; color: white; display: none; }
        .btn-buy { background: var(--accent); color: black; display: none; text-decoration: none; line-height: 1.2; }
        .btn-file { background: #222; border: 1px solid #444; color: white; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.2); }
        h2 { font-size: 1.2rem; margin-bottom: 20px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: bold; color: var(--accent); letter-spacing: 2px; font-size: 1.5rem;">SONIC SKIN</div>
        <select id="langSelect">
            <option value="tr">Türkçe</option>
            <option value="en">English</option>
            <option value="ru">Русский</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
            <option value="zh">中文 (Chinese)</option>
        </select>
    </div>

    <div class="container">
        <div class="panel">
            <h2 id="txt-live-title">CANLI SES DÖVMESİ</h2>
            <div class="tattoo-box"><canvas id="liveCanvas"></canvas></div>
            <button id="recBtn" class="btn btn-rec">🎤 SESİ KAYDET</button>
            <button id="playBtn1" class="btn btn-play">▶️ KAYDI DİNLE</button>
            <button id="buyBtn1" class="btn btn-buy">BU SESİ HATIRAYA DÖNÜŞTÜR</button>
        </div>

        <div class="panel">
            <h2 id="txt-file-title">DOSYADAN DÖVME YAP</h2>
            <div class="tattoo-box"><canvas id="fileCanvas"></canvas></div>
            <input type="file" id="fileInput" hidden accept="audio/*">
            <button onclick="document.getElementById('fileInput').click()" id="txt-file-btn" class="btn btn-file">📁 SES DOSYASI SEÇ</button>
            <button id="playBtn2" class="btn btn-play">▶️ DOSYAYI DİNLE</button>
            <button id="buyBtn2" class="btn btn-buy">BU SESİ HATIRAYA DÖNÜŞTÜR</button>
        </div>
    </div>

    <script>
        const langData = {
            tr: { live: "CANLI SES DÖVMESİ", file: "DOSYADAN DÖVME YAP", rec: "🎤 SESİ KAYDET", fileBtn: "📁 SES DOSYASI SEÇ", buy: "BU SESİ HATIRAYA DÖNÜŞTÜR", play: "▶️ KAYDI DİNLE", recording: "8 Saniye Kaydediliyor..." },
            en: { live: "LIVE VOICE TATTOO", file: "TATTOO FROM FILE", rec: "🎤 RECORD VOICE", fileBtn: "📁 CHOOSE AUDIO FILE", buy: "CONVERT THIS VOICE INTO A MEMORY", play: "▶️ PLAY AUDIO", recording: "Recording 8 Seconds..." },
            ru: { live: "ЖИВАЯ ТАТУ ГОЛОСА", file: "ТАТУ ИЗ ФАЙЛА", rec: "🎤 ЗАПИСАТЬ", fileBtn: "📁 ВЫБРАТЬ ФАЙЛ", buy: "ПРЕВРАТИТЕ ЭТОТ ГОЛОС В ПАМЯТЬ", play: "▶️ СЛУШАТЬ", recording: "Запись 8 секунд..." },
            fr: { live: "TATOUAGE VOCAL EN DIRECT", file: "TATOUAGE VIA FICHIER", rec: "🎤 ENREGISTRER", fileBtn: "📁 CHOISIR UN FICHIER", buy: "TRANSFORMER CETTE VOIX EN SOUVENIR", play: "▶️ ÉCOUTER", recording: "Enregistrement 8 sec..." },
            de: { live: "LIVE-STIMMTÄTOWIERUNG", file: "TATTOO AUS DATEI", rec: "🎤 STIMME AUFNEHMEN", fileBtn: "📁 AUDIO-DATEI WÄHLEN", buy: "DIESE STIMME IN EINE ERINNERUNG VERWANDELN", play: "▶️ AUDIO ABSPIELEN", recording: "8 Sekunden Aufnahme..." },
            es: { live: "TATUAJE DE VOZ EN VIVO", file: "TATUAJE DESDE ARCHIVO", rec: "🎤 GRABAR VOZ", fileBtn: "📁 ELEGIR ARCHIVO", buy: "CONVIERTE ESTA VOZ EN UN RECUERDO", play: "▶️ REPRODUCIR AUDIO", recording: "Grabando 8 segundos..." },
            zh: { live: "现场声音纹身", file: "从文件制作纹身", rec: "🎤 录制声音", fileBtn: "📁 选择音频文件", buy: "将此声音转化为回忆", play: "▶️ 播放音频", recording: "录制 8 秒..." }
        };

        const langSelect = document.getElementById('langSelect');
        const updateLanguage = () => {
            const l = langData[langSelect.value];
            document.getElementById('txt-live-title').innerText = l.live;
            document.getElementById('txt-file-title').innerText = l.file;
            document.getElementById('recBtn').innerText = l.rec;
            document.getElementById('txt-file-btn').innerText = l.fileBtn;
            document.getElementById('buyBtn1').innerText = l.buy;
            document.getElementById('buyBtn2').innerText = l.buy;
            document.getElementById('playBtn1').innerText = l.play;
            document.getElementById('playBtn2').innerText = l.play;
        };
        langSelect.addEventListener('change', updateLanguage);

        let audioCtx;
        const initAudio = () => { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); };

        function visualize(source, canvasId) {
            initAudio();
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            const analyser = audioCtx.createAnalyser();
            source.connect(analyser);
            if (!(source instanceof MediaStreamAudioSourceNode)) analyser.connect(audioCtx.destination);
            
            analyser.fftSize = 256;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function draw() {
                requestAnimationFrame(draw);
                analyser.getByteTimeDomainData(dataArray);
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#d4ff00';
                ctx.beginPath();
                let sliceWidth = canvas.width / bufferLength;
                let x = 0;
                for (let i = 0; i < bufferLength; i++) {
                    let v = dataArray[i] / 128.0;
                    let y = v * canvas.height / 2;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    x += sliceWidth;
                }
                ctx.stroke();
            }
            draw();
        }

        // CANLI KAYIT
        const recBtn = document.getElementById('recBtn');
        let liveAudio = new Audio();
        recBtn.onclick = async () => {
            initAudio();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioCtx.createMediaStreamSource(stream);
            visualize(source, 'liveCanvas');
