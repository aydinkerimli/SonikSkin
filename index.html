<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonik Skin - SCAN.IT FIX</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --neon: #d4ff00; --bg: #050505; --red: #ff3b3b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: #050505; color: white; font-family: sans-serif; margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; }
        header { width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); border-bottom: 1px solid #333; position: relative; z-index: 5000; }
        .logo { font-weight: 900; color: var(--neon); font-size: 1.1rem; }
        .lang-dropdown { position: relative; }
        .lang-btn { background: #222; border: 1px solid #444; color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
        .lang-content { display: none; position: absolute; right: 0; background: #1a1a1a; min-width: 130px; border: 1px solid #333; z-index: 9999; }
        .lang-dropdown:hover .lang-content { display: block; }
        .lang-content span { padding: 10px; display: block; cursor: pointer; border-bottom: 1px solid #222; }
        .container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .card { background: #111; border: 1px solid #222; padding: 25px; border-radius: 20px; width: 100%; max-width: 380px; text-align: center; }
        .btn-scan-top { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 50px; background: transparent; border: 2px solid var(--neon); color: var(--neon); font-weight: bold; cursor: pointer; }
        .wave-box { background: #000; height: 140px; border-radius: 15px; margin-bottom: 20px; position: relative; border: 1px solid #222; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #lock-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 5; }
        canvas { width: 100%; height: 100%; }
        #timer { position: absolute; top: 10px; right: 10px; color: var(--neon); font-size: 12px; }
        .btn { width: 100%; padding: 16px; margin-bottom: 10px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        .btn-gray { background: #222; color: #fff; }
        .btn-main { background: var(--neon); color: #000; }
        .audio-group { display: none; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        #ar-view { display: none; position: fixed; inset: 0; z-index: 10000; background: #000; }
        #manual-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 80; }
        a-scene { position: absolute; inset: 0; z-index: 85; }
        .close-ar { position: absolute; top: 20px; right: 20px; z-index: 100; background: var(--red); color: white; border: none; padding: 10px 20px; border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <div class="logo">SONIK SKIN</div>
    <div class="lang-dropdown">
        <button class="lang-btn" id="curLang">TR ▾</button>
        <div class="lang-content">
            <span onclick="updateLang('tr')">Türkçe</span>
            <span onclick="updateLang('en')">English</span>
            <span onclick="updateLang('ru')">Русский</span>
            <span onclick="updateLang('fr')">Français</span>
        </div>
    </div>
</header>

<div class="container">
    <div class="card">
        <button class="btn-scan-top" onclick="startARUniversal()">🔍 <span id="ui-scan">SCANET</span></button>

        <h2 id="ui-title" style="font-size: 1.1rem; margin-bottom: 20px;">DOSYADAN DÖVME YAP</h2>
        
        <div class="wave-box">
            <canvas id="waveCanvas"></canvas>
            <div id="timer">00:00 / 00:08</div>
            <div id="lock-overlay">
                <span id="ui-lock-title">🔒 KİLİTLİ</span>
            </div>
        </div>

        <div id="action-area">
            <button class="btn btn-gray" onclick="initMic()">🎤 <span id="ui-rec">SESİ KAYDET</span></button>
            <button class="btn btn-gray" onclick="document.getElementById('fInp').click()">📁 <span id="ui-select">DOSYA SEÇ</span></button>
            <input type="file" id="fInp" hidden onchange="handleFile(event)" accept="audio/*">
            
            <div class="audio-group" id="audio-ctrl">
                <button class="btn btn-gray" onclick="playAudio()">🔊 DİNLE</button>
                <button class="btn btn-gray" style="background:var(--red)" onclick="stopAudio()">🛑 STOP</button>
            </div>

            <button class="btn btn-main" onclick="handleCheckout()" id="ui-down">BUNU HATIRAYA DÖNÜŞTÜR</button>
        </div>
        <button class="btn btn-main" id="success-btn" style="display:none; background:#00c3ff" onclick="downloadPNG()">✅ İNDİR</button>
    </div>
</div>

<div id="ar-view">
    <button class="close-ar" onclick="location.reload()">KAPAT</button>
    <video id="manual-video" autoplay playsinline muted></video>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no;" embedded vr-mode-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0">
            <a-plane position="0 0 0" height="0.5" width="0.5" material="src: #waveCanvas; transparent: true; opacity: 0.9"></a-plane>
        </a-entity>
    </a-scene>
</div>

<script>
    const LEMON_LINK = "https://sonikskin.lemonsqueezy.com/checkout/buy/7997dd0f-76bd-4a1c-99f5-b2253aeb1ee6";
    let recorder, chunks = [], audio, analyser, dataArray, staticDataArray = [];
    const canvas = document.getElementById('waveCanvas'), ctx = canvas.getContext('2d');

    // DÜYMƏNİ İŞLƏDƏN ƏSAS FUNKSİYA
    async function startARUniversal() {
        const v = document.getElementById('manual-video');
        const arView = document.getElementById('ar-view');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            v.srcObject = stream;
            arView.style.display = 'block';
            v.onloadedmetadata = () => {
                v.play();
                setTimeout(() => {
                    document.querySelector('a-scene').systems['mindar-image-system'].start();
                }, 600);
            };
        } catch(e) { alert("Kamera açılmadı. İzinləri yoxlayın."); }
    }

    // DİL VƏ DİGƏR FUNKSİYALAR (SADƏLƏŞDİRİLMİŞ)
    function updateLang(l) {
        localStorage.setItem('sonikLang', l);
        document.getElementById('curLang').innerText = l.toUpperCase() + " ▾";
        // Burada digər tərcümə mətnlərini ehtiyac olsa əlavə edə bilərsən
    }

    async function initMic() {
        const s = await navigator.mediaDevices.getUserMedia({ audio: true });
        recorder = new MediaRecorder(s);
        recorder.start(); chunks = [];
        setTimeout(() => { recorder.stop(); s.getTracks().forEach(t => t.stop()); }, 8000);
        recorder.onstop = async () => {
            const blob = new Blob(chunks);
            const ad = await blob.arrayBuffer();
            const decoded = await new AudioContext().decodeAudioData(ad);
            generateWave(decoded);
            document.getElementById('audio-ctrl').style.display = 'grid';
        };
        recorder.ondataavailable = e => chunks.push(e.data);
    }

    function generateWave(buffer) {
        const data = buffer.getChannelData(0);
        staticDataArray = [];
        const step = Math.floor(data.length / 60);
        for(let i=0; i<60; i++) { staticDataArray.push(Math.abs(data[i*step])); }
        drawStatic();
    }

    function drawStatic() {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
        staticDataArray.forEach((v, i) => {
            ctx.strokeStyle = '#d4ff00';
            ctx.beginPath();
            ctx.moveTo(i*6, 70-(v*300)); ctx.lineTo(i*6, 70+(v*300));
            ctx.stroke();
        });
    }

    function handleCheckout() { window.location.href = LEMON_LINK; }
    function handleFile(e) { /* Fayl yükləmə məntiqi */ }
    function playAudio() { /* Səs dinləmə məntiqi */ }
    function stopAudio() { if(audio) audio.pause(); }
</script>
</body>
</html>
