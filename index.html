<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonik Skin Premium - Vibrant Edition</title>
    <style>
        :root { 
            --neon: #d4ff00; 
            --electric-blue: #00d4ff;
            --premium-gradient: linear-gradient(135deg, #050505 0%, #001a33 100%);
            --card-glass: rgba(255, 255, 255, 0.03);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            background: var(--premium-gradient);
            color: white; font-family: 'Inter', -apple-system, sans-serif;
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column;
            overflow-x: hidden;
        }

        /* Işıqlı vizual effektlər */
        body::before {
            content: ''; position: absolute; width: 300px; height: 300px;
            background: var(--electric-blue); filter: blur(150px); opacity: 0.15;
            top: -50px; left: -50px; z-index: -1;
        }

        header {
            width: 100%; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { 
            font-weight: 900; color: var(--neon); font-size: 1.5rem; letter-spacing: 2px;
            text-shadow: 0 0 15px var(--neon);
        }

        /* DİLLƏR - SABİT VƏ TOXUNULMAZ */
        .lang-dropdown { position: relative; }
        .lang-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 15px; border-radius: 12px; cursor: pointer; }
        .lang-content {
            display: none; position: absolute; right: 0; background: #0a0a0a;
            min-width: 120px; border: 1px solid #333; border-radius: 12px; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .lang-content span { padding: 12px; display: block; cursor: pointer; border-bottom: 1px solid #222; font-size: 14px; }
        .lang-dropdown:hover .lang-content { display: block; }

        .container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        
        .card {
            background: rgba(15, 15, 15, 0.8); 
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 40px 30px; border-radius: 35px; 
            width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.7), 0 0 40px rgba(0, 212, 255, 0.05);
        }

        h2 { font-size: 0.9rem; letter-spacing: 3px; color: var(--electric-blue); margin-bottom: 30px; text-transform: uppercase; }
