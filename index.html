<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonik Skin - Fix Pro</title>
    <style>
        :root { --neon: #d4ff00; --bg: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            background: #050505; color: white; font-family: sans-serif;
            margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f2027);
            background-size: 400% 400%; animation: moveGradient 15s ease infinite;
        }
        @keyframes moveGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        header { width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-weight: 900; color: var(--neon); font-size: 1.1rem; cursor: pointer; }
        .header-right { display: flex; align-items: center; gap: 10px; }
        #artist-p-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--neon); color: var(--neon); padding: 8px 14px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 11px; display: flex; align-items: center; gap: 6px; }
        .lang-dropdown { position: relative; }
        .lang-btn { background: #222; border: 1px solid #444; color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .lang-content { display: none; position: absolute; right: 0; background: #1a1a1a; min-width: 110px; border: 1px solid #333; border-radius: 8px; z-index: 1000; }
        .lang-content span { padding: 12px; display: block; cursor: pointer; border-bottom: 1px solid #222; font-size: 13px; }
        .lang-dropdown:hover .lang-content { display: block; }
        .container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .card { background: rgba(17, 17, 17, 0.9); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; }
        .wave-box { background: #000; height: 140px; border-radius: 20px; margin-bottom: 25px; position: relative; border: 1px solid #1a1a1a; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #lock-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(15px); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; color: #fff; text-align: center; }
        canvas { width: 100%; height: 100%; background: #000; display: block; }
        #timer { position: absolute; top: 12px; right: 15px; color: var(--neon); font-family: monospace; font-size: 14px; z-index: 5; }
        .btn { width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 15px; border: none; font-weight: bold; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .btn-gray { background: #222; color: #fff; border: 1px solid #333; }
        .btn-listen { background: #2a2a2a; color: var(--neon); display: none; }
        .btn-main { background: var(--neon); color: #000; }
        #success-btn { display: none; background: #00c3ff; color: #fff; border: 2px solid #fff; }
        .artist-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .artist-card-pro { background: #111; border: 2px solid var(--neon); width: 90%; max-width: 350px; border-radius: 25px; padding: 25px; position: relative; text-align: center; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="resetPage()">SONIK SKIN</div>
    <div class="header-right">
        <button id="artist-p-btn" onclick="handleGoogleLogin()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="14">
            <span id="btn-txt">GMAIL İLE GİRİŞ</span>
        </button>
        <div class="lang-dropdown">
            <button class="lang-btn" id="curLang">TR ▾</button>
            <div class="lang-content">
                <span onclick="updateLang('tr')">Türkçe</span>
                <span onclick="updateLang('en')">English</span>
                <span onclick="updateLang('ru')">Русский</span>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <div class="card">
        <h2 id="ui-title">DOSYADAN DÖVME YAP</h2>
        <div class="wave-box" id="captureZone">
            <canvas id="waveCanvas" width="350" height="140"></canvas>
            <div id="timer">00:00 / 00:08</div>
            <div id="lock-overlay">
                <span style="font-size: 20px;">🔒</span>
                <p id="ui-lock-msg" style="font-size: 11px; margin-top: 5px;">Kilitli</p>
            </div>
        </div>
        <button class="btn btn-main" id="success-btn" onclick="downloadPNG()">✅ <span id="ui-success">İNDİR</span></button>
        <div id="action-area">
            <button class="btn btn-gray" id="btn-rec" onclick="initMic()">🎤 <span id="ui-rec">SESİ KAYDET</span></button>
            <input type="file" id="fInp" hidden accept="audio/*" onchange="handleFile(event)">
            <button class="btn btn-gray" id="btn-file" onclick="document.getElementById('fInp').click()">📁 <span id="ui-select">DOSYA SEÇ</span></button>
            <button class="btn btn-listen" id="btn-play" onclick="playAudio()">🔊 <span id="ui-listen">DİNLE</span></button>
            <button class="btn btn-main" onclick="handleCheckoutFlow()" id="ui-down">DÖNÜŞTÜR (İNDİR)</button>
        </div>
    </div>
</div>

<div class="artist-modal" id="artModal">
    <div class="artist-card-pro">
        <span style="position:absolute; right:20px; top:15px; cursor:pointer; font-size:24px; color:#fff;" onclick="toggleArtistModal()">&times;</span>
        <h3 id="user-display-name" style="color:var(--neon);">PROFİL</h3>
        <p id="user-email" style="font-size: 12px; color: #888;"></p>
        <button class="btn btn-main" onclick="toggleArtistModal()">OK</button>
        <button style="background:none; border:none; color:#ff4444; margin-top:10px; cursor:pointer;" onclick="logout()">Çıkış</button>
    </div>
</div>

<script>
    const LEMON_LINK = "https://sonikskin.lemonsqueezy.com/checkout/buy/7997dd0f-76bd-4a1c-99f5-b2253aeb1ee6";
    let recorder, chunks = [], audioURL, audio, staticDataArray = []; 
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('lock-overlay');

    window.onload = function() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        if(localStorage.getItem('user_email')) checkUserSession();
        
        const params = new URLSearchParams(window.location.search);
        if (params.get('status') === 'success') {
            overlay.style.display = 'none';
            document.getElementById('success-btn').style.display = 'flex';
            document.getElementById('action-area').style.display = 'none';
            if(localStorage.getItem('lastStaticWave')) {
                staticDataArray = JSON.parse(localStorage.getItem('lastStaticWave'));
                setTimeout(() => drawStaticWave(true), 300);
            }
        }
    };

    function handleFile(e) { if(e.target.files[0]) processAudioData(e.target.files[0]); }

    async function processAudioData(data) {
        audioURL = URL.createObjectURL(data);
        audio = new Audio(audioURL);
        const arrayBuffer = await data.arrayBuffer();
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const decodedData = await audioCtx.decodeAudioData(arrayBuffer);
        generateStaticWave(decodedData);
        document.getElementById('btn-play').style.display = 'flex';
    }

    function generateStaticWave(buffer) {
        const rawData = buffer.getChannelData(0);
        const samples = 60; 
        const blockSize = Math.floor((buffer.sampleRate * 8) / samples);
        staticDataArray = [];
        for (let i = 0; i < samples; i++) {
            let sum = 0;
            for (let j = 0; j < blockSize; j++) { sum += Math.abs(rawData[(blockSize * i) + j] || 0); }
            staticDataArray.push(sum / blockSize);
        }
        localStorage.setItem('lastStaticWave', JSON.stringify(staticDataArray));
        drawStaticWave();
    }

    function drawStaticWave(isPaid = false) {
        if (!isPaid) overlay.style.display = 'flex'; else overlay.style.display = 'none';
        ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        const barWidth = canvas.width / staticDataArray.length;
        staticDataArray.forEach((val, i) => {
            const h = Math.max(val * canvas.height * 5, 2);
            ctx.strokeStyle = (i/staticDataArray.length < 0.2 || i/staticDataArray.length > 0.8) ? '#00c3ff' : '#ffff1c';
            ctx.lineWidth = 3; ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(i * barWidth + barWidth/2, (canvas.height/2) - (h/2));
            ctx.lineTo(i * barWidth + barWidth/2, (canvas.height/2) + (h/2));
            ctx.stroke();
        });
    }

    async function initMic() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({audio:true});
            recorder = new MediaRecorder(stream);
            recorder.start(); chunks = [];
            let sec = 0;
            const t = setInterval(() => {
                sec++; document.getElementById('timer').innerText = `00:0${sec} / 00:08`;
                if(sec >= 8) { clearInterval(t); recorder.stop(); stream.getTracks().forEach(tr=>tr.stop()); }
            }, 1000);
            recorder.onstop = () => processAudioData(new Blob(chunks));
            recorder.ondataavailable = e => chunks.push(e.data);
        } catch(e) { alert("Mikrofon icazəsi yoxdur!"); }
    }

    function downloadPNG() {
        const dataURL = canvas.toDataURL("image/png");
        if(/iPad|iPhone|iPod/.test(navigator.userAgent)) {
            let win = window.open();
            win.document.write('<img src="' + dataURL + '" style="width:100%">');
        } else {
            const link = document.createElement('a');
            link.download = 'tattoo.png'; link.href = dataURL; link.click();
        }
    }

    function handleCheckoutFlow() { if(staticDataArray.length > 0) window.location.href = LEMON_LINK; }
    function handleGoogleLogin() { 
        let e = prompt("Gmail:"); 
        if(e) { localStorage.setItem('user_email', e); localStorage.setItem('user_name', e.split('@')[0]); checkUserSession(); } 
    }
    function checkUserSession() { 
        document.getElementById('btn-txt').innerText = localStorage.getItem('user_name').toUpperCase(); 
        document.getElementById('user-email').innerText = localStorage.getItem('user_email');
    }
    function toggleArtistModal() { const m = document.getElementById('artModal'); m.style.display = (m.style.display==='flex')?'none':'flex'; }
    function logout() { localStorage.clear(); location.reload(); }
    function resetPage() { location.href = location.pathname; }
    function playAudio() { if(audio) audio.play(); }
    function updateLang(l) { document.getElementById('curLang').innerText = l.toUpperCase() + " ▾"; }
</script>
</body>
</html>
