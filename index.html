<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #ui { position: absolute; z-index: 100; bottom: 20px; left: 50%; transform: translateX(-50%); }
      .scan-btn { padding: 15px 30px; background: #00ffcc; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; }
    </style>
  </head>
  <body>

    <a-scene mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane color="blue" opaciy="0.5" position="0 0 0" height="0.55" width="1" rotation="0 0 0"></a-plane>
      </a-entity>
    </a-scene>

    <div id="ui">
      <button class="scan-btn">KAMERA AKTİF</button>
    </div>

  </body>
</html>
