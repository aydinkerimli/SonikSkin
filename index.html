<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sonic Skin | Voice Tattoo Art</title>
    <style>
        :root { --accent: #d4ff00; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; text-align: center; }
        .header { padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; px: 50px; }
        select { background: #111; color: white; border: 1px solid #333; padding: 5px; border-radius: 5px; }

        .container { display: flex; justify-content: center; gap: 30px; padding: 40px; flex-wrap: wrap; }
        .panel { background: #0c0c0c; border: 1px solid #222; border-radius: 20px; width: 420px; padding: 25px; }
        
        /* DÖVME TASLAK KARESI */
        .tattoo-box { 
            width: 100%; 
            aspect-ratio: 1/1; 
            background: #000; 
            border: 1px dashed #444; 
            margin-bottom: 20px; 
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas { width: 100%; height: 60%; } /* Ses dalgası ortada ince bir şerit gibi */

        .btn { width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-rec { background: #ff3e3e; color: white; }
        .btn-buy { background: var(--accent); color: black; display: none; }
        .btn-play { background: #333; color: white; display: none; }
        
        .info-text { font-size: 12px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header" style="padding: 10px 50px;">
        <div style="font-weight: bold; color: var(--accent); letter-spacing: 2px;">SONIC SKIN</div>
        <select id="lang">
            <option value="tr">Türkçe</option><option value="en">English</option>
        </select>
    </div>

    <div class="container">
        <div class="panel">
            <h2 id="title">SES DÖVMENİ TASARLA</h2>
            <div class="tattoo-box" id="captureArea">
                <canvas id="waveCanvas"></canvas>
            </div>
            
            <button id="recBtn" class="btn btn-rec">🎤 SESİNİ KAYDET (4sn)</button>
            <button id="playBtn" class="btn btn-play">▶️ SESİ DİNLE</button>
            <button id="buyBtn" class="btn btn-buy">DÖVME TASLAĞINI SATIN AL & İNDİR</button>
            
            <p class="info-text">Ödeme sonrası sesinizin yüksek çözünürlüklü dalga formu görseli (PNG) e-postanıza gönderilir.</p>
        </div>

        <div class="panel">
            <h2>DOSYADAN DÖVME YAP</h2>
            <div class="tattoo-box">
                <div id="uploadStatus" style="color:#444">Ses dosyası yükleyin</div>
            </div>
            <input type="file" id="audioUp" hidden>
            <button onclick="document.getElementById('audioUp').click()" class="btn" style="background:#222; color:white;">📁 DOSYA SEÇ</button>
            <button id="buyBtn2" class="btn btn-buy">BU DALGAYI SATIN AL</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        const recBtn = document.getElementById('recBtn');
        const buyBtn = document.getElementById('buyBtn');
        const playBtn = document.getElementById('playBtn');

        let audioCtx, analyser, dataArray, mediaRecorder, chunks = [], audio = new Audio();

        recBtn.onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx = new AudioContext();
            analyser = audioCtx.createAnalyser();
            audioCtx.createMediaStreamSource(stream).connect(analyser);
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);

            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.start();
            recBtn.innerText = "SESİNİZ İŞLENİYOR...";

            function drawWave() {
                if(mediaRecorder.state === "inactive") return;
                requestAnimationFrame(drawWave);
                analyser.getByteTimeDomainData(dataArray);

                ctx.fillStyle = "black";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.lineWidth = 3;
                ctx.strokeStyle = "#d4ff00"; // Neon dalga çizgisi
                ctx.beginPath();

                let sliceWidth = canvas.width / dataArray.length;
                let x = 0;
                for(let i = 0; i < dataArray.length; i++) {
                    let v = dataArray[i] / 128.0;
                    let y = v * canvas.height / 2;
                    if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    x += sliceWidth;
                }
                ctx.stroke();
            }
            drawWave();

            setTimeout(() => {
                mediaRecorder.stop();
                stream.getTracks().forEach(t => t.stop());
                recBtn.style.display = "none";
                buyBtn.style.display = "block";
                playBtn.style.display = "block";
            }, 4000);

            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/wav' });
                audio.src = URL.createObjectURL(blob);
            };
        };

        playBtn.onclick = () => audio.play();
        buyBtn.onclick = () => {
            // Lemon Squeezy linkine giderken kullanıcının oluşturduğu görseli temsil eder
            window.location.href = 'https://sonic-skin.lemonsqueezy.com/checkout';
        };
    </script>
</body>
</html>
