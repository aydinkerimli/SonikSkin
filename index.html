<!DOCTYPE html>
<html lang="tr" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonikSkin v3</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .lang-bar { margin-bottom: 30px; display: flex; justify-content: center; gap: 10px; }
        .l-btn { background: none; border: 2px solid #00ffcc; color: #00ffcc; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .main-btn { 
            background: #ff4757; color: white; border: none; padding: 25px; 
            width: 90%; max-width: 400px; font-size: 20px; font-weight: bold; 
            border-radius: 15px; cursor: pointer; margin-top: 20px;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.4);
        }
        #status { color: #00ffcc; margin: 20px; font-size: 18px; height: 30px; }
        .info { color: #555; font-size: 12px; margin-top: 50px; }
    </style>
</head>
<body class="notranslate">

    <div class="lang-bar">
        <button class="l-btn" onclick="degistir('TR')">TR</button>
        <button class="l-btn" onclick="degistir('EN')">EN</button>
        <button class="l-btn" onclick="degistir('RU')">RU</button>
    </div>

    <h1 id="baslik">Sesini Sanata Dönüştür</h1>
    <p id="altbaslik">Dövmen için ses kaydı yapmaya hazır mısın?</p>

    <div id="status">Durum: Hazır</div>

    <button id="anaButon" class="main-btn" onclick="kayitIslemi()">KAYDA BAŞLA</button>

    <div class="info">Sistem Sürümü: 3.0.1 (Anti-Freeze)</div>

    <script>
        // Dil Verileri
        const diller = {
            'TR': { h: "Sesini Sanata Dönüştür", p: "Dövmen için ses kaydı yapmaya hazır mısın?", b: "KAYDA BAŞLA", s: "Kayıt Başladı...", e: "Hata: Mikrofon Kapalı!" },
            'EN': { h: "Turn Voice into Art", p: "Ready to record your sound?", b: "START RECORDING", s: "Recording...", e: "Error: Mic Blocked!" },
            'RU': { h: "Голос в Искусство", p: "Готовы записать звук?", b: "НАЧАТЬ ЗАПИСЬ", s: "Запись...", e: "Ошибка микрофона!" }
        };

        let su ankiDil = 'TR';

        // Dil Değiştirme Fonksiyonu
        function degistir(lang) {
            su ankiDil = lang;
            document.getElementById('baslik').innerText = diller[lang].h;
            document.getElementById('altbaslik').innerText = diller[lang].p;
            document.getElementById('anaButon').innerText = diller[lang].b;
            document.getElementById('status').innerText = "Dil: " + lang;
            console.log("Dil seçildi: " + lang);
        }

        // Kayıt ve Mikrofon Fonksiyonu
        async function kayitIslemi() {
            const btn = document.getElementById('anaButon');
            const st = document.getElementById('status');
            
            st.innerText = diller[su ankiDil].s;
            btn.style.background = "#2f3542";

            try {
                // Mikrofon izni iste
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                st.innerText = "MİKROFON AKTİF - SES ALINIYOR";
                
                // 3 saniye sonra testi bitir
                setTimeout(() => {
                    stream.getTracks().forEach(t => t.stop());
                    btn.style.background = "#ff4757";
                    btn.innerText = diller[su ankiDil].b;
                    st.innerText = "Kayıt Başarıyla Tamamlandı.";
                }, 3000);

            } catch (err) {
                st.innerText = diller[su ankiDil].e;
                btn.style.background = "red";
                alert("Lütfen tarayıcı ayarlarından mikrofon izni verin.");
            }
        }

        // Sayfa açıldığında otomatik TR yap
        window.onload = () => { degistir('TR'); };
    </script>
</body>
</html>
