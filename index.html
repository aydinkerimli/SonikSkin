<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Skin | Profesyonel Dövme Portalı</title>
    <style>
        :root { --neon: #d4ff00; --dark: #050505; --panel: #111; }
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }

        /* NAVBAR - Tıklanabilir alanlar korundu */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: #000; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: bold; color: var(--neon); letter-spacing: 2px; }
        .nav-right { display: flex; gap: 10px; align-items: center; }

        .btn-top { background: transparent; color: #fff; border: 1px solid #444; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-artist { background: var(--neon); color: #000; border: none; }

        /* ANA İÇERİK */
        .main-container { display: flex; justify-content: center; gap: 20px; padding: 40px 10px; flex-wrap: wrap; }
        .panel { background: var(--panel); border: 2px solid #222; border-radius: 20px; width: 450px; padding: 25px; box-sizing: border-box; text-align: center; }
        
        /* SANATSAL BEYAZ KUTU */
        .box { width: 100%; aspect-ratio: 16/9; background: #fff; border: 1px solid #eee; margin-bottom: 20px; border-radius: 12px; display: flex; align-items: center; overflow: hidden; }
        canvas { width: 100%; height: 100%; }

        .btn { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; display: block; font-size: 14px; }
        #bRec { background: #ff3e3e; color: white; }
        .play-btn { background: #444; color: white; display: none; }
        .retry-btn { background: #222; color: #fff; border: 1px solid #444; display: none; }
        .buy-btn { background: var(--neon); color: black; display: none; text-decoration: none; justify-content: center; align-items: center; }

        /* MODAL (Açılır Pencere) - Tıklama hatasını çözen kısım */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: #161616; padding: 30px; border-radius: 25px; border: 1px solid #333; width: 300px; text-align: center; }
        .soc-btn { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        
        select { background: #1a1a1a; color: white; border: 1px solid #333; padding: 5px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">SONIC SKIN</div>
        <div class="nav-right">
            <select id="langSel" onchange="dilDegistir(this.value)">
                <option value="tr">TR</option>
                <option value="en">EN</option>
                <option value="ru">RU</option>
                <option value="zh">ZH</option>
                <option value="de">DE</option>
                <option value="es">ES</option>
                <option value="fr">FR</option>
            </select>
            <button class="btn-top" onclick="modalAc('Giriş Yap')">GİRİŞ YAP</button>
            <button class="btn-top btn-artist" onclick="modalAc('Sanatçı Portalı')">SANATÇI PORTALI</button>
        </div>
    </div>

    <div id="pop" class="modal">
        <div class="modal-content">
            <h3 id="pTitle">Üye Girişi</h3>
            <button class="soc-btn" style="background:white; color:black;">Gmail ile Giriş</button>
            <button class="soc-btn" style="background:black; color:white; border:1px solid #444;">Apple ID ile Bağlan</button>
            <button onclick="modalKapat()" style="background:none; border:none; color:#ff3e3e; margin-top:15px; cursor:pointer; font-weight:bold;">KAPAT</button>
        </div>
    </div>

    <div class="main-container">
        <div class="panel">
            <h2 id="h1">CANLI SES DÖVMESİ</h2>
            <div class="box"><canvas id="cv1"></canvas></div>
            <button id="bRec" class="btn" onclick="kaydet()">🎤 SESİ KAYDET</button>
            <button id="bP1" class="btn play-btn" onclick="sesDinle(1)">▶️ DİNLE</button>
            <button id="bR1" class="btn retry-btn" onclick="location.reload()">🔄 YENİDEN TEKRAR YAP</button>
            <button id="bS1" class="btn buy-btn" onclick="resimIndir('cv1')">BUNU HATIRAYA DÖNÜŞTÜR</button>
        </div>

        <div class="panel">
            <h2 id="h2">DOSYADAN DÖVME YAP</h2>
            <div class="box"><canvas id="cv2"></canvas></div>
            <input type="file" id="fIn" hidden accept="audio/*" onchange="dosyaYukle(this)">
            <button class="btn" style="background:#222; color:#fff;" onclick="document.getElementById('fIn').click()">📁 DOSYA SEÇ</button>
            <button id="bP2" class="btn play-btn" onclick="sesDinle(2)">▶️ DİNLE</button>
            <button id="bS2" class="btn buy-btn" onclick="resimIndir('cv2')">BUNU HATIRAYA DÖNÜŞTÜR</button>
        </div>
    </div>

    <script>
        const diller = {
            tr: {h1:"CANLI SES DÖVMESİ", h2:"DOSYADAN DÖVME YAP", rec:"🎤 SESİ KAYDET", buy:"BUNU HATIRAYA DÖNÜŞTÜR", listen:"▶️ DİNLE", retry:"🔄 YENİDEN TEKRAR YAP"},
            en: {h1:"LIVE VOICE TATTOO", h2:"TATTOO FROM FILE", rec:"🎤 RECORD VOICE", buy:"TURN THIS INTO A MEMORY", listen:"▶️ LISTEN", retry:"🔄 RETRY"},
            ru: {h1:"ЖИВАЯ ТАТУ", h2:"ИЗ ФАЙЛА", rec:"🎤 ЗАПИСАТЬ", buy:"ПРЕВРАТИТЬ В ПАМЯТЬ", listen:"▶️ СЛУШАТЬ", retry:"🔄 ПОВТОРИТЬ"},
            zh: {h1:"现场声音纹身", h2:"从文件制作", rec:"🎤 录制声音", buy:"将此转化为记忆", listen:"▶️ 听", retry:"🔄 重试"},
            de: {h1:"LIVE-TÄTOWIERUNG", h2:"VON DATEI", rec:"🎤 AUFNEHMEN", buy:"IN ERINNERUNG VERWANDELN", listen:"▶️ ANHÖREN", retry:"🔄 WIEDERHOLEN"},
            es: {h1:"TATUAJE EN VIVO", h2:"DESDE ARCHIVO", rec:"🎤 GRABAR", buy:"CONVERTIR EN RECUERDO", listen:"▶️ ESCUCHAR", retry:"🔄 REINTENTAR"},
            fr: {h1:"TATOUAGE VOCAL", h2:"VIA FICHIER", rec:"🎤 ENREGISTRER", buy:"TRANSFORMER EN SOUVENIR", listen:"▶️ ÉCOUTER", retry:"🔄 RÉESSAYER"}
        };

        function dilDegistir(v) {
            const d = diller[v];
            document.getElementById('h1').innerText = d.h1;
            document.getElementById('h2').innerText = d.h2;
            document.getElementById('bRec').innerText = d.rec;
            document.getElementById('bS1').innerText = d.buy;
            document.getElementById('bS2').innerText = d.buy;
            document.getElementById('bP1').innerText = d.listen;
            document.getElementById('bP2').innerText = d.listen;
            document.getElementById('bR1').innerText = d.retry;
        }

        function modalAc(t) { document.getElementById('pTitle').innerText = t; document.getElementById('pop').style.display = 'flex'; }
        function modalKapat() { document.getElementById('pop').style.display = 'none'; }

        let aCtx, rec, chunks = [], s1 = new Audio(), s2 = new Audio(), src1, src2;

        // SANATSAL ÇİZİM (Siyah ve Yansımalı)
        function ciz(an, id) {
            const c = document.getElementById(id), x = c.getContext('2d');
            an.fftSize = 512;
            const bLen = an.frequencyBinCount, data = new Uint8Array(bLen);
            function f() {
                requestAnimationFrame(f);
                an.getByteFrequencyData(data);
                x.fillStyle = "#fff"; x.fillRect(0, 0, c.width, c.height);
                let bw = (c.width / bLen) * 3, cur = 0, mid = c.height * 0.45;
                for(let i=0; i<bLen; i++) {
                    let bh = data[i] * 0.7;
                    x.fillStyle = "#000"; x.fillRect(cur, mid - (bh/2), bw - 1, bh);
                    x.fillStyle = "rgba(0,0,0,0.1)"; x.fillRect(cur, c.height * 0.8, bw - 1, bh * 0.3);
                    cur += bw;
                }
            } f();
        }

        async function kaydet() {
            try {
                if(!aCtx) aCtx = new AudioContext();
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                const an = aCtx.createAnalyser(); aCtx.createMediaStreamSource(s).connect(an);
                ciz(an, 'cv1');
                rec = new MediaRecorder(s); chunks = [];
                rec.ondataavailable = e => chunks.push(e.data);
                rec.onstop = () => {
                    s1.src = URL.createObjectURL(new Blob(chunks));
                    document.getElementById('bP1').style.display = 'block';
                    document.getElementById('bR1').style.display = 'block';
                    document.getElementById('bS1').style.display = 'flex';
                };
                rec.start(); document.getElementById('bRec').innerText = "KAYDEDİLİYOR...";
                setTimeout(() => { rec.stop(); s.getTracks().forEach(t=>t.stop()); document.getElementById('bRec').style.display='none'; }, 8000);
            } catch(e) { alert("Mikrofon izni gerekli!"); }
        }

        function sesDinle(n) {
            let s = n==1 ? s1 : s2, c = n==1 ? 'cv1' : 'cv2';
            if(n==1 && !src1) { src1 = aCtx.createMediaElementSource(s1); let an = aCtx.createAnalyser(); src1.connect(an); an.connect(aCtx.destination); ciz(an, c); }
            if(n==2 && !src2) { src2 = aCtx.createMediaElementSource(s2); let an = aCtx.createAnalyser(); src2.connect(an); an.connect(aCtx.destination); ciz(an, c); }
            s.play();
        }

        function dosyaYuk
