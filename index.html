<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sonic Skin | Voice Tattoo Art</title>
    <style>
        :root { --accent: #d4ff00; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        .header { padding: 20px 50px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        select { background: #111; color: white; border: 1px solid #333; padding: 8px; border-radius: 8px; cursor: pointer; }
        .container { display: flex; justify-content: center; gap: 30px; padding: 40px; flex-wrap: wrap; }
        .panel { background: #0c0c0c; border: 1px solid #222; border-radius: 20px; width: 420px; padding: 25px; }
        .tattoo-box { width: 100%; aspect-ratio: 1/1; background: #000; border: 1px dashed #444; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        canvas { width: 100%; height: 60%; }
        .btn { width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .btn-rec { background: #ff3e3e; color: white; }
        .btn-play { background: #333; color: white; display: none; } /* Dinle butonu varsayılan gizli */
        .btn-buy { background: var(--accent); color: black; display: none; }
        .btn-file { background: #222; border: 1px solid #444; color: white; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: bold; color: var(--accent); letter-spacing: 2px;">SONIC SKIN</div>
        <select id="langSelect">
            <option value="tr">Türkçe</option>
            <option value="en">English</option>
            <option value="ru">Русский</option>
            <option value="fr">Français</option>
        </select>
    </div>

    <div class="container">
        <div class="panel">
            <h2 id="txt-live-title">CANLI SES DÖVMESİ</h2>
            <div class="tattoo-box"><canvas id="liveCanvas"></canvas></div>
            <button id="recBtn" class="btn btn-rec">🎤 SESİ KAYDET</button>
            <button id="playBtn1" class="btn btn-play">▶️ KAYDI DİNLE</button>
            <button id="buyBtn1" class="btn btn-buy">TASLAĞI SATIN AL</button>
        </div>

        <div class="panel">
            <h2 id="txt-file-title">DOSYADAN DÖVME YAP</h2>
            <div class="tattoo-box"><canvas id="fileCanvas"></canvas></div>
            <input type="file" id="fileInput" hidden accept="audio/*">
            <button onclick="document.getElementById('fileInput').click()" id="txt-file-btn" class="btn btn-file">📁 SES DOSYASI SEÇ</button>
            <button id="playBtn2" class="btn btn-play">▶️ DOSYAYI DİNLE</button>
            <button id="buyBtn2" class="btn btn-buy">BU HATIRAYI DÖNÜŞTÜR</button>
        </div>
    </div>

    <script>
        const langData = {
            tr: { live: "CANLI SES DÖVMESİ", file: "DOSYADAN DÖVME YAP", rec: "🎤 SESİ KAYDET", fileBtn: "📁 SES DOSYASI SEÇ", buy: "TASLAĞI SATIN AL", play: "▶️ KAYDI DİNLE" },
            en: { live: "LIVE VOICE TATTOO", file: "TATTOO FROM FILE", rec: "🎤 RECORD VOICE", fileBtn: "📁 CHOOSE AUDIO FILE", buy: "BUY STENCIL", play: "▶️ PLAY AUDIO" },
            ru: { live: "ЖИВАЯ ТАТУ ГОЛОСА", file: "ТАТУ ИЗ ФАЙЛА", rec: "🎤 ЗАПИСАТЬ", fileBtn: "📁 ВЫБРАТЬ ФАЙЛ", buy: "КУПИТЬ ЭСКИЗ", play: "▶️ СЛУШАТЬ" },
            fr: { live: "TATOUAGE VOCAL EN DIRECT", file: "TATOUAGE VIA FICHIER", rec: "🎤 ENREGISTRER", fileBtn: "📁 CHOISIR UN FICHIER", buy: "ACHETER LE STENCIL", play: "▶️ ÉCOUTER" }
        };

        const langSelect = document.getElementById('langSelect');
        langSelect.onchange = (e) => {
            const l = langData[e.target.value];
            document.getElementById('txt-live-title').innerText = l.live;
            document.getElementById('txt-file-title').innerText = l.file;
            document.getElementById('recBtn').innerText = l.rec;
            document.getElementById('txt-file-btn').innerText = l.fileBtn;
            document.getElementById('buyBtn1').innerText = l.buy;
            document.getElementById('buyBtn2').innerText = l.buy;
            document.querySelectorAll('.btn-play').forEach(btn => btn.innerText = l.play);
        };

        let liveAudio = new Audio();
        let fileAudio = new Audio();

        function drawWave(canvas, analyser, dataArray) {
            const ctx = canvas.getContext('2d');
            function animate() {
                requestAnimationFrame(animate);
                analyser.getByteTimeDomainData(dataArray);
                ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.lineWidth = 2; ctx.strokeStyle = "#d4ff00";
                ctx.beginPath();
                let x = 0, slice = canvas.width / dataArray.length;
                for(let i=0; i<dataArray.length; i++) {
                    let v = dataArray[i]/128.0, y = v * canvas.height/2;
                    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
                    x += slice;
                }
                ctx.stroke();
            }
            animate();
        }

        // --- CANLI KAYIT MANTIĞI ---
        const recBtn = document.getElementById('recBtn');
        recBtn.onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioCtx = new AudioContext();
            const analyser = audioCtx.createAnalyser();
            audioCtx.createMediaStreamSource(stream).connect(analyser);
            const dataArray = new Uint8Array(analyser.fftSize);
            drawWave(document.getElementById('liveCanvas'), analyser, dataArray);

            const mediaRecorder = new MediaRecorder(stream);
            let chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/wav' });
                liveAudio.src = URL.createObjectURL(blob);
                document.getElementById('playBtn1').style.display = "block";
                document.getElementById('buyBtn1').style.display = "block";
            };
            mediaRecorder.start();
            recBtn.innerText = "...";
            setTimeout(() => { 
                mediaRecorder.stop();
                stream.getTracks().forEach(t => t.stop());
                recBtn.style.display = "none";
            }, 4000);
        };
        document.getElementById('playBtn1').onclick = () => liveAudio.play();

        // --- DOSYA YÜKLEME MANTIĞI ---
        document.getElementById('fileInput').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            
            // Sesi çalmak için hazırla
            fileAudio.src = URL.createObjectURL(file);
            document.getElementById('playBtn2').style.display = "block";
            document.getElementById('buyBtn2').style.display = "block";

            // Dalga formunu analiz et
            const audioCtx = new AudioContext();
            const arrayBuffer = await file.arrayBuffer();
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            const source = audioCtx.createBufferSource();
            source.buffer = audioBuffer;
            const analyser = audioCtx.createAnalyser();
            source.connect(analyser);
            const dataArray = new Uint8Array(analyser.fftSize);
            drawWave(document.getElementById('fileCanvas'), analyser, dataArray);
        };
        document.getElementById('playBtn2').onclick = () => fileAudio.play();

        // ÖDEME YÖNLENDİRME
        document.getElementById('buyBtn1').onclick = () => window.location.href = 'https://sonic-skin.lemonsqueezy.com/checkout';
        document.getElementById('buyBtn2').onclick = () => window.location.href = 'https://sonic-skin.lemonsqueezy.com/checkout';
    </script>
</body>
</html>
