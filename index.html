<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonik Skin - Universal Pro Scanner</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        :root { --neon: #d4ff00; --bg: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f2027);
            background-size: 400% 400%;
            animation: moveGradient 15s ease infinite;
            color: white; font-family: sans-serif;
            margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);
            position: relative; z-index: 100;
        }
        .logo-area { display: flex; flex-direction: column; }
        .logo { font-weight: 900; color: var(--neon); font-size: 1.3rem; cursor: pointer; }
        .btn-scan-main { 
            background: var(--neon); color: #000; border: none; padding: 5px 12px; 
            border-radius: 5px; font-weight: bold; font-size: 11px; margin-top: 5px; cursor: pointer;
        }

        .lang-dropdown { position: relative; }
        .lang-btn { background: #222; border: 1px solid #444; color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .lang-content {
            display: none; position: absolute; right: 0; background: #1a1a1a;
            min-width: 110px; border: 1px solid #333; border-radius: 8px; z-index: 1000;
        }
        .lang-content span { padding: 12px; display: block; cursor: pointer; border-bottom: 1px solid #222; font-size: 13px; }
        .lang-dropdown:hover .lang-content { display: block; }

        .container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 15px; position: relative; z-index: 50; }
        .card {
            background: rgba(17, 17, 17, 0.9); border: 1px solid rgba(255,255,255,0.1); padding: 25px;
            border-radius: 25px; width: 100%; max-width: 380px; text-align: center;
        }

        .wave-box {
            background: #000; height: 140px; border-radius: 20px; margin-bottom: 25px;
            position: relative; border: 1px solid #1a1a1a; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        #lock-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(15px);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; color: #fff; text-align: center; padding: 10px;
        }

        canvas { width: 100%; height: 100%; background: #000; display: block; }
        #timer { position: absolute; top: 12px; right: 15px; color: var(--neon); font-family: monospace; font-size: 14px; z-index: 5; }

        .btn {
            width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 15px; border: none;
            font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-gray { background: #222; color: #fff; border: 1px solid #333; }
        .btn-listen { background: #2a2a2a; color: var(--neon); display: none; }
        .btn-main { background: var(--neon); color: #000; }
        .btn-p2p { background: #ffffff; color: #000; margin-top: 5px; font-size: 13px; padding: 12px; }

        #success-btn { display: none; background: #00c3ff; color: #fff; animation: pulse 1.5s infinite; border: 2px solid #fff; }

        /* P2P Modal */
        #p2p-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1a1a1a; border: 2px solid var(--neon); padding: 20px; border-radius: 20px;
            width: 90%; max-width: 340px; z-index: 2000; text-align: center;
        }

        /* AR Screen */
        #ar-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 3000; background: #000; }
        .close-ar { position: absolute; top: 20px; right: 20px; background: red; color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 3001; }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <div class="logo" onclick="resetPage()">SONIK SKIN</div>
        <button class="btn-scan-main" id="ui-scan-btn" onclick="startScanner()">🔍 SCAN</button>
    </div>
    <div class="lang-dropdown">
        <button class="lang-btn" id="curLang">TR ▾</button>
        <div class="lang-content">
            <span onclick="updateLang('tr')">Türkçe</span>
            <span onclick="updateLang('en')">English</span>
            <span onclick="updateLang('az')">Azərbaycan</span>
            <span onclick="updateLang('es')">Español</span>
            <span onclick="updateLang('ru')">Русский</span>
        </div>
    </div>
</header>

<div class="container">
    <div class="card">
        <h2 id="ui-title">DOSYADAN DÖVME YAP</h2>
        
        <div class="wave-box" id="captureZone">
            <canvas id="waveCanvas" width="350" height="140"></canvas>
            <div id="timer">00:00 / 00:08</div>
            <div id="lock-overlay">
                <span id="ui-lock-title" style="font-weight: bold; font-size: 16px;">🔒</span>
                <p id="ui-lock-msg" style="font-size: 11px; margin-top: 5px; opacity: 0.8;"></p>
            </div>
        </div>

        <button class="btn btn-main" id="success-btn" onclick="downloadPNG()">✅ <span id="ui-success">ÖDEME BAŞARILI! TIKLA İNDİR</span></button>
        
        <div id="action-area">
            <button class="btn btn-gray" id="btn-rec" onclick="initMic()">🎤 <span id="ui-rec">SESİ KAYDET</span></button>
            <input type="file" id="fInp" hidden onchange="handleFile(event)">
            <button class="btn btn-gray" id="btn-file" onclick="document.getElementById('fInp').click()">📁 <span id="ui-select">DOSYA SEÇ</span></button>
            <button class="btn btn-listen" id="btn-play" onclick="playAudio()">🔊 <span id="ui-listen">DİNLE</span></button>
            <button class="btn btn-main" onclick="handleCheckoutFlow()" id="ui-down">BUNU HATIRAYA DÖNÜŞTÜR (İNDİR)</button>
            <button class="btn btn-p2p" onclick="showP2P()">💳 <span id="ui-p2p-btn">KARTLA ÖDE (P2P)</span></button>
        </div>
    </div>
</div>

<div id="p2p-modal">
    <h3 id="ui-p2p-title">Ödeme Talebi</h3>
    <p id="ui-p2p-info" style="font-size: 14px; color: #ccc;"></p>
    <div style="background: #222; padding: 10px; border-radius: 10px; margin: 15px 0; color: var(--neon); font-weight: bold;">4127 0000 0000 0000</div>
    <label id="ui-p2p-upload" style="font-size: 12px; display: block; margin-bottom: 10px;">Makbuz Yükleyin:</label>
    <input type="file" id="p2pReceipt" accept="image/*" style="width: 100%; color: white;">
    <button class="btn btn-main" style="margin-top: 20px;" onclick="submitP2P()">GÖNDER</button>
    <button onclick="closeP2P()" style="background:none; border:none; color:white; margin-top:15px; cursor:pointer; font-size: 12px;">Kapat</button>
</div>

<div id="ar-screen">
    <div class="close-ar" onclick="stopScanner()">X</div>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0">
            <a-plane position="0 0 0" height="0.5" width="0.5" material="transparent: true; opacity: 0.7; src: #wave-img"></a-plane>
        </a-entity>
    </a-scene>
</div>

<script>
    const LEMON_LINK = "https://sonikskin.lemonsqueezy.com/checkout/buy/7997dd0f-76bd-4a1c-99f5-b2253aeb1ee6";
    
    const langs = {
        tr: { scan: "TARAMA", title: "DOSYADAN DÖVME YAP", select: "DOSYA SEÇ", down: "HATIRAYA DÖNÜŞTÜR", listen: "DİNLE", rec: "SESİ KAYDET", success: "ÖDEME BAŞARILI! İNDİR", lockT: "🔒 ÖNİZLEME KİLİTLİ", lockM: "Tam sürüm için ödeme yapın", p2pB: "KARTLA ÖDE (P2P)", p2pT: "P2P Ödeme", p2pI: "Lütfen 5 AZN/TL tutarı aşağıdaki karta gönderin:" },
        en: { scan: "SCAN", title: "CREATE TATTOO FROM FILE", select: "CHOOSE FILE", down: "CONVERT TO MEMORY", listen: "LISTEN", rec: "RECORD", success: "PAYMENT SUCCESS! DOWNLOAD", lockT: "🔒 PREVIEW LOCKED", lockM: "Pay for the full version", p2pB: "PAY VIA CARD (P2P)", p2pT: "P2P Payment", p2pI: "Please send 5 AZN/USD to the card below:" },
        az: { scan: "SKAN ET", title: "FAYLDAN TATUAJ YARAT", select: "FAYL SEÇ", down: "XATİRƏYƏ ÇEVİR", listen: "DİNLƏ", rec: "SƏSİ YAZ", success: "ÖDƏNİŞ UĞURLUDUR! YÜKLƏ", lockT: "🔒 ÖNİZLƏMƏ KİLİDLİDİR", lockM: "Tam versiya üçün ödəniş edin", p2pB: "KARTLA ÖDƏ (P2P)", p2pT: "P2P Ödəniş", p2pI: "Zəhmət olmasa 5 AZN məbləği aşağıdakı karta göndərin:" },
        es: { scan: "ESCANEAR", title: "CREAR TATUAJE DESDE ARCHIVO", select: "ELEGIR ARCHIVO", down: "CONVERTIR EN MEMORIA", listen: "ESCUCHAR", rec: "GRABAR VOZ", success: "¡PAGO EXITOSO! DESCARGAR", lockT: "🔒 VISTA PREVIA BLOQUEADA", lockM: "Pague por la versión completa", p2pB: "PAGAR CON TARJETA (P2P)", p2pT: "Pago P2P", p2pI: "Envíe 5 AZN/EUR a la siguiente tarjeta:" },
        ru: { scan: "СКАН", title: "ТАТУ ИЗ ФАЙЛА", select: "ВЫБРАТЬ ФАЙЛ", down: "ПРЕВРАТИТЬ В ПАМЯТЬ", listen: "СЛУШАТЬ", rec: "ЗАПИСЬ", success: "ОПЛАТА УСПЕШНА! СКАЧАТЬ", lockT: "🔒 ПРЕДПРОСМОТР ЗАБЛОКИРОВАН", lockM: "Оплатите полную версию", p2pB: "ОПЛАТА КАРТОЙ (P2P)", p2pT: "P2P Оплата", p2pI: "Отправьте 5 AZN/RUB на указанную карту:" }
    };

    let recorder, chunks = [], audioURL, audio, animFrame, analyser, dataArray, staticDataArray = [];
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('lock-overlay');

    window.onload = function() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        updateLang(localStorage.getItem('sonikLang') || 'tr');
        if (new URLSearchParams(window.location.search).get('status') === 'success') {
            unlockContent();
        }
    };

    function updateLang(l) {
        localStorage.setItem('sonikLang', l);
        const d = langs[l];
        document.getElementById('ui-scan-btn').innerText = "🔍 " + d.scan;
        document.getElementById('ui-title').innerText = d.title;
        document.getElementById('ui-select').innerText = d.select;
        document.getElementById('ui-down').innerText = d.down;
        document.getElementById('ui-listen').innerText = d.listen;
        document.getElementById('ui-rec').innerText = d.rec;
        document.getElementById('ui-success').innerText = d.success;
        document.getElementById('ui-lock-title').innerText = d.lockT;
        document.getElementById('ui-lock-msg').innerText = d.lockM;
        document.getElementById('ui-p2p-btn').innerText = d.p2pB;
        document.getElementById('ui-p2p-title').innerText = d.p2pT;
        document.getElementById('ui-p2p-info').innerText = d.p2pI;
        document.getElementById('curLang').innerText = l.toUpperCase() + " ▾";
    }

    // --- FUNKSİONAL HİSSƏLƏR ---
    async function initMic() {
        clearPreviousSession();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            setupStreamAnalyser(stream);
            recorder = new MediaRecorder(stream);
            recorder.start(); chunks = [];
            let s = 0;
            const t = setInterval(() => {
                s++; document.getElementById('timer').innerText = `00:0${s} / 00:08`;
                if(s >= 8) { clearInterval(t); recorder.stop(); stream.getTracks().forEach(tr => tr.stop()); }
            }, 1000);
            recorder.onstop = () => processAudioData(new Blob(chunks));
            recorder.ondataavailable = e => chunks.push(e.data);
        } catch(e) { alert("Mikrofon hatası!"); }
    }

    function setupStreamAnalyser(sourceInput) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        const source = sourceInput instanceof MediaStream ? audioCtx.createMediaStreamSource(sourceInput) : audioCtx.createMediaElementSource(sourceInput);
        source.connect(analyser);
        if (!(sourceInput instanceof MediaStream)) analyser.connect(audioCtx.destination);
        analyser.fftSize = 128;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        drawWave();
    }

    function drawWave() {
        animFrame = requestAnimationFrame(drawWave);
        analyser.getByteFrequencyData(dataArray);
        ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        const grad = ctx.createLinearGradient(0, 0, canvas.width, 0);
        grad.addColorStop(0, '#00c3ff'); grad.addColorStop(0.5, '#ffff1c'); grad.addColorStop(1, '#ff1744');
        ctx.strokeStyle = grad; ctx.lineWidth = 4; ctx.lineCap = 'round';
        ctx.beginPath();
        let x = 0, barW = (canvas.width / dataArray.length) * 2.5;
        for (let i = 0; i < dataArray.length; i++) {
            let h = dataArray[i] / 2;
            ctx.moveTo(x, canvas.height/2 - h/2); ctx.lineTo(x, canvas.height/2 + h/2);
            x += barW + 2;
        }
        ctx.stroke();
    }

    async function processAudioData(blob) {
        audioURL = URL.createObjectURL(blob);
        audio = new Audio(audioURL);
        const buffer = await blob.arrayBuffer();
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const decoded = await audioCtx.decodeAudioData(buffer);
        generateStaticWave(decoded);
        document.getElementById('btn-play').style.display = 'flex';
    }

    function generateStaticWave(buffer) {
        const raw = buffer.getChannelData(0);
        const samples = 60, blockSize = Math.floor((buffer.sampleRate * 8) / samples);
        staticDataArray = [];
        for (let i = 0; i < samples; i++) {
            let sum = 0;
            for (let j = 0; j < blockSize; j++) { sum += Math.abs(raw[(blockSize * i) + j] || 0); }
            staticDataArray.push(sum / blockSize);
        }
        localStorage.setItem('lastStaticWave', JSON.stringify(staticDataArray));
        drawStaticWave();
    }

    function drawStaticWave(paid = false) {
        if (!paid) overlay.style.display = 'flex';
        ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        let barW = canvas.width / staticDataArray.length;
        staticDataArray.forEach((v, i) => {
            let h = v * canvas.height * 5;
            ctx.strokeStyle = (i/staticDataArray.length < 0.2 || i/staticDataArray.length > 0.8) ? '#00c3ff' : '#ffff1c';
            ctx.lineWidth = 3; ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(i * barW + barW/2, canvas.height/2 - h/2);
            ctx.lineTo(i * barW + barW/2, canvas.height/2 + h/2);
            ctx.stroke();
        });
    }

    function playAudio() { if(audio) { overlay.style.display = 'none'; setupStreamAnalyser(audio); audio.play(); audio.onended = () => { cancelAnimationFrame(animFrame); drawStaticWave(); } } }
    
    // --- ÖDƏNİŞ VƏ SKANER ---
    function showP2P() { document.getElementById('p2p-modal').style.display = 'block'; }
    function closeP2P() { document.getElementById('p2p-modal').style.display = 'none'; }
    function submitP2P() {
        if(!document.getElementById('p2pReceipt').files[0]) return alert("Lütfen makbuz yükleyin.");
        alert("Ödemeniz kontrol ediliyor. Onaylandığında indirme açılacaktır.");
        closeP2P();
        // Simulyasiya üçün 5 saniyə sonra açırıq (Realda bunu admin təsdiqləməlidir)
        setTimeout(unlockContent, 5000);
    }

    function unlockContent() {
        overlay.style.display = 'none';
        document.getElementById('success-btn').style.display = 'flex';
        document.getElementById('action-area').style.display = 'none';
        if(localStorage.getItem('lastStaticWave')) {
            staticDataArray = JSON.parse(localStorage.getItem('lastStaticWave'));
            drawStaticWave(true);
        }
    }

    function startScanner() { document.getElementById('ar-screen').style.display = 'block'; }
    function stopScanner() { document.getElementById('ar-screen').style.display = 'none'; }

    function downloadPNG() {
        drawStaticWave(true);
        const link = document.createElement('a');
        link.download = 'sonik-skin.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
    }

    function handleFile(e) { if(e.target.files[0]) { clearPreviousSession(); processAudioData(e.target.files[0]); } }
    function clearPreviousSession() { if(animFrame) cancelAnimationFrame(animFrame); if(audio) audio.pause(); ctx.clearRect(0,0,canvas.width,canvas.height); overlay.style.display='none'; }
    function handleCheckoutFlow() { if(staticDataArray.length > 0) window.location.href = LEMON_LINK; }
    function resetPage() { localStorage.removeItem('lastStaticWave'); window.location.reload(); }
</script>
</body>
</html>
