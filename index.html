<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SonikSkin - Ses Tasarımı</title>
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/record.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { background: #000; color: #00ffcc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
        h1 { letter-spacing: 5px; font-weight: 900; margin-bottom: 5px; }
        #wave-outer { background: white; padding: 30px 15px; border-radius: 15px; margin: 20px auto; width: 95%; max-width: 450px; box-shadow: 0 0 20px rgba(0,255,204,0.3); }
        #wave-container { background: white; width: 100%; height: 120px; }
        .controls { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 20px; }
        button { padding: 18px 30px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; width: 280px; transition: 0.3s; touch-action: manipulation; }
        #recordBtn { background: #ff4444; color: white; border: 4px solid transparent; }
        #playBtn { background: #00ffcc; color: black; display: none; }
        #downloadBtn { background: #ffffff; color: #000; display: none; border: 2px solid #00ffcc; }
        #timer { font-size: 2.5rem; margin: 15px 0; color: #fff; font-family: monospace; }
        .recording { animation: blink 1s infinite; border-color: white !important; transform: scale(1.05); }
        @keyframes blink { 50% { opacity: 0.6; } }
    </style>
</head>
<body>

    <h1>SONIKSKIN</h1>
    <p>Dövmen için sesini kaydet (Maks 8 sn)</p>

    <div id="wave-outer">
        <div id="wave-container"></div>
    </div>
    
    <div id="timer">00:0.0</div>

    <div class="controls">
        <button id="recordBtn">KAYDA BAŞLA</button>
        <button id="playBtn">DİNLE / DURDUR</button>
        <button id="downloadBtn">TASARIMI İNDİR (.PNG)</button>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const playBtn = document.getElementById('playBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const timer = document.getElementById('timer');
        
        // Wavesurfer Başlatma
        const wavesurfer = WaveSurfer.create({
            container: '#wave-container',
            waveColor: '#000000',
            progressColor: '#00ffcc',
            barWidth: 4,
            barRadius: 10,
            gap: 2,
            height: 120
        });

        // Kayıt Eklentisi
        const record = wavesurfer.registerPlugin(WaveSurfer.Record.create());

        // Kayıt İşlemi
        recordBtn.onclick = async () => {
            if (record.isRecording()) {
                record.stopRecording();
                return;
            }

            try {
                // Tarayıcıyı mikrofon için zorla (Özellikle iOS için önemli)
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                await record.startRecording();
                
                recordBtn.textContent = 'KAYDI DURDUR';
                recordBtn.classList.add('recording');
                playBtn.style.display = 'none';
                downloadBtn.style.display = 'none';
            } catch (err) {
                console.error(err);
                alert("Hata: Mikrofon izni verilmedi veya cihaz desteklemiyor.");
            }
        };

        // Kayıt Bittiğinde
        record.on('record-end', (blob) => {
            recordBtn.textContent = 'YENİ KAYIT AL';
            recordBtn.classList.remove('recording');
            playBtn.style.display = 'block';
            downloadBtn.style.display = 'block';
            
            const url = URL.createObjectURL(blob);
            wavesurfer.load(url);
        });

        // Oynat/Durdur
        playBtn.onclick = () => wavesurfer.playPause();

        // Sayaç ve 8 Saniye Kontrolü
        record.on('record-progress', (time) => {
            const seconds = (time / 1000).toFixed(1);
            timer.textContent = `00:0${seconds}`;
            
            if (time >= 8000) {
                record.stopRecording();
                alert("8 saniyelik limit doldu.");
            }
        });

        // PNG Olarak İndir (Tattoo Şablonu)
        downloadBtn.onclick = () => {
            // İndirme işlemi sırasında butonları gizle ki resimde çıkmasın
            html2canvas(document.querySelector("#wave-outer")).then(canvas => {
                const link = document.createElement('a');
                link.download = 'SonikSkin-Tasarim.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        };
    </script>
</body>
</html>
