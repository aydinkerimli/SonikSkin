<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonik Skin - Premium Tattoo Experience</title>
    <style>
        :root { 
            --neon: #d4ff00; 
            --deep-bg: #0a0a0a;
            --card-bg: rgba(20, 20, 20, 0.95);
            --accent: #1a1a1a;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            background: radial-gradient(circle at top right, #1a1f00 0%, var(--deep-bg) 70%);
            color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; min-height: 100vh; 
            display: flex; flex-direction: column;
            overflow-x: hidden;
        }

        header {
            width: 100%; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); border-bottom: 1px solid #222;
        }
        .logo { 
            font-weight: 900; color: var(--neon); font-size: 1.4rem; letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(212, 255, 0, 0.4);
        }

        .lang-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid #333; color: white; 
            padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: 13px;
            transition: 0.3s;
        }
        .lang-btn:hover { background: var(--neon); color: black; }

        .container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        
        .card {
            background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.05); 
            padding: 40px 30px;
            border-radius: 40px; 
            width: 100%; max-width: 420px; 
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.02);
            position: relative;
        }

        .card::before {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, transparent, rgba(212,255,0,0.1), transparent);
            border-radius: 40px; z-index: -1;
        }

        h2 { 
            font-size: 0.9rem; letter-spacing: 3px; color: #888; margin-bottom: 30px; 
            text-transform: uppercase; font-weight: 400;
        }

        .wave-box {
            background: #000; height: 160px; border-radius: 25px; margin-bottom: 30px;
            position: relative; border: 1px solid #1a1a1a; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
        }
        canvas { width: 100%; height: 100%; }
        #timer { 
            position: absolute; top: 15px; right: 20px; 
            color: var(--neon); font-family: 'Courier New', monospace; 
            font-size: 14px; font-weight: bold;
        }

        .btn {
            width: 100%; padding: 20px; margin-bottom: 15px; border-radius: 18px; border: none;
            font-weight: 700; font-size: 15px; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .btn-gray { 
            background: #1a1a1a; color: #eee; border: 1px solid #333; 
        }
        .btn-gray:hover { background: #252525; border-color: #444; }

        .btn-listen { 
            background: rgba(212, 255, 0, 0.05); color: var(--neon); 
            border: 1px solid rgba(212, 255, 0, 0.2); display: none; 
        }

        .btn-main { 
            background: var(--neon); color: #000; margin-top: 15px;
            box-shadow: 0 15px 30px rgba(212, 255, 0, 0.2);
        }
        .btn-main:hover { 
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(212, 255, 0, 0.3);
        }
        
        .btn:active { transform: scale(0.97); }

        /* Mobil uyğunluq */
        @media (max-width: 480px) {
            .card { padding: 30px 20px; }
            .logo { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">SONIK SKIN</div>
    <button class="lang-btn" id="curLang">TR ▾</button>
</header>

            <div id="timer">00:00 / 00:08</div>
        </div>
