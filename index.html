<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sonic Skin | Sanat Laboratuvarı</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        .header { display: flex; justify-content: space-between; padding: 20px 50px; border-bottom: 1px solid #222; }
        select { background: #111; color: #fff; border: 1px solid #444; padding: 5px; border-radius: 5px; }
        
        .main { display: flex; justify-content: center; gap: 40px; padding: 50px; flex-wrap: wrap; }
        .panel { background: #0a0a0a; border: 1px solid #333; border-radius: 25px; width: 400px; padding: 30px; transition: 0.3s; }
        .panel:hover { border-color: #d4ff00; }

        /* KARE GÖRSEL ALANI */
        .visual-box { 
            width: 100%; 
            aspect-ratio: 1/1; 
            background: #000; 
            border: 2px solid #222; 
            border-radius: 15px; 
            margin-bottom: 20px; 
            position: relative; 
            overflow: hidden;
        }
        canvas { width: 100%; height: 100%; display: block; }

        .btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 15px; }
        .btn-rec { background: #ff4b2b; color: #fff; }
        .btn-play { background: #333; color: #fff; display: none; }
        .btn-buy { background: #d4ff00; color: #000; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 22px; font-weight: bold; color: #d4ff00;">SONIC SKIN</div>
        <select>
            <option>Türkçe</option><option>English</option><option>Русский</option><option>Français</option><option>Deutsch</option><option>Español</option><option>Italiano</option><option>Português</option>
        </select>
    </div>

    <div class="main">
        <div class="panel">
            <h3>CANLI KAYIT ANALİZİ</h3>
            <div class="visual-box">
                <canvas id="liveCanvas"></canvas>
            </div>
            <button id="recBtn" class="btn btn-rec">🎤 SESİ KAYDET</button>
            <button id="playBtn" class="btn btn-play">▶️ KAYDI DİNLE</button>
            <button id="buyBtn" class="btn btn-buy">GÖRSELİ YARAT VE İNDİR</button>
        </div>

        <div class="panel">
            <h3>HAZIR SES DOSYASI</h3>
            <div class="visual-box">
                <canvas id="uploadCanvas"></canvas>
            </div>
            <input type="file" id="fileIn" hidden accept="audio/*">
            <button onclick="document.getElementById('fileIn').click()" class="btn" style="background:#444; color:#fff;">📁 SES DOSYASI SEÇ</button>
            <button id="buyBtn2" class="btn btn-buy">DÖNÜŞTÜR VE İNDİR</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('liveCanvas');
        const ctx = canvas.getContext('2d');
        const recBtn = document.getElementById('recBtn');
        const playBtn = document.getElementById('playBtn');
        const buyBtn = document.getElementById('buyBtn');

        let audioBlob, audioUrl, mediaRecorder, audioChunks = [];
        let audio = new Audio();
        let animationId;

        // Kare Boyutu Ayarı
        canvas.width = 400; canvas.height = 400;

        recBtn.onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            analyser.fftSize = 128;
            const dataArray = new Uint8Array(analyser.frequencyBinCount);

            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.start();
            recBtn.innerText = "KAYDEDİLİYOR... (5sn)";
            
            // Görselleştirme Fonksiyonu (Doku Efekti)
            function render() {
                analyser.getByteFrequencyData(dataArray);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; // Hafif iz bırakma
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                dataArray.forEach((v, i) => {
                    const radius = (v / 255) * 60;
                    ctx.beginPath();
                    ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, radius, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${200 + v}, 80%, 60%, 0.3)`;
                    ctx.fill();
                });
                animationId = requestAnimationFrame(render);
            }
            render();

            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                cancelAnimationFrame(animationId);
                audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                audioUrl = URL.createObjectURL(audioBlob);
                audio.src = audioUrl;
                playBtn.style.display = 'block';
                buyBtn.style.display = 'block';
                recBtn.style.display = 'none';
                stream.getTracks().forEach(t => t.stop());
            };

            setTimeout(() => { if(mediaRecorder.state === "recording") mediaRecorder.stop(); }, 5000);
        };

        playBtn.onclick = () => audio.play();
        buyBtn.onclick = () => window.location.href = 'https://sonic-skin.lemonsqueezy.com/checkout';
        
        document.getElementById('fileIn').onchange = () => {
            document.getElementById('buyBtn2').style.display = 'block';
            alert("Dosya başarıyla yüklendi!");
        };
    </script>
</body>
</html>
