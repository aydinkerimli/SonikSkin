<!DOCTYPE html>
<html lang="tr" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SonikSkin v4</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
        .lang-container { margin: 20px 0; display: flex; justify-content: center; gap: 8px; }
        .l-btn { background: #111; border: 1px solid #00ffcc; color: #00ffcc; padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .l-btn:active { background: #00ffcc; color: #000; }
        h1 { font-size: 24px; margin: 30px 0 10px; color: #fff; }
        p { color: #888; font-size: 15px; margin-bottom: 40px; }
        .main-button { 
            background: #ff4757; color: white; border: none; padding: 22px; 
            width: 100%; max-width: 320px; font-size: 18px; font-weight: bold; 
            border-radius: 12px; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
            text-transform: uppercase; letter-spacing: 1px;
        }
        #status { margin: 25px 0; color: #00ffcc; font-weight: 500; font-size: 16px; min-height: 20px; }
    </style>
</head>
<body class="notranslate">

    <div class="lang-container">
        <button class="l-btn" onclick="translateUI('TR')">TR</button>
        <button class="l-btn" onclick="translateUI('EN')">EN</button>
        <button class="l-btn" onclick="translateUI('RU')">RU</button>
    </div>

    <h1 id="txt-title">Sesini Sanata Dönüştür</h1>
    <p id="txt-sub">Dövmen için ses kaydı yapmaya hazır mısın?</p>

    <div id="status">Sistem: Hazır</div>

    <button id="main-btn" class="main-button" onclick="handleAction()">KAYDA BAŞLA</button>

    <script>
        const content = {
            'TR': { title: "Sesini Sanata Dönüştür", sub: "Dövmen için ses kaydı yapmaya hazır mısın?", btn: "KAYDA BAŞLA", wait: "Mikrofon aranıyor...", active: "KAYIT YAPILIYOR", done: "Kayıt Başarılı!" },
            'EN': { title: "Turn Voice into Art", sub: "Ready to record your sound?", btn: "START RECORDING", wait: "Finding mic...", active: "RECORDING NOW", done: "Record Complete!" },
            'RU': { title: "Голос в Искусство", sub: "Готовы записать звук?", btn: "НАЧАТЬ ЗАПИСЬ", wait: "Поиск микрофона...", active: "ИДЕТ ЗАПИСЬ", done: "Запись завершена!" }
        };

        let currentLanguage = 'TR';

        function translateUI(lang) {
            currentLanguage = lang;
            document.getElementById('txt-title').innerText = content[lang].title;
            document.getElementById('txt-sub').innerText = content[lang].sub;
            document.getElementById('main-btn').innerText = content[lang].btn;
            document.getElementById('status').innerText = "Dil: " + lang;
            console.log("Language changed to: " + lang);
        }

        async function handleAction() {
            const btn = document.getElementById('main-btn');
            const st = document.getElementById('status');
            
            st.innerText = content[currentLanguage].wait;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                st.innerText = content[currentLanguage].active;
                btn.innerText = content[currentLanguage].active;
                btn.style.background = "#222";

                setTimeout(() => {
                    stream.getTracks().forEach(track => track.stop());
                    btn.style.background = "#ff4757";
                    btn.innerText = content[currentLanguage].btn;
                    st.innerText = content[currentLanguage].done;
                }, 3000);

            } catch (err) {
                alert("Hata: Mikrofon izni verilmedi!");
                st.innerText = "Hata!";
            }
        }
    </script>
</body>
</html>
