<!DOCTYPE html>
<html>
<head>
    <title>Sonic Skin Test</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; }
        .panel { border: 1px solid #333; padding: 20px; margin: 20px auto; width: 300px; background: #111; }
        canvas { width: 100%; height: 100px; background: #000; border: 1px solid #444; }
        button { width: 100%; padding: 10px; margin-top: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1>SONIC SKIN TEST</h1>
    
    <div class="panel">
        <h3>SOL PANEL (CANLI)</h3>
        <canvas id="cv1"></canvas>
        <button onclick="kaydet()" id="btn1">🎤 SESİ KAYDET</button>
    </div>

    <div class="panel">
        <h3>SAĞ PANEL (DOSYA)</h3>
        <canvas id="cv2"></canvas>
        <input type="file" id="fIn" hidden onchange="dosyaSecildi(this)">
        <button onclick="document.getElementById('fIn').click()">📁 DOSYA SEÇ</button>
    </div>

    <script>
        let ctx;

        function ciz(an, id) {
            const c = document.getElementById(id), x = c.getContext('2d'), da = new Uint8Array(an.frequencyBinCount);
            function render() {
                requestAnimationFrame(render); an.getByteTimeDomainData(da);
                x.fillStyle = "#000"; x.fillRect(0,0,c.width,c.height);
                x.lineWidth = 2; x.strokeStyle = "#d4ff00"; x.beginPath();
                let s = c.width/da.length, curX = 0;
                for(let i=0; i<da.length; i++) {
                    let v = da[i]/128, y = v*c.height/2;
                    if(i==0) x.moveTo(curX, y); else x.lineTo(curX, y);
                    curX += s;
                }
                x.stroke();
            } render();
        }

        async function kaydet() {
            try {
                if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                const an = ctx.createAnalyser(); ctx.createMediaStreamSource(s).connect(an);
                ciz(an, 'cv1');
                document.getElementById('btn1').innerText = "KAYDEDİLİYOR (8sn)...";
                setTimeout(() => { s.getTracks().forEach(t => t.stop()); }, 8000);
            } catch(e) { alert("Hata: " + e.message); }
        }

        function dosyaSecildi(i) {
            if(!ctx) ctx = new AudioContext();
            const f = i.files[0]; const aud = new Audio(URL.createObjectURL(f));
            const src = ctx.createMediaElementSource(aud), an = ctx.createAnalyser();
            src.connect(an); an.connect(ctx.destination);
            ciz(an, 'cv2'); aud.play();
        }
    </script>
</body>
</html>
