<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Spor Takip Sistemi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 20px; color: #333; }
        .konteynir { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .liste { margin-top: 20px; }
        .ozet { margin-top: 20px; font-weight: bold; color: #e74c3c; border-top: 1px solid #ddd; pt: 10px; }
    </style>
</head>
<body>

<div class="konteynir">
    <h2>Spor Takip Özeti</h2>
    <div id="aktivite-listesi" class="liste">
        </div>
    <div id="toplam-sonuc" class="ozet"></div>
</div>

<script>
    // ARTIK RENKLİ VE ÇALIŞIR DURUMDA!
    const sporVerileri = [
        { ad: "Koşu", sure: 30, kalori: 300 },
        { ad: "Yüzme", sure: 45, kalori: 450 },
        { ad: "Ağırlık", sure: 60, kalori: 200 }
    ];

    let listeHTML = "";
    let toplamKalori = 0;

    sporVerileri.forEach(spor => {
        listeHTML += `<p>✅ <b>${spor.ad}</b>: ${spor.sure} dk | ${spor.kalori} kcal</p>`;
        toplamKalori += spor.kalori;
    });

    document.getElementById("aktivite-listesi").innerHTML = listeHTML;
    document.getElementById("toplam-sonuc").innerHTML = `Toplam Harcanan: ${toplamKalori} kcal`;
</script>

</body>
</html>
