<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonik Skin - Pure Stable</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --neon: #d4ff00; --bg: #050505; --red: #ff3b3b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f2027);
            background-size: 400% 400%; animation: moveGradient 15s ease infinite;
            color: white; font-family: sans-serif; margin: 0; padding: 0; min-height: 100vh;
        }
        @keyframes moveGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        header { width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); position: relative; z-index: 5000; }
        .logo { font-weight: 900; color: var(--neon); font-size: 1.1rem; cursor: pointer; }
        .lang-dropdown { position: relative; }
        .lang-btn { background: #222; border: 1px solid #444; color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .lang-content { display: none; position: absolute; right: 0; background: #1a1a1a; min-width: 120px; border: 1px solid #333; border-radius: 8px; z-index: 9999; }
        .lang-content span { padding: 12px; display: block; cursor: pointer; border-bottom: 1px solid #222; font-size: 13px; }
        .lang-dropdown:hover .lang-content { display: block; }
        .container { display: flex; justify-content: center; align-items: center; padding: 15px; min-height: 80vh; }
        .card { background: rgba(17, 17, 17, 0.9); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; }
        .btn-scan-top { width: 100%; padding: 14px; margin-bottom: 20px; border-radius: 50px; background: transparent; border: 2px solid var(--neon); color: var(--neon); font-weight: bold; cursor: pointer; }
        .wave-box { background: #000; height: 140px; border-radius: 20px; margin-bottom: 25px; position: relative; border: 1px solid #1a1a1a; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #lock-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        canvas { width: 100%; height: 100%; }
        #timer { position: absolute; top: 12px; right: 15px; color: var(--neon); font-family: monospace; font-size: 14px; }
        .btn { width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 15px; border: none; font-weight: bold; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-gray { background: #222; color: #fff; }
        .btn-main { background: var(--neon); color: #000; }
        .audio-group { display: none; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        #ar-view { display: none; position: fixed; inset: 0; z-index: 10000; }
        .close-ar { position: absolute; top: 30px; right: 20px; z-index: 10001; background: var(--red); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="resetPage()">SONIK SKIN</div>
    <div class="lang-dropdown">
        <button class="lang-btn" id="curLang">TR ▾</button>
        <div class="lang-content">
            <span onclick="updateLang('tr')">Türkçe</span>
            <span onclick="updateLang('en')">English</span>
            <span onclick="updateLang('ru')">Русский</span>
            <span onclick="updateLang('fr')">Français</span>
            <span onclick="updateLang('zh')">中文</span>
            <span onclick="updateLang('de')">Deutsch</span>
            <span onclick="updateLang('es')">Español</span>
        </div>
    </div>
</header>

<div class="container" id="ui-layer">
    <div class="card">
        <button class="btn-scan-top" onclick="openAR()">🔍 <span id="ui-scan">SCANET</span></button>
        <h2 id="ui-title">DOSYADAN DÖVME YAP</h2>
        <div class="wave-box">
            <canvas id="waveCanvas"></canvas>
            <div id="timer">00:00 / 00:08</div>
            <div id="lock-overlay">
                <span id="ui-lock-title">🔒</span>
                <p id="ui-lock-msg" style="font-size:11px"></p>
            </div>
        </div>
        <button class="btn btn-main" id="success-btn" style="display:none; background:#00c3ff" onclick="downloadPNG()">✅ <span id="ui-success">İNDİR</span></button>
        <div id="action-area">
            <button class="btn btn-gray" id="btn-rec" onclick="initMic()">🎤 <span id="ui-rec">SESİ KAYDET</span></button>
            <input type="file" id="fInp" hidden onchange="handleFile(event)">
            <button class="btn btn-gray" onclick="document.getElementById('fInp').click()">📁 <span id="ui-select">DOSYA SEÇ</span></button>
            <div class="audio-group" id="audio-ctrl">
                <button class="btn btn-gray" onclick="playAudio()">🔊 <span id="ui-listen">DİNLE</span></button>
                <button class="btn btn-gray" style="background:var(--red)" onclick="stopAudio()">🛑 STOP</button>
            </div>
            <button class="btn btn-main" onclick="handleCheckoutFlow()" id="ui-down">BUNU HATIRAYA DÖNÜŞTÜR</button>
        </div>
    </div>
</div>

<div id="ar-view">
    <button class="close-ar" onclick="location.reload()">KAPAT</button>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no;" embedded vr-mode-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0">
            <a-plane position="0 0 0" height="0.5" width="0.5" material="src: #waveCanvas; transparent: true; opacity: 0.9"></a-plane>
        </a-entity>
    </a-scene>
</div>

<script>
    const LEMON_LINK = "https://sonikskin.lemonsqueezy.com/checkout/buy/7997dd0f-76bd-4a1c-99f5-b2253aeb1ee6";
    const langs = {
        tr: { title: "DOSYADAN DÖVME YAP", scan: "SCANET", select: "DOSYA SEÇ", down: "BUNU HATIRAYA DÖNÜŞTÜR", listen: "DİNLE", rec: "SESİ KAYDET", success: "BAŞARILI! İNDİR", lockT: "🔒 KİLİTLİ", lockM: "Ödeme yapın" },
        en: { title: "CREATE TATTOO", scan: "SCANET", select: "CHOOSE FILE", down: "CONVERT TO MEMORY", listen: "LISTEN", rec: "RECORD", success: "SUCCESS! DOWNLOAD", lockT: "🔒 LOCKED", lockM: "Pay to unlock" },
        ru: { title: "ТАТУ ИЗ ФАЙЛА", scan: "СКАНЕР", select: "ВЫБРАТЬ", down: "СКАЧАТЬ", listen: "СЛУШАТЬ", rec: "ЗАПИСЬ", success: "УСПЕШНО!", lockT: "🔒 БЛОК", lockM: "Оплатите" },
        fr: { title: "CRÉER TATOUAGE", scan: "SCANNER", select: "CHOISIR", down: "CONVERTIR", listen: "ÉCOUTER", rec: "ENREGISTRER", success: "SUCCÈS!", lockT: "🔒 BLOQUÉ", lockM: "Payez" },
        zh: { title: "纹身制作", scan: "扫描", select: "选择文件", down: "下载", listen: "倾听", rec: "录音", success: "成功!", lockT: "🔒 锁定", lockM: "支付" },
        de: { title: "TATTOO DATEI", scan: "SCANNER", select: "WÄHLEN", down: "DOWNLOAD", listen: "ANHÖREN", rec: "AUFNAHME", success: "ERFOLG!", lockT: "🔒 GESPERRT", lockM: "Zahlen" },
        es: { title: "CREAR TATUAJE", scan: "ESCANEAR", select: "ELEGIR", down: "CONVERTIR", listen: "ESCUCHAR", rec: "GRABAR", success: "¡EXITO!", lockT: "🔒 BLOQUEADO", lockM: "Pague" }
    };

    let recorder, chunks = [], audio, staticDataArray = [];
    const canvas = document.getElementById('waveCanvas'), ctx = canvas.getContext('2d'), overlay = document.getElementById('lock-overlay');

    // Skan et düyməsi üçün sadə və təmiz funksiya
    function openAR() {
        document.getElementById('ui-layer').style.display = 'none';
        document.getElementById('ar-view').style.display = 'block';
        const sceneEl = document.querySelector('a-scene');
        sceneEl.systems['mindar-image-system'].start(); 
    }

    window.onload = () => {
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        updateLang(localStorage.getItem('sonikLang') || 'tr');
        if (new URLSearchParams(window.location.search).get('status') === 'success') {
            overlay.style.display = 'none'; document.getElementById('success-btn').style.display = 'flex';
            document.getElementById('action-area').style.display = 'none';
            if(localStorage.getItem('lastStaticWave')) {
                staticDataArray = JSON.parse(localStorage.getItem('lastStaticWave'));
                drawStaticWave(true);
            }
        }
    };

    function updateLang(l) {
        localStorage.setItem('sonikLang', l); const ln = langs[l];
        document.getElementById('ui-title').innerText = ln.title;
        document.getElementById('ui-scan').innerText = ln.scan;
        document.getElementById('ui-select').innerText = ln.select;
        document.getElementById('ui-down').innerText = ln.down;
        document.getElementById('ui-listen').innerText = ln.listen;
        document.getElementById('ui-rec').innerText = ln.rec;
        document.getElementById('ui-success').innerText = ln.success;
        document.getElementById('ui-lock-title').innerText = ln.lockT;
        document.getElementById('ui-lock-msg').innerText = ln.lockM;
        document.getElementById('curLang').innerText = l.toUpperCase() + " ▾";
    }

    async function initMic() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recorder = new MediaRecorder(stream);
        recorder.start(); chunks = [];
        let s = 0;
        const t = setInterval(() => {
            s++; document.getElementById('timer').innerText = `00:0${s} / 00:08`;
            if(s>=8) { clearInterval(t); recorder.stop(); stream.getTracks().forEach(tr=>tr.stop()); }
        }, 1000);
        recorder.onstop = async () => {
            const blob = new Blob(chunks);
            const ad = await blob.arrayBuffer();
            const decoded = await new AudioContext().decodeAudioData(ad);
            generateWave(decoded);
            audio = new Audio(URL.createObjectURL(blob));
            document.getElementById('audio-ctrl').style.display = 'grid';
        };
        recorder.ondataavailable = e => chunks.push(e.data);
    }

    function generateWave(buffer) {
        const data = buffer.getChannelData(0);
        const samples = 60;
        const blockSize = Math.floor(data.length / samples);
        staticDataArray = [];
        for(let i=0; i<samples; i++) {
            let sum = 0;
            for(let j=0; j<blockSize; j++) { sum += Math.abs(data[(i*blockSize)+j]); }
            staticDataArray.push(sum/blockSize);
        }
        localStorage.setItem('lastStaticWave', JSON.stringify(staticDataArray));
        drawStaticWave();
    }

    function drawStaticWave(isPaid = false) {
        if(!isPaid) overlay.style.display = 'flex';
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
        const bw = canvas.width / staticDataArray.length;
        staticDataArray.forEach((v, i) => {
            ctx.strokeStyle = (i/60 < 0.2 || i/60 > 0.8) ? '#00c3ff' : '#ffff1c';
            ctx.lineWidth = 3; ctx.beginPath();
            const h = v * canvas.height * 5;
            ctx.moveTo(i*bw + bw/2, (canvas.height/2)-(h/2));
            ctx.lineTo(i*bw + bw/2, (canvas.height/2)+(h/2));
            ctx.stroke();
        });
    }

    function playAudio() { if(audio) audio.play(); }
    function stopAudio() { if(audio) { audio.pause(); audio.currentTime = 0; } }
    function handleFile(e) { /* Fayl məntiqi */ }
    function handleCheckoutFlow() { if(staticDataArray.length > 0) window.location.href = LEMON_LINK; }
    function downloadPNG() { drawStaticWave(true); const link = document.createElement('a'); link.download = 'tattoo.png'; link.href = canvas.toDataURL(); link.click(); }
    function resetPage() { localStorage.removeItem('lastStaticWave'); location.reload(); }
</script>
</body>
</html>
